<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Ronda • Prédio Eco Berrini</title>
<style>
  :root{
    --vivo:#6A1B9A; --vivo-dark:#4A0072;
    --valid:#2ECC71; --lock:#9E9E9E; --occ:#FF9800; --prob:#E53935;
    --bg:#F6F3F9; --card:#FFFFFF; --line:#E9E2EE; --ink:#2B2B2B; --muted:#777;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:500 15px/1.35 "Segoe UI",system-ui}
  .app{max-width:1200px;margin:0 auto;padding:16px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .brand{font-weight:900;font-size:28px;color:#fff;padding:6px 12px;border-radius:999px;background:linear-gradient(135deg,var(--vivo),var(--vivo-dark))}
  .title{font-size:18px;font-weight:700;color:var(--vivo-dark)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 20px rgba(38,12,77,.06);padding:14px;margin:12px 0}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
  input,select,textarea,button{
    width:100%;border:1px solid var(--line);border-radius:12px;
    padding:11px 12px;font:500 15px/1.2 inherit;background:#fff;color:var(--ink);
  }
  textarea{min-height:70px;resize:vertical}
  button{background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));color:white;border:none;font-weight:700;cursor:pointer;transition:transform 0.1s ease;}
  button:active{transform:scale(0.98);}
  button.ghost{background:white;color:var(--vivo);border:1px solid var(--vivo)}
  .grid{display:grid;gap:10px}
  @media(min-width:800px){ .cols-2{grid-template-columns:1fr 1fr} }
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  .pill{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:12px;background:white;border:1px solid var(--line)}
  .dot{width:14px;height:14px;border-radius:4px}
  .dot.v{background:var(--valid)} .dot.l{background:var(--lock)} .dot.o{background:var(--occ)} .dot.p{background:var(--prob)}
  .kbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
  .kbtn{flex:1;background:white;color:var(--vivo);border:1px solid var(--vivo);border-radius:12px;padding:10px;font-weight:700}

  /* ====== Canvas do prédio ====== */
  .canvas-wrap{
    position:relative;
    margin:0 auto;
    width:100%;
    max-width:720px;
    border-radius:16px;
    overflow-x:auto;
    overflow-y:visible;
    border:1px solid var(--line);
    background:white;
  }
  
  .canvas-inner {
    min-width: 720px;
    position: relative;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:linear-gradient(135deg,rgba(106,27,154,.08),rgba(74,0,114,.06));
    flex-wrap: wrap;
    gap: 8px;
  }
  .topbar .vivo{
    background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
    padding:6px 12px;
    border-radius:999px;
    color:white;
    font-weight:900;
    font-size: 14px;
  }
  .bg-layer{
    position:relative;
    width:720px;
    height:auto;
    min-height:1080px;
    background:#fafafa;
  }
  .bg-layer svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    pointer-events: none;
    z-index: 0;
  }
  .bg-custom{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    opacity:.28;
    z-index: 1;
    pointer-events: none;
  }

  .overlay{
    position:absolute;
    left:0;
    right:0;
    top:0;
    bottom:0;
    pointer-events:none;
    z-index: 2;
  }
  .row{
    position:absolute;
    left:70px;
    right:70px;
    height:30px;
    display:grid;
    grid-auto-flow:column;
    gap:8px;
    align-items:center;
  }

  .slot{
    min-width:44px;
    height:26px;
    border-radius:6px;
    font-size:14px;
    font-weight:900;
    color:white;
    text-shadow: 0px 1px 2px rgba(0,0,0,0.55), 0px 0px 2px rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid #FFFFFF;
    box-shadow:0 0 6px rgba(0,0,0,0.35);
  }
  .slot.valid{background:var(--valid)}
  .slot.lock{background:var(--lock)}
  .slot.occ{background:var(--occ)}
  .slot.prob{background:var(--prob)}

  .row-label{
    position:absolute;
    left:10px;
    height:30px;
    font-weight:900;
    font-size:12px;
    color:#555;
    display:flex;
    align-items:center;
    text-shadow:0 1px 0 rgba(255,255,255,.6);
    z-index: 3;
  }

  .obs-container {
    position:relative;
    width:100%;
    background: rgba(255,255,255,0.95);
    border-top: 1px solid var(--line);
    margin-top: 0;
    z-index: 10;
  }
  #obsBox{
    padding:12px 16px;
    min-height: 70px;
    max-height: 150px;
    overflow:auto;
    background:rgba(255,255,255,.98);
    color:#333;
    font-size:13px;
    white-space:pre-wrap;
    word-break:break-word;
    border-bottom: 1px solid var(--line);
  }

  .summary-bottom{
    padding:10px 16px;
    background:rgba(255,255,255,.98);
    font-size:12px;
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    flex-wrap: wrap;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 480px) {
    .app {
      padding: 12px;
    }
    .topbar {
      flex-direction: column;
      align-items: flex-start;
    }
    .slot {
      min-width: 36px;
      font-size: 11px;
    }
    .row {
      gap: 4px;
    }
    .kbtn {
      font-size: 13px;
      padding: 8px;
    }
  }

  /* Toast message para feedback mobile */
  .toast-msg {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 9999;
    animation: fadeInOut 2s ease;
    pointer-events: none;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <span class="brand">vivo</span>
    <div>
      <div class="title">Ronda • Prédio Eco Berrini</div>
    </div>
  </header>

  <div class="card">
    <div class="grid cols-2">
      <div>
        <label>Prédio</label>
        <input id="predio" value="Prédio Berrini">
      </div>
      <div>
        <label>Responsáveis</label>
        <input id="tecnicos" placeholder="Ex: João, Maria">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="grid cols-2">
      <div>
        <label>Adicionar item (andar-sala)</label>
        <input id="onePair" placeholder="29-02">
      </div>
      <div>
        <label>Status</label>
        <select id="oneStatus">
          <option value="VALIDADA">Validada (verde)</option>
          <option value="TRANCADA">Trancada (cinza)</option>
          <option value="OCUPADA">Ocupada (laranja)</option>
          <option value="PROBLEMA">Problema (vermelho)</option>
        </select>
      </div>
    </div>

    <div class="grid cols-2" style="margin-top:8px">
      <button id="btnAdd">Adicionar</button>
      <button class="ghost" id="btnClear">Limpar salas</button>
    </div>
  </div>

  <div class="card">
    <label>Cole sua lista (andar-sala + status opcional: trancada | ocupada | problema)</label>
    <textarea id="bulk" placeholder="Ex.:
29-02
29-05 ocupada
28-03 problema
19-02 trancada"></textarea>

    <label style="margin-top:10px">Observações</label>
    <textarea id="observacoes" placeholder="Ex.: Sala 28-03 com projetor quebrado; 19-02 trancada, chave com segurança."></textarea>

    <div class="kbar">
      <button class="kbtn" id="btnApply">Aplicar lista</button>
      <button class="kbtn" id="btnLoadBg">Carregar fundo</button>
      <button class="kbtn ghost" id="btnClearBg">Remover fundo</button>
      <button class="kbtn" id="btnPNG">📸 Exportar PNG</button>
      <input type="file" id="bgFile" accept="image/*" style="display:none">
    </div>

    <div class="legend">
      <span class="pill"><span class="dot v"></span> Validada</span>
      <span class="pill"><span class="dot l"></span> Trancada</span>
      <span class="pill"><span class="dot o"></span> Ocupada</span>
      <span class="pill"><span class="dot p"></span> Problema</span>
    </div>
  </div>

  <div class="card canvas-wrap" id="exportCanvas">
    <div class="canvas-inner">
      <div class="topbar">
        <span class="vivo">vivo</span>
        <div>
          <div id="sumPredio">Prédio</div>
          <div id="sumResp">Responsáveis</div>
        </div>
        <div id="sumRight">0 salas • 0 problemas</div>
      </div>

      <div class="bg-layer" id="bgLayer">
        <div class="bg-custom" id="bgCustom"></div>
        <svg viewBox="0 0 720 1080" aria-hidden="true">
          <rect x="40" y="80" width="640" height="960" rx="6" fill="#EEE5F3" stroke="#E4DCEC"/>
          <polygon points="40,80 360,20 680,80" fill="#D6C7EA"/>
        </svg>
        <div class="overlay" id="overlay"></div>
      </div>

      <div class="obs-container">
        <div id="obsBox"></div>
        <div class="summary-bottom">
          <span id="sumDate"></span>
          <span id="sumDist"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
(() => {
  const $ = s => document.querySelector(s);
  
  // Função para mostrar toast (feedback mobile)
  function showToast(message, isError = false) {
    const toast = document.createElement('div');
    toast.className = 'toast-msg';
    toast.textContent = message;
    toast.style.background = isError ? 'rgba(229, 57, 53, 0.9)' : 'rgba(0,0,0,0.8)';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  const state = { items:[], bg:null };
  const clsByStatus = {
    VALIDADA:"valid", TRANCADA:"lock", OCUPADA:"occ", PROBLEMA:"prob"
  };

  const pad2 = n => String(n).padStart(2,"0");
  const parsePair = (t) => {
    const m = String(t).trim().match(/^(\d{1,2})\s*[-\/]\s*(\d{1,2})/);
    if(!m) return null;
    return { floor:parseInt(m[1],10), room:pad2(parseInt(m[2],10)) };
  };
  
  const parseStatusHint = (rest) => {
    const s = String(rest||"").toLowerCase();
    if(/problema|problem|falha|erro|issue/.test(s)) return "PROBLEMA";
    if(/tranc/.test(s)) return "TRANCADA";
    if(/ocup/.test(s))  return "OCUPADA";
    return "VALIDADA";
  };

  function render(){
    $("#sumPredio").textContent = $("#predio").value || "Prédio";
    $("#sumResp").textContent   = $("#tecnicos").value || "";
    $("#obsBox").textContent = $("#observacoes").value.trim() || "Nenhuma observação registrada.";

    const overlay = $("#overlay");
    overlay.innerHTML = "";

    const floors = {};
    state.items.forEach(i => {
      if(!floors[i.floor]) floors[i.floor] = [];
      floors[i.floor].push(i);
    });
    const ordered = Object.keys(floors).sort((a,b)=>parseInt(b)-parseInt(a));
    
    if(ordered.length === 0) {
      const emptyMsg = document.createElement("div");
      emptyMsg.style.position = "absolute";
      emptyMsg.style.top = "50%";
      emptyMsg.style.left = "50%";
      emptyMsg.style.transform = "translate(-50%, -50%)";
      emptyMsg.style.color = "#999";
      emptyMsg.style.fontSize = "14px";
      emptyMsg.style.fontWeight = "bold";
      emptyMsg.textContent = "Nenhuma sala cadastrada. Use os campos acima.";
      overlay.appendChild(emptyMsg);
    } else {
      const topY = 100;
      const bottomY = 980;
      const total = ordered.length;
      const span = (bottomY - topY);
      
      ordered.forEach((f, idx) => {
        let y = topY + (span * (idx / (total - 1 || 1)));
        y = Math.min(Math.max(y, topY), bottomY - 30);
        
        const label = document.createElement("div");
        label.className = "row-label";
        label.style.top = y + "px";
        label.textContent = "Andar " + pad2(parseInt(f));
        overlay.appendChild(label);
        
        const row = document.createElement("div");
        row.className = "row";
        row.style.top = y + "px";
        
        const salas = floors[f].sort((a,b) => parseInt(a.room) - parseInt(b.room));
        salas.forEach(sala => {
          const slot = document.createElement("div");
          slot.className = "slot " + clsByStatus[sala.status];
          slot.textContent = sala.room;
          row.appendChild(slot);
        });
        
        overlay.appendChild(row);
      });
    }

    const dist = {VALIDADA:0, TRANCADA:0, OCUPADA:0, PROBLEMA:0};
    state.items.forEach(x => dist[x.status]++);
    const problemas = dist.TRANCADA + dist.OCUPADA + dist.PROBLEMA;
    $("#sumRight").textContent = `${state.items.length} salas • ${problemas} problemas`;
    $("#sumDist").textContent = `✅ ${dist.VALIDADA} | 🔒 ${dist.TRANCADA} | 🟠 ${dist.OCUPADA} | 🔴 ${dist.PROBLEMA}`;
    $("#sumDate").textContent = new Date().toLocaleString("pt-BR");

    const bgDiv = $("#bgCustom");
    if(state.bg){
      bgDiv.style.backgroundImage = `url(${state.bg})`;
      bgDiv.style.display = "block";
    } else {
      bgDiv.style.display = "none";
    }
  }

  // Função de exportação otimizada para mobile
  async function exportToPNG() {
    const node = $("#exportCanvas");
    const btn = $("#btnPNG");
    const originalText = btn.textContent;
    
    try {
      // Feedback visual
      btn.textContent = "⏳ Gerando...";
      btn.disabled = true;
      
      showToast("📸 Gerando imagem... Aguarde");
      
      // Configuração otimizada para mobile
      const canvas = await html2canvas(node, {
        scale: 2.5, // Maior qualidade
        backgroundColor: "#ffffff",
        logging: false,
        useCORS: true,
        allowTaint: false,
        windowWidth: node.scrollWidth,
        windowHeight: node.scrollHeight,
        onclone: (clonedDoc, element) => {
          // Garantir que elementos clonados mantenham o estilo
          console.log("Clone realizado com sucesso");
        }
      });
      
      // Criar download
      const link = document.createElement('a');
      const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      const predioNome = ($("#predio").value || "Predio").replace(/\s+/g, "_");
      const filename = `Ronda_${predioNome}_${timestamp}.png`;
      
      // Verificar se é mobile (iOS/Android)
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      
      if (isMobile) {
        // Mobile: abrir em nova aba para salvar
        const dataUrl = canvas.toDataURL("image/png");
        const newWindow = window.open();
        if (newWindow) {
          newWindow.document.write(`
            <html>
              <head><title>Salvar Imagem</title></head>
              <body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;">
                <img src="${dataUrl}" style="max-width:100%;height:auto;border:1px solid #ccc;" />
                <p style="position:fixed;bottom:20px;left:0;right:0;text-align:center;color:#fff;background:rgba(0,0,0,0.7);padding:10px;margin:0;">
                  📱 Pressione e segure na imagem para salvar
                </p>
              </body>
            </html>
          `);
          showToast("✅ Imagem gerada! Toque e segure para salvar");
        } else {
          // Fallback: tentar download direto
          link.download = filename;
          link.href = canvas.toDataURL("image/png");
          link.click();
          showToast("✅ Imagem salva! Verifique seus downloads");
        }
      } else {
        // Desktop: download direto
        link.download = filename;
        link.href = canvas.toDataURL("image/png");
        link.click();
        showToast("✅ Imagem exportada com sucesso!");
      }
      
    } catch (error) {
      console.error("Erro na exportação:", error);
      showToast("❌ Erro ao gerar imagem. Tente novamente.", true);
    } finally {
      btn.textContent = originalText;
      btn.disabled = false;
    }
  }

  // ===== EVENTOS DOS BOTÕES =====
  $("#btnAdd").onclick = () => {
    const pair = parsePair($("#onePair").value);
    if(!pair) {
      showToast("❌ Use o formato: 29-02 ou 29/02", true);
      return;
    }
    state.items = state.items.filter(x => !(x.floor === pair.floor && x.room === pair.room));
    state.items.push({ floor: pair.floor, room: pair.room, status: $("#oneStatus").value });
    $("#onePair").value = "";
    render();
    showToast("✅ Sala adicionada!");
  };

  $("#btnApply").onclick = () => {
    const lines = $("#bulk").value.split("\n").map(s=>s.trim()).filter(Boolean);
    if(lines.length === 0) {
      showToast("❌ Cole uma lista no campo acima", true);
      return;
    }
    
    lines.forEach(l => {
      const m = l.match(/^(\d{1,2})\s*[-\/]\s*(\d{1,2})(.*)$/i);
      if(!m) return;
      const floor = parseInt(m[1], 10);
      const room = pad2(parseInt(m[2], 10));
      const status = parseStatusHint(m[3]);
      state.items = state.items.filter(x => !(x.floor === floor && x.room === room));
      state.items.push({ floor, room, status });
    });
    $("#bulk").value = "";
    render();
    showToast(`✅ ${lines.length} sala(s) adicionadas!`);
  };

  $("#btnClear").onclick = () => { 
    if(confirm("Tem certeza que deseja remover todas as salas?")){ 
      state.items = []; 
      render();
      showToast("🗑️ Todas as salas foram removidas");
    } 
  };

  $("#btnLoadBg").onclick = () => $("#bgFile").click();
  $("#btnClearBg").onclick = () => { 
    state.bg = null; 
    render();
    showToast("🖼️ Fundo removido");
  };
  
  $("#bgFile").onchange = ev => {
    const f = ev.target.files?.[0]; 
    if(!f) return;
    const r = new FileReader();
    r.onload = e => { 
      state.bg = e.target.result; 
      render();
      showToast("🖼️ Fundo carregado!");
    };
    r.readAsDataURL(f);
  };

  $("#predio").oninput = render;
  $("#tecnicos").oninput = render;
  $("#observacoes").oninput = render;
  
  // Botão de exportação - AGORA FUNCIONA EM MOBILE!
  $("#btnPNG").onclick = exportToPNG;

  // Dados iniciais
  state.items = [
    {floor:32, room:"37", status:"PROBLEMA"},
    {floor:31, room:"33", status:"PROBLEMA"},
    {floor:30, room:"29", status:"PROBLEMA"},
    {floor:29, room:"02", status:"VALIDADA"},
    {floor:29, room:"05", status:"VALIDADA"},
    {floor:29, room:"25", status:"PROBLEMA"},
    {floor:28, room:"03", status:"PROBLEMA"},
    {floor:27, room:"17", status:"OCUPADA"},
    {floor:26, room:"13", status:"OCUPADA"},
    {floor:25, room:"09", status:"OCUPADA"},
    {floor:24, room:"05", status:"TRANCADA"},
    {floor:23, room:"01", status:"TRANCADA"},
    {floor:22, room:"17", status:"TRANCADA"},
    {floor:21, room:"13", status:"TRANCADA"},
    {floor:20, room:"09", status:"TRANCADA"},
    {floor:19, room:"01", status:"VALIDADA"},
    {floor:19, room:"02", status:"VALIDADA"},
    {floor:19, room:"05", status:"VALIDADA"}
  ];
  
  $("#observacoes").value = "Problema com o projetor na 29-05\nProblema com o projetor na 29-05\nProblema com o projetor na 29-05";
  
  render();
})();
</script>
</body>
</html>
