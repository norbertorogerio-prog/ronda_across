<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ronda Inteligente</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#F6F3F9;
  padding:12px;
}

.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

/* GRID OPERAÇÃO */
.floor-title{
  font-weight:bold;
  margin:8px 0 4px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
  gap:6px;
}

.slot{
  height:30px;
  border-radius:6px;
  background:#bbb;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
  font-size:12px;
}

.valid{background:#2ECC71}
.lock{background:#9E9E9E}
.occ{background:#FF9800}
.prob{background:#E53935}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:flex-end;
}

.modal-box{
  background:white;
  width:100%;
  padding:16px;
  border-radius:16px 16px 0 0;
}

.modal button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.validBtn{background:#2ECC71;color:white}
.lockBtn{background:#9E9E9E;color:white}
.occBtn{background:#FF9800;color:white}
.probBtn{background:#E53935;color:white}

/* EXPORT PRÉDIO */
.building-export{
  background:#eaeff4;
  padding:20px;
  border-radius:16px;
  width:fit-content;
}

.floor-row{
  display:flex;
  align-items:center;
  margin-bottom:4px;
}

.floor-label{
  width:40px;
  font-weight:bold;
}

.window{
  width:20px;
  height:20px;
  margin:2px;
  border-radius:4px;
  background:#ccc;
}
</style>
</head>

<body>

<div class="card">
  <input id="predio" value="ECO BERRINI">
  <input id="resp" placeholder="Responsável">
</div>

<div class="card" id="app"></div>

<div class="card">
  <button onclick="exportar()">📸 Gerar imagem</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <button class="validBtn" onclick="setStatus('VALIDADA')">✅ Validado</button>
    <button class="lockBtn" onclick="setStatus('TRANCADA')">🔒 Trancado</button>
    <button class="occBtn" onclick="setStatus('OCUPADA')">🟠 Ocupada</button>
    <button class="probBtn" onclick="setStatus('PROBLEMA')">🔴 Problema</button>
  </div>
</div>

<script>
/* CONFIGURAÇÃO REAL DO PRÉDIO */
const config = {
  32:{start:1,end:10},
  31:{start:1,end:10},
  30:{start:1,end:10},
  29:{start:1,end:10},
  28:{start:1,end:34}, // 👈 maior
  27:{start:1,end:25}, // 👈 diferente
  26:{start:1,end:18}
};

/* ESTADO */
let data = {};
let current = null;

/* INICIALIZA */
Object.keys(config).forEach(f=>{
  for(let i=config[f].start;i<=config[f].end;i++){
    data[f+"-"+i]=null;
  }
});

/* CLASSE */
function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s]||"";
}

/* RENDER */
function render(){
  const app = document.getElementById("app");
  app.innerHTML="";

  Object.keys(config).sort((a,b)=>b-a).forEach(f=>{
    let title=document.createElement("div");
    title.className="floor-title";
    title.innerText="Andar "+f;

    let grid=document.createElement("div");
    grid.className="grid";

    for(let i=config[f].start;i<=config[f].end;i++){
      let key=f+"-"+i;

      let el=document.createElement("div");
      el.className="slot "+cls(data[key]);
      el.innerText=String(i).padStart(2,"0");

      el.onclick=()=>{
        current = key;
        document.getElementById("modal").style.display="flex";
      };

      grid.appendChild(el);
    }

    app.appendChild(title);
    app.appendChild(grid);
  });
}

/* SET STATUS */
function setStatus(status){
  if(current){
    data[current]=status;
  }
  document.getElementById("modal").style.display="none";
  render();
}

/* EXPORT VISUAL PRÉDIO */
async function exportar(){

  let container=document.createElement("div");
  container.className="building-export";

  let title=document.createElement("div");
  title.style.fontWeight="bold";
  title.style.marginBottom="10px";
  title.innerText=document.getElementById("predio").value;
  container.appendChild(title);

  Object.keys(config).sort((a,b)=>b-a).forEach(f=>{
    let row=document.createElement("div");
    row.className="floor-row";

    let label=document.createElement("div");
    label.className="floor-label";
    label.innerText=f;
    row.appendChild(label);

    for(let i=config[f].start;i<=config[f].end;i++){
      let w=document.createElement("div");
      w.className="window "+cls(data[f+"-"+i]);
      row.appendChild(w);
    }

    container.appendChild(row);
  });

  document.body.appendChild(container);

  const canvas = await html2canvas(container,{scale:2});
  document.body.removeChild(container);

  const link=document.createElement("a");
  link.href=canvas.toDataURL();
  link.download="predio.png";
  link.click();
}

/* INIT */
render();
</script>

</body>
</html>
