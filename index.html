<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Painel de Ronda</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --vivo:#6A1B9A;
  --vivo-dark:#4A0072;
  --valid:#2ECC71;
  --lock:#9E9E9E;
  --occ:#FF9800;
  --prob:#E53935;
}

body{
  margin:0;
  font-family:system-ui;
  background:#f4f4f6;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap:16px;
  padding:16px;
}

/* PRÉDIO */
.building{
  background:white;
  border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  color:white;
  font-weight:900;
  text-align:center;
  padding:10px;
}

/* CORPO */
.body{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* ANDAR */
.floor{
  display:flex;
  align-items:center;
  gap:8px;
}

/* LABEL ANDAR */
.floor-label{
  width:30px;
  font-size:12px;
  font-weight:800;
  color:#666;
}

/* SALAS */
.rooms{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.slot{
  min-width:34px;
  height:26px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  color:white;
  cursor:pointer;
}

.valid{background:var(--valid)}
.lock{background:var(--lock)}
.occ{background:var(--occ)}
.prob{background:var(--prob)}

/* FOOTER */
.footer{
  margin-top:auto;
  padding:8px;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
}

/* BOTÃO */
.btn{
  background:var(--vivo);
  color:white;
  border:none;
  border-radius:6px;
  padding:4px 8px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>
const order = ["VALIDADA","OCUPADA","TRANCADA","PROBLEMA"];

const buildings = [
  {
    name:"Berrini",
    items:[
      {floor:29,room:"02",status:"VALIDADA"},
      {floor:28,room:"03",status:"PROBLEMA"},
      {floor:27,room:"05",status:"OCUPADA"}
    ]
  },
  {
    name:"Paulista",
    items:[
      {floor:10,room:"01",status:"TRANCADA"},
      {floor:9,room:"02",status:"VALIDADA"}
    ]
  }
];

function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s];
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  buildings.forEach((b,idx)=>{

    const card = document.createElement("div");
    card.className = "building";
    card.id = "b"+idx;

    const floors = {};
    b.items.forEach(i => (floors[i.floor] ||= []).push(i));
    const keys = Object.keys(floors).sort((a,b)=>b-a);

    let floorsHTML = "";

    keys.forEach(f=>{
      floorsHTML += `
        <div class="floor">
          <div class="floor-label">${f}</div>
          <div class="rooms">
            ${floors[f].map(r=>`
              <div class="slot ${cls(r.status)}" onclick="changeStatus(${idx},${f},'${r.room}')">
                ${r.room}
              </div>
            `).join("")}
          </div>
        </div>
      `;
    });

    card.innerHTML = `
      <div class="header">${b.name}</div>
      <div class="body">${floorsHTML}</div>
      <div class="footer">
        <span>${b.items.length} salas</span>
        <button class="btn" onclick="exportPNG(${idx})">PNG</button>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* TROCA STATUS */
function changeStatus(i,floor,room){
  const item = buildings[i].items.find(x=>x.floor==floor && x.room==room);
  const next = order[(order.indexOf(item.status)+1)%4];
  item.status = next;
  render();
}

/* EXPORT PNG */
async function exportPNG(i){
  const node = document.getElementById("b"+i);
  const canvas = await html2canvas(node,{scale:2});
  const url = canvas.toDataURL();

  const a = document.createElement("a");
  a.href = url;
  a.download = "predio_"+i+".png";
  a.click();
}

render();
</script>

</body>
</html>
