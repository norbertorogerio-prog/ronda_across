<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>Ronda • Prédio Eco Berrini - Mapa com Fundo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
  
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  
  /* Card principal */
  .main-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  
  /* Outdoor no telhado */
  .outdoor {
    background: linear-gradient(135deg, #2c3e50, #1a2632);
    padding: 20px 30px;
    text-align: center;
    border-bottom: 4px solid #ffd700;
  }
  
  .outdoor h1 {
    font-size: 28px;
    font-weight: 900;
    color: #ffd700;
    letter-spacing: 2px;
  }
  
  .outdoor p {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-top: 5px;
  }
  
  /* Topbar Vivo */
  .topbar-vivo {
    background: #6A1B9A;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .vivo-logo {
    background: rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 40px;
    font-weight: 900;
    font-size: 20px;
    color: white;
  }
  
  .stats-info {
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    font-weight: bold;
  }
  
  /* Área do mapa com imagem de fundo */
  .mapa-area {
    position: relative;
    background: #f0f0f0;
    overflow: auto;
    max-height: 70vh;
  }
  
  .mapa-container {
    position: relative;
    display: inline-block;
    width: 100%;
  }
  
  .mapa-imagem-fundo {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
    user-select: none;
  }
  
  /* Overlay para as salas */
  .overlay-salas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  
  .sala-marcador {
    position: absolute;
    background: #2ECC71;
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 4px 8px;
    border-radius: 20px;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.2s;
    white-space: nowrap;
    z-index: 10;
    font-family: monospace;
  }
  
  .sala-marcador:hover {
    transform: scale(1.05);
    z-index: 20;
  }
  
  .sala-marcador.problema {
    background: #E53935;
  }
  
  .sala-marcador.trancada {
    background: #9E9E9E;
  }
  
  .sala-marcador.ocupada {
    background: #FF9800;
  }
  
  /* Barra de ferramentas */
  .toolbar {
    background: white;
    padding: 20px;
    border-top: 1px solid #eee;
  }
  
  .toolbar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
  }
  
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  
  .input-group label {
    font-size: 12px;
    font-weight: bold;
    color: #666;
  }
  
  .input-group input, .input-group select {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
  }
  
  button {
    background: #6A1B9A;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  
  button:active {
    transform: scale(0.98);
  }
  
  button.ghost {
    background: white;
    color: #6A1B9A;
    border: 1px solid #6A1B9A;
  }
  
  button.danger {
    background: #e74c3c;
  }
  
  .btn-salvar {
    background: linear-gradient(135deg, #2ECC71, #27ae60);
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    font-size: 16px;
  }
  
  .obs-area {
    margin-top: 15px;
  }
  
  .obs-area textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 14px;
    resize: vertical;
    font-family: inherit;
  }
  
  .legenda {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 15px;
    padding: 12px;
    background: #f9f9f9;
    border-radius: 12px;
  }
  
  .legenda-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  
  .legenda-cor {
    width: 14px;
    height: 14px;
    border-radius: 4px;
  }
  
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 1000;
  }
  
  @media (max-width: 768px) {
    .outdoor h1 { font-size: 20px; }
    .sala-marcador { font-size: 9px; padding: 2px 6px; }
    .toolbar-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="main-card" id="exportCard">
    <!-- Outdoor no telhado -->
    <div class="outdoor">
      <h1 id="predioOutdoor">ECO BERRINI</h1>
      <p>Av. Eng. Luiz Carlos Berrini, 1376</p>
    </div>
    
    <!-- Topbar Vivo -->
    <div class="topbar-vivo">
      <span class="vivo-logo">vivo</span>
      <div>
        <span id="responsavelLabel" style="font-size:12px">Responsável:</span>
        <strong id="responsavelNome">Não definido</strong>
      </div>
      <span class="stats-info" id="statsInfo">0 salas • 0 problemas</span>
    </div>
    
    <!-- Área do mapa com imagem de fundo -->
    <div class="mapa-area">
      <div class="mapa-container" id="mapaContainer">
        <img id="mapaFundo" class="mapa-imagem-fundo" src="" alt="Prédio Eco Berrini - Mapa de Andares">
        <div class="overlay-salas" id="overlaySalas"></div>
      </div>
    </div>
    
    <!-- Barra de ferramentas -->
    <div class="toolbar">
      <div class="toolbar-grid">
        <div class="input-group">
          <label>🏢 Nome do Prédio</label>
          <input type="text" id="predioNome" value="ECO BERRINI">
        </div>
        <div class="input-group">
          <label>👤 Responsável</label>
          <input type="text" id="responsavel" placeholder="Nome do responsável">
        </div>
        <div class="input-group">
          <label>➕ Adicionar Sala (Andar-Sala)</label>
          <input type="text" id="novaSala" placeholder="Ex: 29-05">
        </div>
        <div class="input-group">
          <label>📌 Status</label>
          <select id="statusSala">
            <option value="VALIDADA">✅ Validado</option>
            <option value="TRANCADA">🔒 Trancada</option>
            <option value="OCUPADA">🟠 Ocupada</option>
            <option value="PROBLEMA">🔴 Problema</option>
          </select>
        </div>
        <div>
          <button id="btnAdicionar" style="margin-top: 22px;">➕ Adicionar</button>
        </div>
      </div>
      
      <div class="obs-area">
        <label>📝 Observações</label>
        <textarea id="observacoes" rows="2" placeholder="Registre observações importantes..."></textarea>
      </div>
      
      <div class="legenda">
        <div class="legenda-item"><div class="legenda-cor" style="background:#2ECC71"></div> Validado</div>
        <div class="legenda-item"><div class="legenda-cor" style="background:#9E9E9E"></div> Trancada</div>
        <div class="legenda-item"><div class="legenda-cor" style="background:#FF9800"></div> Ocupada</div>
        <div class="legenda-item"><div class="legenda-cor" style="background:#E53935"></div> Problema</div>
      </div>
      
      <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button id="btnLimpar" class="ghost" style="flex:1">🗑️ Limpar Todas as Salas</button>
      </div>
      <button id="btnSalvar" class="btn-salvar">📸 SALVAR IMAGEM</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(function(){
  // ==================== CONFIGURAÇÃO DAS POSIÇÕES DOS ANDARES ====================
  // Ajuste estes valores percentuais conforme a posição exata de cada andar na sua imagem
  // Para ajustar: inspecione a imagem e veja onde cada andar está localizado verticalmente
  const posicoesAndares = {
    32: 8,   // Cobertura - 8% do topo da imagem
    31: 12,
    30: 16,
    29: 20,
    28: 24,
    27: 28,
    26: 32,
    25: 36,
    24: 40,
    23: 44,
    22: 48,
    21: 52,
    20: 56,
    19: 60,
    18: 64
  };
  
  // Configuração da posição horizontal (em percentual)
  // Você pode ajustar para alinhar as salas à esquerda, direita ou centralizar
  const posicaoHorizontal = 85; // 85% da largura (mais à direita)
  
  let salas = [];
  
  const $ = x => document.querySelector(x);
  
  function toast(msg, isError = false) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    t.style.background = isError ? '#e74c3c' : 'black';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
  
  // Carregar a imagem do prédio
  function carregarImagemPredio() {
    // IMPORTANTE: Cole aqui a URL da sua imagem do prédio
    // Você pode usar uma imagem hospedada ou converter para base64
    const imgUrl = "https://i.imgur.com/placeholder.jpg"; // <-- SUBSTITUA PELA URL DA SUA IMAGEM
    
    const img = new Image();
    img.onload = () => {
      $("#mapaFundo").src = imgUrl;
      // Após carregar, re-renderizar as salas para recalcular posições
      setTimeout(renderizarSalas, 100);
    };
    img.onerror = () => {
      console.warn("Imagem não encontrada, usando fallback");
      // Fallback: criar um canvas com os andares listados
      criarFallbackImagem();
    };
    img.src = imgUrl;
  }
  
  // Fallback caso a imagem não carregue - cria uma representação visual dos andares
  function criarFallbackImagem() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 1000;
    
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#2c3e50';
    ctx.font = 'bold 24px system-ui';
    ctx.fillText('ECO BERRINI', canvas.width/2 - 100, 50);
    
    ctx.fillStyle = '#666';
    ctx.font = '14px monospace';
    let y = 120;
    const andares = [32,31,30,29,28,27,26,25,24,23,22,21,20,19,18];
    andares.forEach((andar, idx) => {
      ctx.fillStyle = '#999';
      ctx.fillRect(50, y - 12, 30, 20);
      ctx.fillStyle = '#333';
      ctx.fillText(andar, 55, y);
      ctx.fillStyle = '#ccc';
      ctx.fillRect(100, y - 12, canvas.width - 150, 20);
      y += 45;
    });
    
    ctx.fillStyle = '#888';
    ctx.font = '12px system-ui';
    ctx.fillText('Av. Eng. Luiz Carlos Berrini, 1376', canvas.width/2 - 150, canvas.height - 30);
    
    const dataUrl = canvas.toDataURL();
    $("#mapaFundo").src = dataUrl;
    toast("⚠️ Usando visualização padrão. Para usar sua imagem, substitua a URL no código.");
  }
  
  // Renderizar os marcadores das salas sobre a imagem
  function renderizarSalas() {
    const overlay = $("#overlaySalas");
    overlay.innerHTML = '';
    
    // Aguardar a imagem carregar para pegar as dimensões corretas
    const img = $("#mapaFundo");
    if (!img.complete || img.naturalWidth === 0) {
      setTimeout(renderizarSalas, 200);
      return;
    }
    
    salas.forEach((sala, index) => {
      const posYPercent = posicoesAndares[sala.andar];
      if (posYPercent !== undefined) {
        const marcador = document.createElement('div');
        let statusClass = '';
        if (sala.status === 'PROBLEMA') statusClass = 'problema';
        else if (sala.status === 'TRANCADA') statusClass = 'trancada';
        else if (sala.status === 'OCUPADA') statusClass = 'ocupada';
        
        marcador.className = `sala-marcador ${statusClass}`;
        
        // Formata o texto da sala
        const statusIcon = sala.status === 'PROBLEMA' ? '🔴' : sala.status === 'TRANCADA' ? '🔒' : sala.status === 'OCUPADA' ? '🟠' : '✅';
        marcador.textContent = `${statusIcon} ${sala.andar}-${sala.sala}`;
        
        // Posiciona o marcador
        marcador.style.left = `${posicaoHorizontal}%`;
        marcador.style.top = `${posYPercent}%`;
        marcador.style.transform = 'translateX(-50%) translateY(-50%)';
        marcador.setAttribute('data-index', index);
        
        // Remover ao clicar
        marcador.onclick = (e) => {
          e.stopPropagation();
          if(confirm(`Remover sala ${sala.andar}-${sala.sala}?`)) {
            salas = salas.filter((_, i) => i !== index);
            renderizarSalas();
            atualizarStats();
            toast(`🗑️ Sala ${sala.andar}-${sala.sala} removida`);
          }
        };
        
        overlay.appendChild(marcador);
      }
    });
    
    atualizarStats();
  }
  
  function atualizarStats() {
    const total = salas.length;
    const problemas = salas.filter(s => s.status === 'PROBLEMA').length;
    const validadas = salas.filter(s => s.status === 'VALIDADA').length;
    const trancadas = salas.filter(s => s.status === 'TRANCADA').length;
    const ocupadas = salas.filter(s => s.status === 'OCUPADA').length;
    
    $("#statsInfo").innerHTML = `${total} sala${total !== 1 ? 's' : ''} • ${problemas} problema${problemas !== 1 ? 's' : ''}`;
    
    // Atualizar outdoor
    const nomePredio = $("#predioNome").value;
    $("#predioOutdoor").innerHTML = nomePredio.toUpperCase();
    
    // Atualizar responsável
    const responsavel = $("#responsavel").value;
    $("#responsavelNome").innerHTML = responsavel || "Não definido";
    
    // Atualizar observações (já está no render separado)
  }
  
  function adicionarSala() {
    const input = $("#novaSala").value.trim();
    const status = $("#statusSala").value;
    
    const match = input.match(/^(\d{1,2})\s*[-\/]\s*(\d{1,2})/);
    if(!match) {
      toast("❌ Use formato: 29-05 ou 29/05", true);
      return;
    }
    
    const andar = parseInt(match[1]);
    const sala = match[2].padStart(2, '0');
    
    if(!posicoesAndares[andar]) {
      toast(`⚠️ Andar ${andar} não encontrado. Andares disponíveis: 32,31,30,29,28,27,26,25,24,23,22,21,20,19,18`, true);
      return;
    }
    
    if(salas.some(s => s.andar === andar && s.sala === sala)) {
      toast(`❌ Sala ${andar}-${sala} já existe!`, true);
      return;
    }
    
    salas.push({ andar, sala, status });
    renderizarSalas();
    $("#novaSala").value = '';
    
    const statusTexto = status === 'VALIDADA' ? 'Validado' : status === 'PROBLEMA' ? 'Problema' : status === 'TRANCADA' ? 'Trancada' : 'Ocupada';
    toast(`✅ Sala ${andar}-${sala} adicionada como ${statusTexto}`);
  }
  
  function limparTudo() {
    if(confirm("Limpar todas as salas e observações?")) {
      salas = [];
      $("#observacoes").value = "";
      renderizarSalas();
      toast("🗑️ Todas as salas removidas!");
    }
  }
  
  async function salvarImagem() {
    const btn = $("#btnSalvar");
    const originalText = btn.innerHTML;
    
    const loading = document.createElement('div');
    loading.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000';
    loading.innerHTML = '<div style="background:white;padding:20px;border-radius:16px;text-align:center"><div style="width:40px;height:40px;border:4px solid #ddd;border-top-color:#6A1B9A;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div><div>Gerando imagem...</div></div>';
    document.body.appendChild(loading);
    
    try {
      btn.innerHTML = "⏳ GERANDO...";
      btn.disabled = true;
      
      await new Promise(r => setTimeout(r, 200));
      
      const elemento = $("#exportCard");
      const canvas = await html2canvas(elemento, {
        scale: 2.5,
        backgroundColor: "#ffffff",
        logging: false,
        useCORS: true,
        allowTaint: false
      });
      
      document.body.removeChild(loading);
      
      const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      const nomePredio = $("#predioNome").value.replace(/\s/g, '_');
      const filename = `Ronda_${nomePredio}_${timestamp}.png`;
      const dataUrl = canvas.toDataURL("image/png");
      
      if(navigator.share) {
        try {
          const blob = await fetch(dataUrl).then(r => r.blob());
          const file = new File([blob], filename, {type: 'image/png'});
          await navigator.share({
            title: 'Ronda - Mapa de Salas',
            text: `Mapa do ${$("#predioNome").value}`,
            files: [file]
          });
          toast("✅ Imagem compartilhada! Salve na galeria");
          return;
        } catch(e) {}
      }
      
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataUrl;
      link.click();
      toast("✅ Imagem salva! Verifique seus downloads");
      
    } catch(error) {
      console.error(error);
      document.body.removeChild(loading);
      toast("❌ Erro ao gerar imagem. Tente novamente.", true);
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }
  
  // Eventos
  $("#btnAdicionar").onclick = adicionarSala;
  $("#btnLimpar").onclick = limparTudo;
  $("#btnSalvar").onclick = salvarImagem;
  $("#novaSala").onkeypress = (e) => { if(e.key === 'Enter') adicionarSala(); };
  $("#predioNome").oninput = () => atualizarStats();
  $("#responsavel").oninput = () => atualizarStats();
  $("#observacoes").oninput = () => {
    // Atualizar observações em tempo real
    const obsBox = document.getElementById('obsBox');
    if(obsBox) obsBox.innerHTML = $("#observacoes").value;
  };
  
  // Dados iniciais de exemplo
  salas = [
    {andar: 29, sala: "05", status: "PROBLEMA"},
    {andar: 28, sala: "03", status: "PROBLEMA"},
    {andar: 30, sala: "03", status: "VALIDADA"},
    {andar: 22, sala: "02", status: "TRANCADA"},
    {andar: 19, sala: "10", status: "VALIDADA"}
  ];
  
  // Inicializar
  carregarImagemPredio();
  
  // Adicionar estilo da animação
  const style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);
  
  toast("👋 Clique nos marcadores para remover | Ajuste as posições dos andares se necessário");
})();
</script>
</body>
</html>
