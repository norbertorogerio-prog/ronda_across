<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Prédio Vivo • Pro</title>
<style>
 :root{
  --vivo:#6A1B9A; --vivo-dark:#4A0072;
  --valid:#2ECC71; --occ:#FF9800; --lock:#9E9E9E; --prob:#E53935;
  --bg:#F6F3F9; --card:#FFFFFF; --line:#E6E1EF;
 }

 *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
 
 html, body {
  width: 100%; overflow-x: hidden;
  background: var(--bg); color: #2B2B2B;
  font: 500 14px/1.2 system-ui, "Segoe UI";
 }

 .app{ width: 100%; max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; padding: 10px; }
 @media (min-width:900px){ .app{ display: grid; grid-template-columns: 320px 1fr; } }

 .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:15px; box-shadow:0 4px 10px rgba(0,0,0,0.03); }

 label{ font-size:11px; color:#666; margin-bottom:4px; display:block; font-weight: 700; text-transform: uppercase; }
 select, input, textarea, button { width:100%; border:1px solid var(--line); border-radius:8px; padding:12px; font:inherit; margin-bottom: 10px; }

 button{ background: var(--vivo); color:#fff; font-weight:800; border:none; cursor:pointer; }
 .btn-png { background: #27ae60; padding: 16px; font-size: 16px; margin-top: 10px; }
 .btn-ai { background: #3498db; margin-top: 5px; font-size: 12px; padding: 8px; }

 .viewer-card { 
  display: flex; justify-content: center; background: #fff; padding: 20px 0;
  width: 100%; touch-action: pan-y; overflow-x: hidden; 
 }
 
 .building-container {
  position: relative; display: flex; width: 395px; flex-shrink: 0; height: 950px; user-select: none;
 }

 .floors-labels-col { display: flex; flex-direction: column; padding-top: 36px; width: 70px; flex-shrink: 0; }
 .f-lbl { height: 22px; font-size: 11px; font-weight: 800; color: var(--vivo); display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; }

 .facade-wrapper { position: relative; width: 320px; height: 940px; flex-shrink: 0; }
 #facade-svg { width: 320px; height: 860px; display: block; }
 .overlay-badges { position: absolute; top: 0; left: 0; width: 100%; height: 860px; pointer-events: none; }
 
 .badge { position: absolute; width: 24px; height: 12px; border-radius: 2px; color: #fff; font-size: 9px; font-weight: 900; display: flex; align-items: center; justify-content: center; }

 #footerNoteDisplay {
    position: absolute; bottom: 0; left: 0; width: 100%;
    text-align: left; font-weight: 600; color: #444; padding: 10px; font-size: 11px;
    white-space: pre-wrap; /* Mantém as quebras de linha na tela */
    line-height: 1.4;
    background: #f9f9f9; border-radius: 5px;
 }
</style>
</head>

<body>
<div class="app">

  <div class="card">
    <label>Localização</label>
    <div style="display:flex; gap:5px">
      <select id="selFloor"></select>
      <select id="selRoom"></select>
    </div>

    <label>Responsável</label>
    <input type="text" id="inputResp" placeholder="Nome do responsável">

    <label>Status</label>
    <select id="selStatus">
      <option value="valid">✅ Validada</option>
      <option value="occ">🟠 Ocupada</option>
      <option value="lock">🔒 Trancada</option>
      <option value="prob">❌ Problema</option>
      <option value="none">🗑️ Remover</option>
    </select>

    <label>Observações</label>
    <textarea id="obsText" rows="4" placeholder="Escreva aqui as observações. Use Enter para novas linhas."></textarea>

    <button id="btnAI" class="btn-ai">🤖 GERAR RESUMO EXECUTIVO</button>

    <button id="btnApply" style="background:var(--vivo-dark); margin-top:10px">APLICAR NO MAPA</button>

    <label style="margin-top:10px">Entrada Rápida</label>
    <div style="display:flex">
      <input id="quickInput" type="text" placeholder="32-05-v">
      <button id="btnQuick" style="width:60px; background:#444; margin-left:5px">OK</button>
    </div>

    <button id="btnPNG" class="btn-png">📸 EXPORTAR PNG</button>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px">
        <button id="btnSave" style="background:#f4f4f9; color:var(--vivo); font-size:11px">Salvar JSON</button>
        <button id="btnLoad" style="background:#f4f4f9; color:var(--vivo); font-size:11px">Abrir JSON</button>
    </div>
    <button id="btnClear" style="background:none; color:red; font-size:11px; margin-top:5px">LIMPAR TUDO</button>
  </div>

  <div class="card viewer-card">
    <div class="building-container">
      <div class="floors-labels-col" id="floorsCol"></div>
      <div class="facade-wrapper">
        <svg id="facade-svg" viewBox="0 0 320 860" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="860" rx="10" fill="#E6EAF0" stroke="#B9C1CE" stroke-width="1"/>
          <text x="160" y="22" text-anchor="middle" font-weight="900" font-size="13" fill="#6A1B9A">VIVO</text>
          <g id="winGroup" transform="translate(22,40)" fill="#DDE8F7" stroke="#BFC9D8"></g>
          <rect y="820" width="320" height="40" fill="#D6CDE7" rx="0 0 10 10"/>
        </svg>
        <div class="overlay-badges" id="overlay"></div>
        <div id="footerNoteDisplay"></div>
      </div>
    </div>
  </div>

</div>

<script>
const $ = s => document.querySelector(s);
const STORAGE_KEY = "predio_vPRO_01";
let rooms = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

function init() {
  const fSel = $("#selFloor"), rSel = $("#selRoom"), fCol = $("#floorsCol"), winG = $("#winGroup");
  for (let f = 32; f >= 1; f--) {
    fSel.appendChild(new Option(`Andar ${f}`, f));
    const lbl = document.createElement("div"); lbl.className = "f-lbl"; lbl.textContent = `Andar ${f}`; fCol.appendChild(lbl);
  }
  for (let r = 1; r <= 50; r++) rSel.appendChild(new Option(`Sala ${String(r).padStart(2,'0')}`, r));
  for (let r = 0; r < 32; r++) {
    for (let c = 0; c < 8; c++) {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", c * 35); rect.setAttribute("y", r * 22);
      rect.setAttribute("width", 24); rect.setAttribute("height", 12); rect.setAttribute("rx", 2);
      winG.appendChild(rect);
    }
  }
  $("#inputResp").value = localStorage.getItem(STORAGE_KEY+"_resp") || "";
  render();
}

function render() {
  const overlay = $("#overlay"); overlay.innerHTML = "";
  Object.keys(rooms).forEach(key => {
    const [f, r] = key.split('-').map(Number);
    const row = 32 - f, col = (r - 1) % 8;
    const b = document.createElement("div");
    b.className = `badge ${rooms[key]}`; b.style.backgroundColor = getHex(rooms[key]);
    b.textContent = String(r).padStart(2,'0');
    b.style.top = (40 + row * 22) + "px"; b.style.left = (22 + col * 35) + "px";
    overlay.appendChild(b);
  });
  
  const dataStr = new Date().toLocaleDateString('pt-BR');
  const resp = $("#inputResp").value ? `Resp: ${$("#inputResp").value}` : "Responsável: ---";
  const obs = $("#obsText").value;
  
  $("#footerNoteDisplay").textContent = `${dataStr} | ${resp}\n\n${obs}`;
  
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rooms));
  localStorage.setItem(STORAGE_KEY+"_resp", $("#inputResp").value);
  localStorage.setItem(STORAGE_KEY+"_obs", obs);
}

function getHex(s) { return s==='valid'?'#2ECC71': s==='occ'?'#FF9800': s==='lock'?'#9E9E9E':'#E53935'; }

// LÓGICA DO RESUMO EXECUTIVO (SIMULANDO IA)
$("#btnAI").onclick = () => {
    const stats = { valid: 0, occ: 0, lock: 0, prob: 0 };
    Object.values(rooms).forEach(s => stats[s]++);
    
    const resp = $("#inputResp").value || "Equipe";
    const data = new Date().toLocaleDateString('pt-BR');
    
    const resumo = `RELATÓRIO EXECUTIVO (${data}):
Sob responsabilidade de ${resp}, o prédio apresenta ${stats.valid} salas validadas, ${stats.occ} ocupadas e ${stats.lock} trancadas. Identificamos ${stats.prob} ponto(s) de atenção com problemas. 

Principais Notas: ${$("#obsText").value.replace(/\n/g, ' ')}`;

    $("#obsText").value = resumo;
    render();
};

$("#btnApply").onclick = () => {
  const f = $("#selFloor").value, r = $("#selRoom").value, s = $("#selStatus").value;
  if(s === 'none') delete rooms[`${f}-${r}`]; else rooms[`${f}-${r}`] = s;
  render();
};

$("#btnQuick").onclick = () => {
  const v = $("#quickInput").value.toLowerCase().split('-');
  if(v.length < 3) return;
  const f = parseInt(v[0]), r = parseInt(v[1]), sChar = v[2][0];
  let s = sChar==='v'?'valid': sChar==='o'?'occ': sChar==='t'?'lock': sChar==='p'?'prob':'none';
  if(s === 'none') delete rooms[`${f}-${r}`]; else rooms[`${f}-${r}`] = s;
  render(); $("#quickInput").value = "";
};

$("#btnClear").onclick = () => { if(confirm("Limpar?")) { rooms={}; localStorage.clear(); render(); }};

// --- EXPORTAÇÃO COM MULTI-LINHA E DATA ---
$("#btnPNG").onclick = async () => {
    const btn = $("#btnPNG"); btn.textContent = "GERANDO...";
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 400; canvas.height = 1000; // Aumentado para caber o texto multi-linha
    
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,400,1000);
    ctx.fillStyle = "#E6EAF0"; ctx.beginPath(); ctx.roundRect(75, 10, 320, 850, 10); ctx.fill();
    ctx.fillStyle = "#6A1B9A"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("VIVO", 235, 32);

    // Andares e Janelas
    ctx.textAlign = "right"; ctx.font = "bold 10px sans-serif";
    for(let f=32; f>=1; f--) {
        const row = 32 - f; const y = 40 + row * 22;
        ctx.fillStyle = "#6A1B9A"; ctx.fillText("Andar "+f, 70, y + 10);
        for(let c=0; c<8; c++) {
            ctx.fillStyle = "#DDE8F7"; ctx.strokeStyle = "#BFC9D8";
            const winX = 75 + 22 + c * 35;
            ctx.beginPath(); ctx.roundRect(winX, y, 24, 12, 2); ctx.fill(); ctx.stroke();
        }
    }

    // Badges
    Object.keys(rooms).forEach(key => {
        const [f, r] = key.split('-').map(Number);
        const x = 75 + 22 + ((r-1)%8)*35, y = 40 + (32-f)*22;
        ctx.fillStyle = getHex(rooms[key]); ctx.beginPath(); ctx.roundRect(x, y, 24, 12, 2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "900 8px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(String(r).padStart(2,'0'), x+12, y+9);
    });

    // RODAPÉ MULTI-LINHA
    ctx.fillStyle = "#333"; ctx.font = "11px sans-serif"; ctx.textAlign = "left";
    const respLine = `Data: ${new Date().toLocaleDateString('pt-BR')} | Resp: ${$("#inputResp").value || '---'}`;
    ctx.fillText(respLine, 20, 880);

    ctx.font = "bold 11px sans-serif";
    const lines = $("#obsText").value.split('\n');
    let yOffset = 900;
    lines.forEach(line => {
        ctx.fillText(line, 20, yOffset);
        yOffset += 15;
    });

    canvas.toBlob(async (blob) => {
        const file = new File([blob], "mapa_vivo_pro.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: "Mapa" });
        } else {
            const link = document.createElement("a");
            link.download = "mapa_vivo_pro.png"; link.href = URL.createObjectURL(blob); link.click();
        }
        btn.textContent = "📸 EXPORTAR PNG";
    }, "image/png");
};

init();
</script>
</body>
</html>
