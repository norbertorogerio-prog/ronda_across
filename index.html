<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>Ronda • Prédio Eco Berrini - Mapa Interativo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background: linear-gradient(135deg, #1a2a3a 0%, #0f1a24 100%);
    font-family: system-ui, -apple-system, sans-serif;
    padding: 20px;
    min-height: 100vh;
  }
  
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  
  /* Card principal */
  .main-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  
  /* Header com outdoor */
  .outdoor {
    background: linear-gradient(135deg, #2c3e50, #1a2632);
    padding: 20px 30px;
    text-align: center;
    border-bottom: 4px solid #ffd700;
  }
  
  .outdoor h1 {
    font-size: 28px;
    font-weight: 900;
    color: #ffd700;
    letter-spacing: 2px;
  }
  
  .outdoor p {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-top: 5px;
  }
  
  /* Topbar Vivo */
  .topbar-vivo {
    background: #6A1B9A;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .vivo-logo {
    background: rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 40px;
    font-weight: 900;
    font-size: 20px;
    color: white;
  }
  
  .stats-info {
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    font-weight: bold;
  }
  
  /* Área do mapa */
  .mapa-area {
    position: relative;
    background: #f5f5f5;
    overflow-x: auto;
  }
  
  .mapa-container {
    position: relative;
    display: inline-block;
    min-width: 100%;
  }
  
  .mapa-imagem {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
  }
  
  /* Overlay para adicionar salas */
  .overlay-salas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  
  .sala-marcador {
    position: absolute;
    background: #2ECC71;
    color: white;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px;
    border-radius: 20px;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.2s;
    white-space: nowrap;
    z-index: 10;
  }
  
  .sala-marcador:hover {
    transform: scale(1.05);
  }
  
  .sala-marcador.problema {
    background: #E53935;
  }
  
  .sala-marcador.trancada {
    background: #9E9E9E;
  }
  
  .sala-marcador.ocupada {
    background: #FF9800;
  }
  
  /* Barra de ferramentas */
  .toolbar {
    background: white;
    padding: 20px;
    border-top: 1px solid #eee;
  }
  
  .toolbar-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 15px;
  }
  
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  
  .input-group label {
    font-size: 12px;
    font-weight: bold;
    color: #666;
  }
  
  .input-group input, .input-group select {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
  }
  
  button {
    background: #6A1B9A;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  
  button:active {
    transform: scale(0.98);
  }
  
  button.ghost {
    background: white;
    color: #6A1B9A;
    border: 1px solid #6A1B9A;
  }
  
  .btn-salvar {
    background: linear-gradient(135deg, #2ECC71, #27ae60);
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    font-size: 16px;
  }
  
  .obs-area {
    margin-top: 15px;
  }
  
  .obs-area textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 14px;
    resize: vertical;
  }
  
  .legenda {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 15px;
    padding: 12px;
    background: #f9f9f9;
    border-radius: 12px;
  }
  
  .legenda-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  
  .legenda-cor {
    width: 14px;
    height: 14px;
    border-radius: 4px;
  }
  
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 1000;
  }
  
  @media (max-width: 768px) {
    .outdoor h1 { font-size: 20px; }
    .sala-marcador { font-size: 10px; padding: 2px 6px; }
    .toolbar-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="main-card" id="exportCard">
    <!-- Outdoor no telhado -->
    <div class="outdoor">
      <h1 id="predioOutdoor">ECO BERRINI</h1>
      <p>Av. Eng. Luiz Carlos Berrini, 1376</p>
    </div>
    
    <!-- Topbar Vivo -->
    <div class="topbar-vivo">
      <span class="vivo-logo">vivo</span>
      <div>
        <strong id="responsavelLabel">Responsável:</strong>
        <span id="responsavelNome" style="font-size:14px">Não definido</span>
      </div>
      <span class="stats-info" id="statsInfo">0 salas • 0 problemas</span>
    </div>
    
    <!-- Área do mapa -->
    <div class="mapa-area">
      <div class="mapa-container" id="mapaContainer">
        <img id="mapaBase" class="mapa-imagem" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 1200'%3E%3Crect width='800' height='1200' fill='%23e8e8e8'/%3E%3Ctext x='400' y='100' text-anchor='middle' fill='%23999' font-size='20'%3EPrédio Eco Berrini%3C/text%3E%3Ctext x='400' y='200' text-anchor='middle' fill='%23999'%3ECarregando imagem...%3C/text%3E%3C/svg%3E" alt="Mapa do Prédio">
        <div class="overlay-salas" id="overlaySalas"></div>
      </div>
    </div>
    
    <!-- Barra de ferramentas -->
    <div class="toolbar">
      <div class="toolbar-grid">
        <div class="input-group">
          <label>🏢 Nome do Prédio</label>
          <input type="text" id="predioNome" value="ECO BERRINI">
        </div>
        <div class="input-group">
          <label>👤 Responsável</label>
          <input type="text" id="responsavel" placeholder="Nome do responsável">
        </div>
        <div class="input-group">
          <label>➕ Adicionar Sala (Andar-Sala)</label>
          <input type="text" id="novaSala" placeholder="Ex: 29-05">
        </div>
        <div class="input-group">
          <label>📌 Status</label>
          <select id="statusSala">
            <option value="VALIDADA">✅ Validado</option>
            <option value="TRANCADA">🔒 Trancada</option>
            <option value="OCUPADA">🟠 Ocupada</option>
            <option value="PROBLEMA">🔴 Problema</option>
          </select>
        </div>
        <div>
          <button id="btnAdicionar" style="margin-top: 22px;">➕ Adicionar</button>
        </div>
      </div>
      
      <div class="obs-area">
        <label>📝 Observações</label>
        <textarea id="observacoes" rows="2" placeholder="Registre observações importantes..."></textarea>
      </div>
      
      <div class="legenda">
        <div class="legenda-item"><div class="legenda-cor" style="background:#2ECC71"></div> Validado</div>
        <div class="legenda-item"><div class="legenda-cor" style="background:#9E9E9E"></div> Trancada</div>
        <div class="legenda-item"><div class="legenda-cor" style="background:#FF9800"></div> Ocupada</div>
        <div class="legenda-item"><div class="legenda-cor" style="background:#E53935"></div> Problema</div>
      </div>
      
      <button id="btnLimpar" class="ghost" style="width:100%; margin-top:10px;">🗑️ Limpar Todas as Salas</button>
      <button id="btnSalvar" class="btn-salvar">📸 SALVAR IMAGEM</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(function(){
  // Configuração dos andares e suas posições Y (percentual)
  // Ajuste estas posições conforme sua imagem real
  const posicoesAndares = {
    32: 8,   // Cobertura
    31: 12,
    30: 16,
    29: 20,
    28: 24,
    27: 28,
    26: 32,
    25: 36,
    24: 40,
    23: 44,
    22: 48,
    21: 52,
    20: 56,
    19: 60,
    18: 64
  };
  
  let salas = [];
  
  const $ = x => document.querySelector(x);
  
  function toast(msg) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
  }
  
  // Função para carregar a imagem real (você deve colocar a URL da sua imagem)
  function carregarImagem() {
    // Aqui você pode colocar a URL da sua imagem real
    // Por enquanto vamos usar um placeholder, mas você pode substituir
    const imgUrl = "https://i.imgur.com/placeholder.jpg"; // SUBSTITUA PELA URL DA SUA IMAGEM
    
    const img = new Image();
    img.onload = () => {
      $("#mapaBase").src = imgUrl;
    };
    img.onerror = () => {
      console.log("Imagem não encontrada, usando fallback");
    };
    img.src = imgUrl;
  }
  
  // Renderizar os marcadores das salas
  function renderizarSalas() {
    const overlay = $("#overlaySalas");
    overlay.innerHTML = '';
    
    salas.forEach((sala, index) => {
      const posY = posicoesAndares[sala.andar];
      if (posY !== undefined) {
        const marcador = document.createElement('div');
        marcador.className = `sala-marcador ${sala.status === 'PROBLEMA' ? 'problema' : sala.status === 'TRANCADA' ? 'trancada' : sala.status === 'OCUPADA' ? 'ocupada' : ''}`;
        marcador.textContent = `${sala.andar}-${sala.sala}`;
        
        // Posição na horizontal (ajuste conforme necessidade)
        const posX = 50 + (sala.sala % 10) * 3;
        
        marcador.style.left = `${posX}%`;
        marcador.style.top = `${posY}%`;
        marcador.style.transform = 'translateX(-50%)';
        marcador.setAttribute('data-index', index);
        
        // Botão de remover ao clicar (opcional)
        marcador.onclick = (e) => {
          e.stopPropagation();
          if(confirm(`Remover sala ${sala.andar}-${sala.sala}?`)) {
            salas = salas.filter((_, i) => i !== index);
            renderizarSalas();
            atualizarStats();
            toast(`🗑️ Sala ${sala.andar}-${sala.sala} removida`);
          }
        };
        
        overlay.appendChild(marcador);
      }
    });
    
    atualizarStats();
  }
  
  function atualizarStats() {
    const total = salas.length;
    const problemas = salas.filter(s => s.status === 'PROBLEMA').length;
    $("#statsInfo").innerHTML = `${total} sala${total !== 1 ? 's' : ''} • ${problemas} problema${problemas !== 1 ? 's' : ''}`;
    
    const nomePredio = $("#predioNome").value;
    $("#predioOutdoor").innerHTML = nomePredio.toUpperCase();
    
    const responsavel = $("#responsavel").value;
    $("#responsavelNome").innerHTML = responsavel || "Não definido";
  }
  
  function adicionarSala() {
    const input = $("#novaSala").value.trim();
    const status = $("#statusSala").value;
    
    const match = input.match(/^(\d{1,2})\s*[-\/]\s*(\d{1,2})/);
    if(!match) {
      toast("❌ Use formato: 29-05 ou 29/05", true);
      return;
    }
    
    const andar = parseInt(match[1]);
    const sala = match[2].padStart(2, '0');
    
    if(!posicoesAndares[andar]) {
      toast(`⚠️ Andar ${andar} não encontrado no mapa. Andares disponíveis: ${Object.keys(posicoesAndares).join(', ')}`);
      return;
    }
    
    // Verificar duplicata
    if(salas.some(s => s.andar === andar && s.sala === sala)) {
      toast(`❌ Sala ${andar}-${sala} já existe!`, true);
      return;
    }
    
    salas.push({ andar, sala, status });
    renderizarSalas();
    $("#novaSala").value = '';
    toast(`✅ Sala ${andar}-${sala} adicionada como ${status === 'VALIDADA' ? 'Validado' : status === 'PROBLEMA' ? 'Problema' : status === 'TRANCADA' ? 'Trancada' : 'Ocupada'}`);
  }
  
  function limparTudo() {
    if(confirm("Limpar todas as salas e observações?")) {
      salas = [];
      $("#observacoes").value = "";
      renderizarSalas();
      toast("🗑️ Todas as salas removidas!");
    }
  }
  
  async function salvarImagem() {
    const btn = $("#btnSalvar");
    const originalText = btn.innerHTML;
    
    const loading = document.createElement('div');
    loading.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000';
    loading.innerHTML = '<div style="background:white;padding:20px;border-radius:16px;text-align:center"><div style="width:40px;height:40px;border:4px solid #ddd;border-top-color:#6A1B9A;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div><div>Gerando imagem...</div></div>';
    document.body.appendChild(loading);
    
    try {
      btn.innerHTML = "⏳ GERANDO...";
      btn.disabled = true;
      
      await new Promise(r => setTimeout(r, 100));
      
      const elemento = $("#exportCard");
      const canvas = await html2canvas(elemento, {
        scale: 2.5,
        backgroundColor: "#ffffff",
        logging: false,
        useCORS: true
      });
      
      document.body.removeChild(loading);
      
      const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
      const nomePredio = $("#predioNome").value.replace(/\s/g, '_');
      const filename = `Ronda_${nomePredio}_${timestamp}.png`;
      const dataUrl = canvas.toDataURL("image/png");
      
      if(navigator.share) {
        try {
          const blob = await fetch(dataUrl).then(r => r.blob());
          const file = new File([blob], filename, {type: 'image/png'});
          await navigator.share({
            title: 'Ronda - Mapa de Salas',
            text: `Mapa do ${$("#predioNome").value}`,
            files: [file]
          });
          toast("✅ Imagem compartilhada! Salve na galeria");
          return;
        } catch(e) {}
      }
      
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataUrl;
      link.click();
      toast("✅ Imagem salva! Verifique seus downloads");
      
    } catch(error) {
      console.error(error);
      document.body.removeChild(loading);
      toast("❌ Erro ao gerar imagem", true);
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }
  
  // Eventos
  $("#btnAdicionar").onclick = adicionarSala;
  $("#btnLimpar").onclick = limparTudo;
  $("#btnSalvar").onclick = salvarImagem;
  $("#novaSala").onkeypress = (e) => { if(e.key === 'Enter') adicionarSala(); };
  $("#predioNome").oninput = () => atualizarStats();
  $("#responsavel").oninput = () => atualizarStats();
  
  // Dados iniciais de exemplo
  salas = [
    {andar: 29, sala: "05", status: "PROBLEMA"},
    {andar: 28, sala: "03", status: "PROBLEMA"},
    {andar: 30, sala: "03", status: "VALIDADA"},
    {andar: 22, sala: "02", status: "TRANCADA"}
  ];
  
  renderizarSalas();
  carregarImagem();
  toast("👋 Clique nas salas para remover | Use o mapa como gabarito!");
  
  // Adicionar estilo da animação
  const style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);
})();
</script>
</body>
</html>
