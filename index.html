<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>
<title>Relatório de Vistoria | Vivo</title>

<!-- Fonte + html2canvas para gerar PNG -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --vivo-purple:#6600CC; --vivo-purple-dark:#4C0099; --vivo-purple-light:#8833FF;
  --vivo-purple-glow:rgba(102,0,204,.2); --black:#1A1A2E; --gray:#4A4A5A;
  --gray-light:#6A6A7A; --white:#FFF; --green:#00C853; --yellow:#FFD600;
  --red:#FF3B3B; --purple-status:#AA00FF; --shadow-md:0 4px 12px rgba(0,0,0,.15);
  --grad-primary:linear-gradient(135deg,#6600CC 0%,#4C0099 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(135deg,#1A1A2E 0%,#0F0F1A 100%);
  color:var(--white);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  min-height:100vh; padding:20px;
}
.app{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
@media(min-width:980px){
  body{padding:24px}
  .app{flex-direction:row;gap:24px;align-items:flex-start}
  .app> :first-child{width:380px;flex-shrink:0}
  .app> :last-child{flex:1;min-width:0}
}
.card{
  background:rgba(26,26,46,.8); backdrop-filter:blur(10px);
  border:1px solid rgba(102,0,204,.3); border-radius:20px; padding:20px; box-shadow:var(--shadow-md);
}
h2{margin:0 0 20px 0;font-weight:700;font-size:18px;background:var(--grad-primary);
  -webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
h3{margin:0 0 12px 0;font-size:14px;color:#B7B7C8;font-weight:600;text-transform:uppercase}
label{display:block;margin:12px 0 6px 0;font-size:11px;font-weight:600;text-transform:uppercase;color:#B7B7C8}

.form-field{
  width:100%; border:1.5px solid rgba(102,0,204,.2); border-radius:12px;
  background:rgba(255,255,255,.05); color:var(--white); padding:10px 14px; font-size:13px; outline:none; transition:.2s;
}
.form-field:focus{border-color:var(--vivo-purple); background:rgba(102,0,204,.1); box-shadow:0 0 0 3px var(--vivo-purple-glow)}
textarea.form-field{min-height:60px;resize:vertical}

.number-input-group{display:flex;gap:12px;margin-bottom:8px}
.number-input-group input{flex:1}

/* STATUS */
.status-strip{display:flex;gap:10px;margin:16px 0 20px;flex-wrap:wrap}
.status{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:40px;
  color:var(--white); background:rgba(102,0,204,.15); border:1.5px solid rgba(102,0,204,.3);
  cursor:pointer;font-size:13px;font-weight:600;transition:.2s; flex:1; min-width:90px;
}
.status:hover{background:rgba(102,0,204,.3); transform:translateY(-2px)}
.status:active{transform:translateY(0)}
.dot{width:10px;height:10px;border-radius:50%}
.dot.valid{background:var(--green); box-shadow:0 0 8px rgba(0,200,83,.5)}
.dot.lock{background:var(--yellow);box-shadow:0 0 8px rgba(255,214,0,.5)}
.dot.prob{background:var(--red);   box-shadow:0 0 8px rgba(255,59,59,.5)}
.dot.other{background:var(--purple-status);box-shadow:0 0 8px rgba(170,0,255,.5)}

/* FOTOS */
.photo-section{margin-top:20px;padding-top:16px;border-top:1px solid rgba(102,0,204,.3)}
.photo-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:10px}
.photo-upload-btn{
  background:rgba(102,0,204,.2); border:1.5px dashed rgba(102,0,204,.5);
  border-radius:12px; padding:12px; text-align:center; cursor:pointer; transition:.2s; font-size:13px; font-weight:500;
}
.photo-upload-btn:hover{background:rgba(102,0,204,.3); border-color:var(--vivo-purple)}
.photo-gallery{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.photo-item{position:relative;width:80px;height:80px;border-radius:12px;overflow:hidden;border:2px solid rgba(102,0,204,.3);background:rgba(0,0,0,.3)}
.photo-item img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.photo-delete{
  position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--red);transition:.2s
}
.photo-delete:hover{background:var(--red);color:#fff;transform:scale(1.1)}

/* BOTÃO */
.btn{
  width:100%; border:none; border-radius:12px; background:var(--grad-primary);
  color:var(--white); font-weight:700; padding:10px; cursor:pointer; font-size:12px; transition:.2s;
}
.btn:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(102,0,204,.4)}
.row{display:flex;gap:10px;margin-top:16px} .row button{flex:1}

/* VISOR DIREITO */
.viewer{display:grid;gap:16px}
.section{background:rgba(26,26,46,.6); backdrop-filter:blur(10px); border:1px solid rgba(102,0,204,.2); border-radius:20px; padding:20px}
.small{font-size:11px;color:#9aa; margin-top:12px; text-align:center}

/* GRADE DE ITENS */
.created-grid{display:flex;flex-wrap:wrap;gap:10px;max-height:400px;overflow-y:auto;padding:4px}
.room-card{
  display:inline-flex;flex-direction:column;gap:6px;padding:10px;border-radius:14px;border:1px solid rgba(102,0,204,.2);
  background:rgba(102,0,204,.1); min-width:110px; transition:.2s;
}
.room-card:hover{border-color:var(--vivo-purple); transform:translateY(-2px)}
.room-card.has-photo{border-color:var(--green)}
.photo-indicator{font-size:10px;color:var(--green)}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;background:rgba(102,0,204,.3);border-radius:10px;padding:5px 10px}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;border-radius:40px;padding:4px 10px}
.pill.valid{background:var(--green)} .pill.lock{background:var(--yellow);color:#1A1A2E}
.pill.prob{background:var(--red)} .pill.other{background:var(--purple-status)}

/* RELATÓRIO (mock de celular) */
.report-box{border-radius:16px;background:rgba(0,0,0,.3);overflow:hidden;border:1px solid rgba(102,0,204,.3)}
.report-title{background:linear-gradient(135deg,rgba(102,0,204,.2) 0%,rgba(76,0,153,.2) 100%);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(102,0,204,.3)}
.report-title span{font-size:14px;font-weight:700;background:var(--grad-primary);-webkit-background-clip:text;background-clip:text;color:transparent}
.report-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-action{
  border:1.5px solid rgba(102,0,204,.3); background:rgba(102,0,204,.15); color:var(--white);
  font-weight:600; font-size:12px; padding:8px 16px; border-radius:10px; cursor:pointer; transition:.2s
}
.btn-action:hover{background:rgba(102,0,204,.3); transform:translateY(-1px)}
.btn-share{background:linear-gradient(135deg,#6600CC 0%,#8833FF 100%); border:none}
.btn-png{background:linear-gradient(135deg,#4C0099 0%,#6600CC 100%); border:none}

/* Phone mock */
.phone-wrap{
  margin:10px auto; width:360px; border-radius:40px; padding:14px 12px 18px;
  background:linear-gradient(180deg,#5d05c7 0%, #4C0099 100%); box-shadow:0 20px 50px rgba(102,0,204,.35);
  border:2px solid rgba(255,255,255,.08); position:relative;
}
.phone-notch{width:180px;height:22px;background:rgba(0,0,0,.35);border-radius:0 0 14px 14px;margin:0 auto 10px}
.phone-screen{
  background:#0f0f1a; border-radius:28px; border:1px solid rgba(255,255,255,.06); overflow:hidden; position:relative;
}
.phone-footer{
  display:flex; align-items:center; justify-content:center; padding:14px 10px 18px;
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.04)); border-top:1px solid rgba(255,255,255,.08)
}
.vivo-logo{
  font-weight:900; letter-spacing:2px; font-size:13px;
  background:linear-gradient(135deg,#fff 0%,#d9c9ff 100%); -webkit-background-clip:text;background-clip:text;color:transparent;
  border:1px solid rgba(255,255,255,.25); padding:6px 12px; border-radius:999px;
}

/* Conteúdo na “tela” */
.phone-screen .report-content{background:transparent;padding:18px 16px 6px;max-height:550px;overflow-y:auto;font-size:13px;line-height:1.55}
.report-content .h-line{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);margin:10px 0}
.report-content .title{font-weight:800;font-size:14px;letter-spacing:.3px;color:#eae6ff}
.report-content .kvs{margin:8px 0 0}
.report-content .kv{display:flex;gap:10px;font-size:12px;margin:3px 0}
.report-content .kv b{color:#cfc3ff;min-width:92px;text-transform:uppercase;font-size:11px;letter-spacing:.4px}
.report-content .bullet{margin:4px 0 0 14px}

/* Fotos dentro do relatório */
.report-room-photos{margin:16px 0;padding:16px;background:rgba(102,0,204,.1);border-radius:16px}
.report-room-title{font-weight:700;color:var(--vivo-purple-light);margin-bottom:12px;font-size:14px}
.report-photo-thumbnails{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.report-thumb{width:100px;height:100px;border-radius:12px;object-fit:cover;border:2px solid var(--vivo-purple);cursor:pointer;transition:.2s}
.report-thumb:hover{transform:scale(1.05)}

/* Toast + Modais */
.toast{position:fixed;right:20px;bottom:20px;background:rgba(102,0,204,.95);backdrop-filter:blur(10px);
  padding:12px 20px;border-radius:40px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.share-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:10000;align-items:center;justify-content:center}
.share-modal.show{display:flex}
.share-card{background:rgba(26,26,46,.95);backdrop-filter:blur(20px);border:1px solid rgba(102,0,204,.4);border-radius:24px;padding:24px;max-width:340px;width:90%}
.share-card h4{margin-bottom:20px;font-size:18px;text-align:center}
.share-buttons{display:flex;flex-direction:column;gap:12px}
.share-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;border:none;border-radius:16px;font-weight:700;cursor:pointer}
.share-btn.whatsapp{background:linear-gradient(135deg,#25D366 0%,#128C7E 100%);color:#fff}
.share-btn.teams{background:linear-gradient(135deg,#6264A7 0%,#464775 100%);color:#fff}
.share-btn.email{background:linear-gradient(135deg,#EA4335 0%,#C5221F 100%);color:#fff}
.share-btn.download{background:var(--grad-primary);color:#fff}
.close-modal{background:rgba(102,0,204,.2);border:1px solid rgba(102,0,204,.3);border-radius:14px;padding:10px;margin-top:12px;color:#fff;cursor:pointer;width:100%}

.fullscreen-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:20000;align-items:center;justify-content:center;cursor:pointer}
.fullscreen-modal.show{display:flex}
.fullscreen-modal img{max-width:95%;max-height:95%;border-radius:16px;box-shadow:0 0 50px rgba(102,0,204,.5)}
</style>
</head>
<body>
<div class="app">

  <!-- ESQUERDA -->
  <div class="card">
    <h2>✨ Vistoria Técnica</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="form-field" placeholder="Nome completo"/>

    <label>🏢 Prédio</label>
    <select id="predio" class="form-field">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="form-field" placeholder="Endereço automático"/>

    <div class="number-input-group">
      <div style="flex:1">
        <label>🏬 Andar</label>
        <input type="number" id="floorInput" class="form-field" min="1" max="32" value="1" placeholder="1-32"/>
      </div>
      <div style="flex:1">
        <label>🚪 Sala</label>
        <input type="number" id="roomInput" class="form-field" min="1" max="50" value="1" placeholder="1-50"/>
      </div>
    </div>

    <label>📌 Status</label>
    <div class="status-strip">
      <button class="status" data-status="valid"><span class="dot valid"></span>Validada</button>
      <button class="status" data-status="lock"><span class="dot lock"></span>Trancada</button>
      <button class="status" data-status="prob"><span class="dot prob"></span>Problemas</button>
      <button class="status" data-status="other"><span class="dot other"></span>Outros</button>
    </div>

    <!-- FOTOS DA SALA ATUAL -->
    <div class="photo-section">
      <div class="photo-label">📸 Fotos da Sala <span id="currentDisplayFloor">01</span>-<span id="currentDisplayRoom">01</span></div>
      <div id="photoUploadBtn" class="photo-upload-btn">📷 + Adicionar foto (câmera ou galeria)</div>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple>
      <div id="photoGallery" class="photo-gallery"></div>
    </div>

    <div class="row">
      <button id="btnClear" class="btn">🗑️ Limpar Tudo</button>
    </div>

    <p class="small">💡 Digite o andar e sala → clique no status para registrar</p>
  </div>

  <!-- DIREITA -->
  <div class="viewer">
    <div class="section">
      <h3>📦 Salas vistoriadas</h3>
      <div id="createdGrid" class="created-grid">
        <p class="small" style="text-align:center;width:100%">Nenhuma sala registrada</p>
      </div>
    </div>

    <div class="section">
      <div class="report-box">
        <div class="report-title">
          <span>📋 Relatório de Vistoria</span>
          <div class="report-actions">
            <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;">
              <input id="useAI" type="checkbox" checked style="accent-color:#6600CC"> IA ligada
            </label>
            <button id="btnShare" class="btn-action btn-share">📱 Compartilhar</button>
            <button id="btnPNG" class="btn-action btn-png">📸 Salvar PNG</button>
            <button id="btnCopy" class="btn-action">📋 Copiar</button>
            <button id="btnDownload" class="btn-action">⬇️ Baixar .txt</button>
            <button id="btnCsv" class="btn-action">🧾 Exportar CSV</button>
          </div>
        </div>

        <!-- MOCK do celular (alvo do PNG) -->
        <div id="phoneMock" class="phone-wrap">
          <div class="phone-notch"></div>
          <div id="reportCaptureArea" class="phone-screen">
            <div id="relatorio" class="report-content">
              <div class="title">Relatório</div>
              <div class="h-line"></div>
              <div class="bullet">Aguardando registros...</div>
            </div>
            <div class="phone-footer">
              <div class="vivo-logo">VIVO</div>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- Modal de Compartilhamento -->
<div id="shareModal" class="share-modal">
  <div class="share-card">
    <h4>✨ Compartilhar Relatório</h4>
    <div class="share-buttons">
      <button id="shareWhatsApp" class="share-btn whatsapp">💬 WhatsApp</button>
      <button id="shareTeams" class="share-btn teams">💼 Microsoft Teams</button>
      <button id="shareEmail" class="share-btn email">📧 E-mail</button>
      <button id="shareSave" class="share-btn download">📸 Salvar imagem</button>
    </div>
    <button id="closeModal" class="close-modal">Fechar</button>
  </div>
</div>

<!-- Modal foto em tela cheia -->
<div id="fullscreenModal" class="fullscreen-modal" onclick="closeFullscreen()">
  <img id="fullscreenImage" src="">
</div>

<div class="toast"></div>

<script>
/* ===== Estado ===== */
const STORAGE_KEY = "vistoria_simple_v2";
let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let currentFloor = 1, currentRoom = 1, currentImageData = null;

/* ===== Helpers ===== */
const pad2 = n => String(n).padStart(2,"0");
const statusName  = s => s==="valid"?"Validada":s==="lock"?"Trancada":s==="prob"?"Problemas":"Outros";
const statusClass = s => s==="valid"?"valid":s==="lock"?"lock":s==="prob"?"prob":"other";
const statusEmoji = s => s==="valid"?"✅":s==="lock"?"🔒":s==="prob"?"❌":"◻️";

/* ===== DOM ===== */
const floorInput   = document.getElementById("floorInput");
const roomInput    = document.getElementById("roomInput");
const dispFloor    = document.getElementById("currentDisplayFloor");
const dispRoom     = document.getElementById("currentDisplayRoom");
const createdGrid  = document.getElementById("createdGrid");
const predioSel    = document.getElementById("predio");
const enderecoInp  = document.getElementById("endereco");
const auditorInp   = document.getElementById("auditor");
const obsInp       = document.createElement("textarea"); // Observações globais (interno, IA compõe sem campo extra visual)
const photoInput   = document.getElementById("photoInput");
const photoBtn     = document.getElementById("photoUploadBtn");
const shareModal   = document.getElementById("shareModal");

/* ===== Sala atual ===== */
function updateCurrentDisplay(){
  currentFloor = Math.min(32, Math.max(1, parseInt(floorInput.value)||1));
  currentRoom  = Math.min(50, Math.max(1, parseInt(roomInput.value)||1));
  floorInput.value = currentFloor; roomInput.value = currentRoom;
  dispFloor.textContent = pad2(currentFloor); dispRoom.textContent = pad2(currentRoom);
}
floorInput.addEventListener("input", ()=>{ updateCurrentDisplay(); renderCurrentPhotos(); });
roomInput.addEventListener("input",  ()=>{ updateCurrentDisplay(); renderCurrentPhotos(); });

/* ===== Fotos por sala ===== */
const roomKey = (f,r)=>`A${pad2(f)}-S${pad2(r)}`;
const getRoomPhotos = (f,r)=> JSON.parse(localStorage.getItem(`photos_${roomKey(f,r)}`)||"[]");
const saveRoomPhotos= (f,r,arr)=> localStorage.setItem(`photos_${roomKey(f,r)}`, JSON.stringify(arr));
function addPhotoToRoom(f,r,photo){
  const arr = getRoomPhotos(f,r); arr.push(photo); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderReportWithPhotos();
}
function deletePhotoFromRoom(f,r,idx){
  const arr = getRoomPhotos(f,r); arr.splice(idx,1); saveRoomPhotos(f,r,arr);
  if(currentFloor===f && currentRoom===r) renderCurrentPhotos();
  renderCreated(); renderReportWithPhotos(); showToast("📸 Foto removida");
}
function renderCurrentPhotos(){
  const gal = document.getElementById("photoGallery");
  const photos = getRoomPhotos(currentFloor,currentRoom);
  if(!photos.length){ gal.innerHTML = '<p class="small" style="text-align:center;width:100%">Nenhuma foto adicionada</p>'; return; }
  gal.innerHTML = "";
  photos.forEach((p,i)=>{
    const div = document.createElement("div");
    div.className="photo-item";
    div.innerHTML = `
      <img src="${p}" alt="Foto" onclick="showFullscreenImage('${p}')">
      <div class="photo-delete" onclick="event.stopPropagation(); deletePhotoFromRoom(${currentFloor},${currentRoom},${i})">✕</div>`;
    gal.appendChild(div);
  });
}
function showFullscreenImage(src){ const m=document.getElementById("fullscreenModal"),i=document.getElementById("fullscreenImage"); i.src=src; m.classList.add("show"); }
function closeFullscreen(){ document.getElementById("fullscreenModal").classList.remove("show"); }
window.deletePhotoFromRoom=deletePhotoFromRoom; window.showFullscreenImage=showFullscreenImage; window.closeFullscreen=closeFullscreen;

/* ===== Registrar sala ao clicar status ===== */
document.querySelectorAll(".status").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const status = btn.dataset.status, f=currentFloor, r=currentRoom;
    const idx = entries.findIndex(e=> e.f===f && e.r===r);
    if(idx>=0) entries[idx].status = status; else entries.push({f,r,status});
    persist(); renderCreated(); renderReportWithPhotos();
    showToast(`✅ A${pad2(f)}-S${pad2(r)}: ${statusName(status)}`);
  });
});

/* ===== Grade de itens criados ===== */
function renderCreated(){
  const sorted = [...entries].sort((a,b)=> a.f-b.f || a.r-b.r);
  const title = document.querySelector('.section h3');
  title.innerHTML = `📦 Salas vistoriadas (${entries.length})`;
  if(!sorted.length){ createdGrid.innerHTML='<p class="small" style="text-align:center;width:100%">Nenhuma sala registrada</p>'; return; }
  createdGrid.innerHTML="";
  sorted.forEach(it=>{
    const photos = getRoomPhotos(it.f,it.r), has = photos.length>0;
    const card=document.createElement("div"); card.className = "room-card"+(has?' has-photo':'');
    card.onclick=()=>{ floorInput.value=it.f; roomInput.value=it.r; updateCurrentDisplay(); renderCurrentPhotos(); };
    const badge=document.createElement("div"); badge.className="badge"; badge.innerHTML=`A${pad2(it.f)} • S${pad2(it.r)}${has?' 📸':''}`;
    const pill =document.createElement("div"); pill.className=`pill ${statusClass(it.status)}`; pill.textContent=`${statusEmoji(it.status)} ${statusName(it.status)}`;
    card.appendChild(badge); card.appendChild(pill);
    if(has){ const pi=document.createElement("div"); pi.className="photo-indicator"; pi.textContent=`📸 ${photos.length} foto(s)`; card.appendChild(pi); }
    createdGrid.appendChild(card);
  });
}

/* ===== IA de narrativa (clean & pro) ===== */
function aiComposeReportText({predio,endereco,auditor,entries,totalFotos}){
  const stats={valid:0,lock:0,prob:0,other:0}, floors={};
  entries.forEach(e=>{
    stats[e.status]=(stats[e.status]||0)+1;
    if(!floors[e.f]) floors[e.f]={valid:[],lock:[],prob:[],other:[]};
    floors[e.f][e.status].push(e.r);
  });
  const total=entries.length, dataStr=new Date().toLocaleString("pt-BR");
  const headline = total===0
    ? "Nenhuma sala foi registrada nesta vistoria."
    : `Vistoria de ${total} sala(s) concluída. Predominaram ${stats.valid} validações; ${stats.prob>0?`${stats.prob} ocorrência(s) com problema`:"sem incidentes críticos"} e ${stats.lock>0?`${stats.lock} bloqueio(s) por acesso`:"sem bloqueios relevantes"}.`;

  const meta =
`<div class="kv"><b>Prédio</b><span>${predio||"—"}</span></div>
<div class="kv"><b>Endereço</b><span>${endereco||"—"}</span></div>
<div class="kv"><b>Data</b><span>${dataStr}</span></div>
<div class="kv"><b>Auditor</b><span>${auditor||"—"}</span></div>`;

  const global = `• ✅ Validadas: ${stats.valid}  • 🔒 Trancadas: ${stats.lock}  • ❌ Problemas: ${stats.prob}  • ◻️ Outros: ${stats.other}`;

  let detalhe = "";
  if(total>0){
    detalhe += `<div class="bullet"><b>Detalhe por andar</b></div>`;
    Object.keys(floors).map(Number).sort((a,b)=>a-b).forEach(f=>{
      const a=floors[f], parts=[];
      if(a.valid.length) parts.push(`✅ ${a.valid.length} (${a.valid.sort((x,y)=>x-y).map(pad2).join(", ")})`);
      if(a.lock.length)  parts.push(`🔒 ${a.lock.length} (${a.lock.sort((x,y)=>x-y).map(pad2).join(", ")})`);
      if(a.prob.length)  parts.push(`❌ ${a.prob.length} (${a.prob.sort((x,y)=>x-y).map(pad2).join(", ")})`);
      if(a.other.length) parts.push(`◻️ ${a.other.length} (${a.other.sort((x,y)=>x-y).map(pad2).join(", ")})`);
      detalhe += `<div class="bullet">• Andar ${pad2(f)}: ${parts.join(" | ")||"—"}</div>`;
    });
  }
  const fotos = totalFotos?`📸 Evidências registradas: ${totalFotos} foto(s).`:"";

  return (
`<div class="title">Resumo IA</div>
<div class="h-line"></div>
<div class="kvs">${meta}</div>
<div class="h-line"></div>
<div class="bullet">${headline}</div>
<div class="h-line"></div>
<div class="title">Indicadores</div>
<div class="h-line"></div>
<div class="bullet">${global}</div>
<div class="h-line"></div>
<div class="title">Detalhamento</div>
<div class="h-line"></div>
${detalhe || "<div class='bullet'>Sem entradas.</div>"}
${fotos?`<div class="h-line"></div><div class="bullet">${fotos}</div>`:""}`
  );
}

/* ===== Relatório (IA + fotos no mock de celular) ===== */
function renderReportWithPhotos(){
  const predio = predioSel.value || "Não selecionado";
  const endereco = enderecoInp.value || "Não informado";
  const auditor = auditorInp.value || "Não informado";
  const useAI = !!document.getElementById("useAI")?.checked;

  // fotos agregadas
  let totalFotos = 0; const roomsWithPhotos = [];
  entries.forEach(item=>{
    const photos = getRoomPhotos(item.f,item.r);
    if(photos.length){ totalFotos += photos.length; roomsWithPhotos.push({room:`A${pad2(item.f)}-S${pad2(item.r)}`,status:statusName(item.status),statusEmoji:statusEmoji(item.status),photos}); }
  });

  let mainHtml;
  if(useAI){
    mainHtml = aiComposeReportText({predio,endereco,auditor,entries,totalFotos});
  }else{
    const dataStr = new Date().toLocaleString("pt-BR");
    mainHtml =
`<div class="title">Relatório</div>
<div class="h-line"></div>
<div class="kvs">
  <div class="kv"><b>Prédio</b><span>${predio}</span></div>
  <div class="kv"><b>Endereço</b><span>${endereco}</span></div>
  <div class="kv"><b>Data</b><span>${dataStr}</span></div>
  <div class="kv"><b>Auditor</b><span>${auditor}</span></div>
</div>`;
  }

  let photosHtml = "";
  if(roomsWithPhotos.length){
    photosHtml = `<div class="h-line"></div><div class="title">Evidências</div><div class="h-line"></div>`;
    roomsWithPhotos.forEach(r=>{
      photosHtml += `<div class="report-room-photos">
        <div class="report-room-title">${r.statusEmoji} ${r.room} — ${r.status} (${r.photos.length} foto${r.photos.length>1?"s":""})</div>
        <div class="report-photo-thumbnails">` + r.photos.map(p=>`<img src="${p}" class="report-thumb" onclick="showFullscreenImage('${p}')" loading="lazy">`).join("") + `</div>
      </div>`;
    });
  }

  document.getElementById("relatorio").innerHTML = mainHtml + photosHtml;
}

/* ===== PNG (captura do mock de celular) ===== */
async function generateImage(){
  const phone = document.getElementById("phoneMock");
  if(!phone){ showToast("Nada para gerar"); return null; }
  showToast("📸 Gerando imagem...");
  try{
    const canvas = await html2canvas(phone,{scale:2,backgroundColor:null,logging:false,useCORS:true});
    return canvas.toDataURL('image/png');
  }catch(e){ showToast("❌ Erro ao gerar imagem"); return null; }
}
async function saveAsPNG(){
  const data = await generateImage(); if(!data) return;
  const link=document.createElement('a'); const pred=predioSel.value||"vistoria";
  const ts=new Date().toISOString().slice(0,19).replace(/:/g,'-');
  link.download=`vistoria_${pred}_${ts}.png`; link.href=data; link.click(); showToast("✅ Imagem salva!");
}

/* ===== Compartilhar (gera imagem e oferece ações) ===== */
async function openShareModal(){ const d=await generateImage(); if(!d)return; currentImageData=d; shareModal.classList.add("show"); }
function shareToWhatsApp(){
  if(!currentImageData) return;
  const text=`✨ RELATÓRIO DE VISTORIA ✨\n\n🏢 ${predioSel.value||"Prédio"}\n👤 Auditor: ${auditorInp.value||"Não informado"}\n📅 ${new Date().toLocaleString("pt-BR")}\n📊 Total de salas: ${entries.length}\n📸 Imagem anexada`;
  if(navigator.share){
    fetch(currentImageData).then(r=>r.blob()).then(b=>{
      navigator.share({title:'Relatório',text:text,files:[new File([b],"relatorio.png",{type:"image/png"})]});
    });
  }else{
    window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`);
  }
  shareModal.classList.remove("show");
}
function shareToTeams(){
  if(!currentImageData) return;
  const msg=`✨ Relatório de Vistoria — ${predioSel.value||"Vistoria"}\n📅 ${new Date().toLocaleString("pt-BR")}\n👤 Auditor: ${auditorInp.value||"Não informado"}\n📊 Total de salas: ${entries.length}\n📸 Imagem anexada`;
  navigator.clipboard.writeText(msg); showToast("✅ Mensagem copiada! Cole no Teams");
  const a=document.createElement('a'); a.download=`vistoria.png`; a.href=currentImageData; a.click();
  shareModal.classList.remove("show");
}
function shareToEmail(){
  if(!currentImageData) return;
  const subject=`Relatório de Vistoria - ${predioSel.value||"Vistoria"}`;
  const body=`Relatório gerado em ${new Date().toLocaleString("pt-BR")}\nAuditor: ${auditorInp.value||"Não informado"}\nTotal de salas: ${entries.length}\n\nImagem em anexo.`;
  window.location.href=`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  setTimeout(()=>{ const a=document.createElement('a'); a.download=`vistoria.png`; a.href=currentImageData; a.click(); },500);
  shareModal.classList.remove("show");
}
function shareSaveImage(){ if(!currentImageData) return; const a=document.createElement('a'); a.download=`vistoria_${predioSel.value||"vistoria"}.png`; a.href=currentImageData; a.click(); shareModal.classList.remove("show"); showToast("✅ Imagem salva!"); }

/* ===== Ações texto/CSV ===== */
function getReportText(){ return document.getElementById("relatorio")?.textContent || ""; }
function copyReportToClipboard(){
  const t=getReportText(); if(!t.trim()) return showToast("Relatório vazio");
  navigator.clipboard?.writeText(t).then(()=>showToast("Relatório copiado ✅"),
    ()=>{try{const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); showToast("Relatório copiado ✅")}catch{showToast("Não foi possível copiar")}})
}
function downloadReportTxt(){
  const t=getReportText(); if(!t.trim()) return showToast("Relatório vazio");
  const blob=new Blob([t],{type:"text/plain;charset=utf-8"}), url=URL.createObjectURL(blob);
  const a=document.createElement("a"); const pred=(predioSel.value||"Predio").replace(/\s+/g,'_'); const d=new Date();
  const st=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  a.href=url; a.download=`relatorio_vistoria_${pred}_${st}.txt`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); showToast("Download iniciado ⬇️");
}
function exportCsv(){
  const pred=predioSel.value||"Prédio", end=enderecoInp.value||"Endereço não informado", aud=auditorInp.value||"", dataStr=new Date().toLocaleString("pt-BR");
  const header=["Auditor","Predio","Endereco","Data","Andar","Sala","Status","QtdFotos"];
  const rows=entries.sort((a,b)=>a.f-b.f||a.r-b.r).map(e=>[aud,pred,end,dataStr,pad2(e.f),pad2(e.r),statusName(e.status),getRoomPhotos(e.f,e.r).length]);
  const csv=[header,...rows].map(l=>l.join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}), url=URL.createObjectURL(blob);
  const a=document.createElement("a"); const d=new Date();
  const st=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
  a.href=url; a.download=`vistoria_${pred.replace(/\s+/g,'_')}_${st}.csv`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); showToast("CSV exportado 🧾");
}

/* ===== Persistência & util ===== */
function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function showToast(msg){ let t=document.querySelector(".toast"); if(!t){ t=document.createElement("div"); t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2000); }

/* ===== Listeners ===== */
photoBtn.addEventListener("click", ()=> photoInput.click());
photoInput.addEventListener("change",(e)=>{
  const files=[...e.target.files];
  files.forEach(file=>{ const rd=new FileReader(); rd.onload=ev=> addPhotoToRoom(currentFloor,currentRoom,ev.target.result); rd.readAsDataURL(file); });
  photoInput.value="";
});

document.getElementById("btnPNG").addEventListener("click", saveAsPNG);
document.getElementById("btnShare").addEventListener("click", openShareModal);
document.getElementById("shareWhatsApp").addEventListener("click", shareToWhatsApp);
document.getElementById("shareTeams").addEventListener("click", shareToTeams);
document.getElementById("shareEmail").addEventListener("click", shareToEmail);
document.getElementById("shareSave").addEventListener("click", shareSaveImage);
document.getElementById("closeModal").addEventListener("click", ()=> shareModal.classList.remove("show"));
shareModal.addEventListener("click",(e)=>{ if(e.target===shareModal) shareModal.classList.remove("show"); });

document.getElementById("btnCopy").addEventListener("click", copyReportToClipboard);
document.getElementById("btnDownload").addEventListener("click", downloadReportTxt);
document.getElementById("btnCsv").addEventListener("click", exportCsv);
document.getElementById("useAI").addEventListener("change", renderReportWithPhotos);

document.getElementById("btnClear").addEventListener("click", ()=>{
  if(!confirm("⚠️ Limpar TODOS os registros e fotos?")) return;
  entries=[];
  // remover fotos com segurança (coleta as chaves antes)
  const keys=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith("photos_")) keys.push(k); }
  keys.forEach(k=> localStorage.removeItem(k));
  auditorInp.value=""; predioSel.value=""; enderecoInp.value="";
  persist(); renderCreated(); renderReportWithPhotos(); renderCurrentPhotos(); showToast("✓ Todos os dados removidos");
});

/* Endereço automático por prédio */
predioSel.addEventListener("change", ()=>{
  const v=predioSel.value;
  if(v==="Eco Berrini") enderecoInp.value="Av. Eng. Luís Carlos Berrini, 1376 - SP";
  else if(v==="Chucri Zaidan") enderecoInp.value="Av. Dr. Chucri Zaidan, 2460 - SP";
  else enderecoInp.value="";
  renderReportWithPhotos();
});

/* ===== Boot ===== */
(function init(){
  updateCurrentDisplay();
  renderCreated(); renderReportWithPhotos(); renderCurrentPhotos();
})();
</script>
