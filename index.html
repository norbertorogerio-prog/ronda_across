<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vivo Infra • V11 PRO</title>

<style>
:root{
 --vivo:#6A1B9A;
 --bg:#EEF2F7;
 --card:#FFF;
 --line:#D1D9E6;

 --valid:#1B5E20;
 --occ:#E65100;
 --lock:#424242;
 --prob:#B71C1C;
}

body{
 margin:0;
 font-family:system-ui;
 background:var(--bg);
}

.app{
 max-width:1200px;
 margin:auto;
 display:grid;
 grid-template-columns:320px 1fr;
 gap:15px;
 padding:10px;
}

.card{
 background:#fff;
 border-radius:16px;
 padding:15px;
 box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.viewer{
 display:flex;
 justify-content:center;
 background:#dde3ec;
 padding:20px;
 border-radius:20px;
}

.building{
 position:relative;
 width:360px;
 height:1000px;
}

.floor-label{
 position:absolute;
 left:-60px;
 font-size:10px;
 font-weight:800;
 color:#444;
}

.room{
 position:absolute;
 width:26px;
 height:14px;
 border-radius:3px;
 color:#fff;
 font-size:9px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:900;
 cursor:pointer;
 box-shadow: inset 0 -1px 2px rgba(0,0,0,0.3);
}

.highlight{
 position:absolute;
 width:100%;
 height:22px;
 background:rgba(106,27,154,0.15);
}

button{
 width:100%;
 padding:10px;
 border:none;
 border-radius:10px;
 margin-top:5px;
 font-weight:800;
}

.btn{ background:var(--vivo); color:#fff; }
.btn2{ background:#000; color:#fff; }

</style>
</head>

<body>

<div class="app">

<div class="card">
<input id="resp" placeholder="Responsável"/>

<select id="floor"></select>
<select id="room"></select>

<select id="status">
<option value="valid">OK</option>
<option value="occ">Ocupada</option>
<option value="lock">Trancada</option>
<option value="prob">Problema</option>
</select>

<button class="btn" id="apply">Aplicar</button>
<button class="btn2" id="export">Exportar 4K</button>

<div id="ai"></div>
</div>

<div class="viewer">
<div class="building" id="building"></div>
</div>

</div>

<script>

const FLOOR_HEIGHT = 22;
const BUILDING_TOP = 40;
const COLS = 8;

const floorConfig = {
  32: 34, 31: 25, 30: 40,
};

let rooms = JSON.parse(localStorage.getItem("v11")||"{}");

const b = document.getElementById("building");

function color(s){
 return s==="valid"?"#1B5E20":
 s==="occ"?"#E65100":
 s==="lock"?"#424242":"#B71C1C";
}

function draw(){

 b.innerHTML="";

 for(let f=32;f>=1;f--){
  let y = BUILDING_TOP + (32-f)*FLOOR_HEIGHT;

  let lbl = document.createElement("div");
  lbl.className="floor-label";
  lbl.style.top=y+"px";
  lbl.innerText="Andar "+f;
  b.appendChild(lbl);

  let hl = document.createElement("div");
  hl.className="highlight";
  hl.style.top=y+"px";
  b.appendChild(hl);

  let total = floorConfig[f] || 32;
  let cols = Math.ceil(total/4);

  for(let r=1;r<=total;r++){

   let col = (r-1)%cols;
   let rowOffset = Math.floor((r-1)/cols);

   let x = 80 + col*30;
   let y2 = y + rowOffset*14;

   let key = f+"-"+r;

   let d = document.createElement("div");
   d.className="room";
   d.style.left=x+"px";
   d.style.top=y2+"px";

   if(rooms[key]){
     d.style.background=color(rooms[key]);
     d.innerText=r.toString().padStart(2,"0");
   }else{
     d.style.background="#cbd5e1";
   }

   d.onclick=()=>{
     let s = prompt("Status (v/o/t/p)");
     if(!s)return;
     let map={v:"valid",o:"occ",t:"lock",p:"prob"};
     rooms[key]=map[s];
     save();
     draw();
   }

   b.appendChild(d);
  }
 }

 gerarIA();
}

function save(){
 localStorage.setItem("v11",JSON.stringify(rooms));
}

function gerarIA(){
 let s={valid:0,occ:0,lock:0,prob:0};
 Object.values(rooms).forEach(v=>s[v]++);

 let insight="";
 if(s.prob>5) insight="⚠️ Alto volume de problemas";
 else if(s.lock>s.valid) insight="🔒 Acesso comprometido";
 else insight="✅ Operação saudável";

 document.getElementById("ai").innerHTML=
 `OK:${s.valid} | OCC:${s.occ} | LOCK:${s.lock} | PROB:${s.prob}<br>${insight}`;
}

document.getElementById("apply").onclick=()=>{
 let f=document.getElementById("floor").value;
 let r=document.getElementById("room").value;
 let s=document.getElementById("status").value;
 rooms[f+"-"+r]=s;
 save();
 draw();
};

document.getElementById("export").onclick=()=>{

 let canvas=document.createElement("canvas");
 let ctx=canvas.getContext("2d");

 canvas.width=1600;
 canvas.height=2400;

 ctx.fillStyle="#fff";
 ctx.fillRect(0,0,1600,2400);

 ctx.scale(4,4);

 for(let f=32;f>=1;f--){
  let y = BUILDING_TOP + (32-f)*FLOOR_HEIGHT;

  ctx.fillStyle="#000";
  ctx.fillText("Andar "+f,10,y+10);

  let total = floorConfig[f] || 32;
  let cols = Math.ceil(total/4);

  for(let r=1;r<=total;r++){
   let col=(r-1)%cols;
   let rowOffset=Math.floor((r-1)/cols);

   let x=80+col*30;
   let y2=y+rowOffset*14;

   let key=f+"-"+r;

   ctx.fillStyle=rooms[key]?color(rooms[key]):"#ddd";
   ctx.fillRect(x,y2,26,14);

   ctx.fillStyle="#fff";
   ctx.fillText(r,x+5,y2+10);
  }
 }

 let link=document.createElement("a");
 link.download="Checklist_Infra_4K.png";
 link.href=canvas.toDataURL();
 link.click();
};

function init(){
 let fSel=document.getElementById("floor");
 let rSel=document.getElementById("room");

 for(let i=32;i>=1;i--){
  let op=new Option("Andar "+i,i);
  fSel.add(op);
 }

 for(let i=1;i<=50;i++){
  let op=new Option("Sala "+i,i);
  rSel.add(op);
 }

 draw();
}

init();

</script>

</body>
</html>
