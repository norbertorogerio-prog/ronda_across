<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Ronda Mobile</title>

<style>
:root{
  --vivo:#6A1B9A; --vivo-dark:#4A0072;
  --valid:#2ECC71; --lock:#9E9E9E; --occ:#FF9800; --prob:#E53935;
  --bg:#F6F3F9; --card:#FFFFFF; --line:#E9E2EE; --ink:#2B2B2B;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

/* HEADER FIXO */
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  color:white;
  font-weight:700;
}

/* CANVAS FULL */
.canvas{
  height:calc(100vh - 60px);
  position:relative;
  overflow:hidden;
}

.overlay{
  position:absolute;
  inset:0;
}

/* LINHAS */
.row{
  position:absolute;
  left:60px;
  right:10px;
  display:flex;
  gap:8px;
}

/* ANDAR */
.label{
  position:absolute;
  left:10px;
  font-size:12px;
  font-weight:800;
}

/* SALAS (TOQUE) */
.slot{
  min-width:52px;
  height:34px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:900;
  font-size:16px;
  border:2px solid white;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}

.valid{background:var(--valid)}
.lock{background:var(--lock)}
.occ{background:var(--occ)}
.prob{background:var(--prob)}

/* BOTÃO FLUTUANTE */
#fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  border:none;
  color:white;
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  box-shadow:0 6px 20px rgba(0,0,0,.3);
}

/* OBS */
#obs{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  background:white;
  padding:8px;
  border-radius:10px;
  font-size:12px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="topbar">
  <span>Ronda</span>
  <span id="count"></span>
</div>

<div class="canvas">
  <div class="overlay" id="overlay"></div>
  <div id="obs">Toque para adicionar observação</div>
</div>

<button id="fab">＋</button>

<script>
const overlay = document.getElementById("overlay");
const count = document.getElementById("count");
const obs = document.getElementById("obs");

const order = ["VALIDADA","OCUPADA","TRANCADA","PROBLEMA"];

let state = JSON.parse(localStorage.getItem("ronda") || '{"items":[]}');

function save(){
  localStorage.setItem("ronda", JSON.stringify(state));
}

function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s];
}

function render(){
  overlay.replaceChildren();

  const floors = {};
  state.items.forEach(i => (floors[i.floor] ||= []).push(i));

  const keys = Object.keys(floors).sort((a,b)=>b-a);

  keys.forEach((f,i)=>{
    const y = 60 + i*50;

    const label = document.createElement("div");
    label.className = "label";
    label.style.top = y+"px";
    label.textContent = "Andar " + f;
    overlay.appendChild(label);

    const row = document.createElement("div");
    row.className = "row";
    row.style.top = y+"px";

    floors[f].forEach(r=>{
      const el = document.createElement("div");
      el.className = "slot " + cls(r.status);
      el.textContent = r.room;

      el.onclick = () => {
        const next = order[(order.indexOf(r.status)+1)%4];
        r.status = next;
        save();
        render();
      };

      row.appendChild(el);
    });

    overlay.appendChild(row);
  });

  count.textContent = state.items.length + " salas";
}

document.getElementById("fab").onclick = () => {
  const val = prompt("Sala (ex: 29-02)");
  if(!val) return;

  const m = val.match(/(\d+)[-\/](\d+)/);
  if(!m) return alert("Formato inválido");

  state.items.push({
    floor:parseInt(m[1]),
    room:m[2].padStart(2,"0"),
    status:"VALIDADA"
  });

  save();
  render();
};

obs.onclick = () => {
  const txt = prompt("Observações", obs.textContent);
  if(txt !== null){
    obs.textContent = txt;
  }
};

render();
</script>

</body>
</html>
