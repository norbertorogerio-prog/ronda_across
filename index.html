<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ronda Inteligente</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#F6F3F9;
  padding:12px;
}

.card{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.building{
  background:white;
  border-radius:16px;
  overflow:hidden;
}

.top{
  background:#6A1B9A;
  color:white;
  padding:12px;
  font-weight:bold;
}

.floors{
  padding:12px;
}

.floor{
  margin-bottom:12px;
}

.label{
  font-weight:bold;
  margin-bottom:6px;
}

.rooms{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
  gap:6px;
}

.slot{
  height:30px;
  border-radius:6px;
  background:#bbb;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
}

.valid{background:#2ECC71}
.lock{background:#9E9E9E}
.occ{background:#FF9800}
.prob{background:#E53935}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:flex-end;
}

.modal-box{
  background:white;
  width:100%;
  padding:16px;
  border-radius:16px 16px 0 0;
}

.modal button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.validBtn{background:#2ECC71;color:white}
.lockBtn{background:#9E9E9E;color:white}
.occBtn{background:#FF9800;color:white}
.probBtn{background:#E53935;color:white}
</style>
</head>

<body>

<div class="card">
  <input id="predio" placeholder="Nome do prédio" value="ECO BERRINI">
  <input id="resp" placeholder="Responsável">
</div>

<div class="building" id="canvas">
  <div class="top" id="title">ECO BERRINI</div>
  <div class="floors" id="floors"></div>
</div>

<div class="card">
  <button onclick="exportPNG()">📸 Gerar imagem</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <button class="validBtn" onclick="setStatus('VALIDADA')">✅ Validado</button>
    <button class="lockBtn" onclick="setStatus('TRANCADA')">🔒 Trancado</button>
    <button class="occBtn" onclick="setStatus('OCUPADA')">🟠 Ocupada</button>
    <button class="probBtn" onclick="setStatus('PROBLEMA')">🔴 Problema</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const floorsEl = document.getElementById("floors");
const modal = document.getElementById("modal");

let current = null;

// CONFIG PRÉDIO
let structure = [];

for(let f=32; f>=1; f--){
  for(let r=1; r<=10; r++){
    structure.push({
      floor:f,
      room:String(r).padStart(2,"0"),
      status:null
    });
  }
}

// RENDER
function render(){
  let floors = {};
  structure.forEach(i=>{
    if(!floors[i.floor]) floors[i.floor]=[];
    floors[i.floor].push(i);
  });

  floorsEl.innerHTML = Object.keys(floors).map(f=>`
    <div class="floor">
      <div class="label">Andar ${f}</div>
      <div class="rooms">
        ${floors[f].map(r=>`
          <div class="slot ${cls(r.status)}"
            onclick="openModal(${f},'${r.room}')">
            ${r.room}
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");

  document.getElementById("title").innerText =
    document.getElementById("predio").value;
}

function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s] || "";
}

// MODAL
function openModal(floor,room){
  current = structure.find(x=>x.floor==floor && x.room==room);
  modal.style.display="flex";
}

function setStatus(status){
  if(current){
    current.status = status;
    render();
  }
  modal.style.display="none";
}

// EXPORT
async function exportPNG(){
  const canvas = await html2canvas(document.getElementById("canvas"),{scale:2});
  const a = document.createElement("a");
  a.href = canvas.toDataURL();
  a.download = "ronda.png";
  a.click();
}

// INIT
render();
</script>

</body>
</html>
