<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Prédio SVG • Alinhamento Fixo 100%</title>
<style>
 :root{
  --vivo:#6A1B9A; --vivo-dark:#4A0072;
  --valid:#2ECC71; --occ:#FF9800; --lock:#9E9E9E; --prob:#E53935;
  --bg:#F6F3F9; --card:#FFFFFF; --line:#E6E1EF;
 }

 *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
 body{
  background:var(--bg); color:#2B2B2B;
  font:500 14px/1.2 system-ui,"Segoe UI";
  padding: 10px;
  overflow-x: hidden; /* Trava o balanço lateral da tela */
 }

 .app{ max-width:1100px; margin:0 auto; display: flex; flex-direction: column; gap:15px; }
 @media (min-width:900px){ .app{ display: grid; grid-template-columns: 320px 1fr; align-items: start; } }

 .card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:15px; box-shadow:0 4px 10px rgba(0,0,0,0.03); }

 label{ font-size:11px; color:#666; margin-bottom:4px; display:block; font-weight: 700; text-transform: uppercase; }
 select, input, textarea, button { width:100%; border:1px solid var(--line); border-radius:8px; padding:12px; font:inherit; margin-bottom: 10px; }

 button{ background: var(--vivo); color:#fff; font-weight:800; border:none; cursor:pointer; }
 button:active{ opacity: 0.8; }
 .btn-ok { width: 60px; background: #444; margin-left: 5px; }
 .btn-clear { background: #fff; color: #e74c3c; border: 1px solid #ffcccc; margin-top: 5px; }
 .btn-png { background: #27ae60; padding: 16px; font-size: 16px; margin-top: 10px; }
 .row-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

 /* VISUALIZAÇÃO TRAVADA (FIXA) */
 .viewer-card { 
  display: flex; 
  justify-content: center; 
  background: #fff; 
  padding: 20px 0; 
  overflow-x: auto; /* Permite scroll se o celular for muito pequeno, mas não "samba" */
 }
 
 .building-container {
  position: relative;
  display: flex;
  width: 400px; /* Largura total fixa para evitar quebras */
  flex-shrink: 0;
  height: 880px; /* Altura fixa para estabilizar */
 }

 .floors-labels-col {
  display: flex;
  flex-direction: column;
  /* AJUSTE DE PRECISÃO: Subi alguns milímetros para alinhar com o centro da janela */
  padding-top: 36px; 
  width: 75px;
  flex-shrink: 0;
 }

 .f-lbl {
  height: 22px; /* Altura idêntica à repetição do SVG */
  font-size: 11px;
  font-weight: 800;
  color: var(--vivo);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 12px;
 }

 .facade-wrapper { 
  position: relative; 
  width: 320px; 
  height: 860px;
  flex-shrink: 0; 
 }
 
 #facade-svg { width: 320px; height: 860px; display: block; }
 
 .overlay-badges { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
 
 .badge {
  position: absolute; 
  width: 24px; 
  height: 12px;
  border-radius: 2px; 
  color: #fff; 
  font-size: 9px; 
  font-weight: 900;
  display: flex; 
  align-items: center; 
  justify-content: center;
  pointer-events: auto;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset;
 }

 #footerNoteDisplay {
    position: absolute; bottom: 12px; left: 0; width: 100%;
    text-align: center; font-weight: 800; color: var(--vivo-dark); padding: 0 10px; font-size: 12px;
 }
</style>
</head>

<body>
<div class="app">

  <div class="card">
    <label>Localização</label>
    <div style="display:flex; gap:5px">
      <select id="selFloor"></select>
      <select id="selRoom"></select>
    </div>

    <label>Status</label>
    <select id="selStatus">
      <option value="valid">✅ Validada</option>
      <option value="occ">🟠 Ocupada</option>
      <option value="lock">🔒 Trancada</option>
      <option value="prob">❌ Problema</option>
      <option value="none">🗑️ Remover</option>
    </select>

    <label>Observações</label>
    <textarea id="obsText" rows="2" placeholder="Notas do rodapé..."></textarea>

    <button id="btnApply" style="background:var(--vivo-dark)">APLICAR NO MAPA</button>

    <label style="margin-top:10px">Entrada Rápida</label>
    <div style="display:flex">
      <input id="quickInput" type="text" placeholder="32-05-v">
      <button id="btnQuick" class="btn-ok">OK</button>
    </div>

    <div class="row-btns">
      <button id="btnSave" style="background:#f4f4f9; color:var(--vivo)">Salvar JSON</button>
      <button id="btnLoad" style="background:#f4f4f9; color:var(--vivo)">Abrir JSON</button>
    </div>
    <button id="btnClear" class="btn-clear">LIMPAR TUDO</button>
    <button id="btnPNG" class="btn-png">📸 EXPORTAR PNG</button>
  </div>

  <div class="card viewer-card">
    <div class="building-container">
      
      <div class="floors-labels-col" id="floorsCol"></div>

      <div class="facade-wrapper">
        <svg id="facade-svg" viewBox="0 0 320 860" xmlns="http://www.w3.org/2000/svg">
          <rect width="320" height="860" rx="10" fill="#E6EAF0" stroke="#B9C1CE" stroke-width="1"/>
          <text x="160" y="22" text-anchor="middle" font-weight="900" font-size="13" fill="#6A1B9A">VIVO</text>
          
          <g id="winGroup" transform="translate(22,40)" fill="#DDE8F7" stroke="#BFC9D8"></g>
          
          <rect y="820" width="320" height="40" fill="#D6CDE7" rx="0 0 10 10"/>
        </svg>
        
        <div class="overlay-badges" id="overlay"></div>
        <div id="footerNoteDisplay"></div>
      </div>

    </div>
  </div>

</div>

<script>
const $ = s => document.querySelector(s);
const STORAGE_KEY = "predio_v5_final_fix";
let rooms = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

function init() {
  const fSel = $("#selFloor");
  const rSel = $("#selRoom");
  const fCol = $("#floorsCol");
  const winG = $("#winGroup");

  for (let f = 32; f >= 1; f--) {
    fSel.appendChild(new Option(`Andar ${f}`, f));
    const lbl = document.createElement("div");
    lbl.className = "f-lbl";
    lbl.textContent = `Andar ${f}`;
    fCol.appendChild(lbl);
  }
  for (let r = 1; r <= 50; r++) rSel.appendChild(new Option(`Sala ${String(r).padStart(2,'0')}`, r));

  for (let r = 0; r < 32; r++) {
    for (let c = 0; c < 8; c++) {
      const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      rect.setAttribute("x", c * 35); 
      rect.setAttribute("y", r * 22);
      rect.setAttribute("width", 24); 
      rect.setAttribute("height", 12); 
      rect.setAttribute("rx", 2);
      winG.appendChild(rect);
    }
  }
  render();
}

function render() {
  const overlay = $("#overlay");
  overlay.innerHTML = "";
  Object.keys(rooms).forEach(key => {
    const [f, r] = key.split('-').map(Number);
    const status = rooms[key];
    const row = 32 - f;
    const col = (r - 1) % 8;

    const b = document.createElement("div");
    b.className = `badge ${status}`;
    b.style.backgroundColor = getHex(status);
    b.textContent = String(r).padStart(2,'0');
    b.style.top = (40 + row * 22) + "px";
    b.style.left = (22 + col * 35) + "px";
    overlay.appendChild(b);
  });
  
  const obs = localStorage.getItem(STORAGE_KEY + "_obs") || "";
  $("#footerNoteDisplay").textContent = obs;
  $("#obsText").value = obs;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rooms));
}

function getHex(s) {
  return s==='valid'?'#2ECC71': s==='occ'?'#FF9800': s==='lock'?'#9E9E9E':'#E53935';
}

$("#btnApply").onclick = () => {
  const f = $("#selFloor").value, r = $("#selRoom").value, s = $("#selStatus").value;
  if(s === 'none') delete rooms[`${f}-${r}`];
  else rooms[`${f}-${r}`] = s;
  localStorage.setItem(STORAGE_KEY + "_obs", $("#obsText").value);
  render();
};

$("#btnQuick").onclick = () => {
  const v = $("#quickInput").value.toLowerCase().split('-');
  if(v.length < 3) return;
  const f = parseInt(v[0]), r = parseInt(v[1]), sChar = v[2][0];
  let s = sChar==='v'?'valid': sChar==='o'?'occ': sChar==='t'?'lock': sChar==='p'?'prob':'none';
  if(s === 'none') delete rooms[`${f}-${r}`]; else rooms[`${f}-${r}`] = s;
  render();
  $("#quickInput").value = "";
};

$("#btnClear").onclick = () => { if(confirm("Limpar dados?")) { rooms={}; localStorage.clear(); render(); } };

$("#btnSave").onclick = () => {
  const blob = new Blob([JSON.stringify({rooms, obs: $("#obsText").value})], {type:"application/json"});
  const a = document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="mapa.json"; a.click();
};

$("#btnLoad").onclick = () => {
  const i = document.createElement("input"); i.type="file";
  i.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      const d = JSON.parse(ev.target.result);
      rooms = d.rooms; localStorage.setItem(STORAGE_KEY+"_obs", d.obs); render();
    };
    reader.readAsText(e.target.files[0]);
  };
  i.click();
};

$("#btnPNG").onclick = async () => {
    const btn = $("#btnPNG"); btn.textContent = "GERANDO...";
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 400; canvas.height = 900;
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,400,900);

    ctx.fillStyle = "#E6EAF0"; ctx.beginPath();
    ctx.roundRect(75, 10, 320, 850, 10); ctx.fill();

    ctx.fillStyle = "#6A1B9A"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("VIVO", 235, 32);

    ctx.font = "bold 10px sans-serif"; ctx.textAlign = "right";
    for(let f=32; f>=1; f--) {
        ctx.fillText("Andar "+f, 70, 36 + (32-f)*22 + 10.5);
    }

    Object.keys(rooms).forEach(key => {
        const [f, r] = key.split('-').map(Number);
        const st = rooms[key];
        ctx.fillStyle = getHex(st);
        const x = 75 + 22 + ((r-1)%8)*35;
        const y = 40 + (32-f)*22;
        ctx.beginPath(); ctx.roundRect(x, y, 24, 12, 2); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "900 8px sans-serif";
        ctx.textAlign = "center"; ctx.fillText(String(r).padStart(2,'0'), x+12, y+9);
    });

    ctx.fillStyle = "#6A1B9A"; ctx.font = "bold 12px sans-serif";
    ctx.fillText($("#obsText").value, 200, 885);

    const link = document.createElement("a");
    link.download = "mapa-predio.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    btn.textContent = "📸 EXPORTAR PNG";
};

if (!Path2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
    this.beginPath(); this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r);
    this.arcTo(x+w,y+h,x,y+h,r); this.arcTo(x,y+h,x,y,r);
    this.arcTo(x,y,x+w,y,r); this.closePath(); return this;
  };
}

init();
</script>
</body>
</html>
