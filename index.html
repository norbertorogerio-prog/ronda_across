<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Relatório de Vistoria</title>

<style>
body {
  background: #0b3d2e;
  font-family: Arial, sans-serif;
  padding: 20px;
  color: #fff;
}
.app {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  gap: 20px;
}
@media (min-width: 900px){
  .app { grid-template-columns: 350px 1fr; }
}
.card {
  background: rgba(255,255,255,0.1);
  padding: 16px;
  border-radius: 12px;
  backdrop-filter: blur(4px);
}
label {
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}
input, textarea, select, button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 14px;
  font-size: 14px;
}
textarea { min-height: 80px; resize: vertical; }
button {
  background: #6A1B9A;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}
button:hover { opacity: 0.9; }

#relatorioBox {
  white-space: pre-wrap;
  font-family: "Courier New", monospace;
  font-size: 14px;
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="app">

  <!-- FORM -->
  <div class="card">
    <label>👤 Auditor</label>
    <input id="auditor" placeholder="Nome completo"/>

    <label>🏢 Prédio</label>
    <input id="predio" placeholder="Ex: ECO Berrini"/>

    <label>📍 Endereço</label>
    <input id="endereco" placeholder="Ex: Av. Eng. Luis Carlos Berrini, 1376"/>

    <label>📝 Informações do relatório</label>
    <textarea id="info" placeholder="Descreva detalhes da vistoria..."></textarea>

    <button onclick="gerarRelatorio()">Gerar Relatório</button>
  </div>

  <!-- RELATÓRIO -->
  <div class="card">
    <h3>RELATÓRIO</h3>
    <div id="relatorioBox">Preencha os dados ao lado e clique em **Gerar Relatório**.</div>
  </div>

</div>

<script>
function gerarRelatorio() {
  const auditor  = document.getElementById("auditor").value || "Não informado";
  const predio   = document.getElementById("predio").value || "Prédio";
  const endereco = document.getElementById("endereco").value || "Endereço não informado";
  const info     = document.getElementById("info").value || "Nenhuma informação registrada.";

  const data = new Date().toLocaleString("pt-BR");

  const texto = 
`📋 RELATÓRIO DE VISTORIA — ${predio}
📍 ${endereco}
━━━━━━━━━━━━━━━━━━━━━━━━━━
📅 ${data}
👤 Auditor: ${auditor}
━━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ Informações do relatório:
${info}
`;

  document.getElementById("relatorioBox").textContent = texto;
}
</script>

</body>
</html>
