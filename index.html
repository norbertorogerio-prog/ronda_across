<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
<title>Ronda • Prédio Eco Berrini</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#F6F3F9;font-family:system-ui,sans-serif;padding:16px}
  .card{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
  input,select,textarea,button{width:100%;padding:12px;border:1px solid #ddd;border-radius:12px;font-size:16px}
  button{background:#6A1B9A;color:white;border:none;font-weight:bold;cursor:pointer}
  button.ghost{background:white;color:#6A1B9A;border:1px solid #6A1B9A}
  .grid{display:grid;gap:12px}
  .cols-2{grid-template-columns:1fr 1fr}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;background:white;padding:12px;border-radius:16px}
  .pill{display:flex;align-items:center;gap:8px;padding:6px 14px;background:#f5f5f5;border-radius:30px;font-size:13px}
  .dot{width:14px;height:14px;border-radius:4px}
  .dot.verde{background:#2ECC71}
  .dot.cinza{background:#9E9E9E}
  .dot.laranja{background:#FF9800}
  .dot.vermelho{background:#E53935}
  .kbar{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .kbtn{flex:1;background:white;color:#6A1B9A;border:1px solid #6A1B9A;padding:10px;border-radius:12px;min-width:80px}
  .canvas-wrap{background:white;border-radius:16px;overflow:hidden;position:relative}
  .topbar{background:#6A1B9A;padding:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;color:white}
  .vivo-badge{background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px}
  
  /* Área do mapa com imagem de fundo */
  .mapa-container {
    position: relative;
    width: 100%;
    background: #f5f5f5;
  }
  
  .mapa-imagem {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
  }
  
  .overlay-salas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  
  .sala-marcador {
    position: absolute;
    background: #2ECC71;
    color: white;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 8px;
    border-radius: 20px;
    border: 2px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.2s;
    white-space: nowrap;
    z-index: 10;
    font-family: monospace;
  }
  
  .sala-marcador:hover {
    transform: scale(1.05);
    z-index: 20;
  }
  
  .sala-marcador.problema { background: #E53935; }
  .sala-marcador.trancada { background: #9E9E9E; }
  .sala-marcador.ocupada { background: #FF9800; }
  
  .obs-container{padding:12px;background:white;border-top:1px solid #eee}
  .summary-bottom{padding:12px;display:flex;justify-content:space-between;background:#f9f9f9;border-top:2px solid #6A1B9A;flex-wrap:wrap;gap:8px}
  
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:black;color:white;padding:12px 20px;border-radius:30px;font-size:14px;z-index:9999;white-space:nowrap}
  .loading-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:10000}
  .loading-content{background:white;padding:24px;border-radius:16px;text-align:center}
  .spinner{width:40px;height:40px;border:4px solid #ddd;border-top-color:#6A1B9A;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  
  @media(max-width:480px){
    .sala-marcador{font-size:10px;padding:2px 6px}
  }
</style>
</head>
<body>

<div class="card">
  <div class="cols-2" style="display:grid;gap:12px">
    <div><label>🏢 Prédio</label><input id="predio" value="Prédio Eco Berrini"></div>
    <div><label>👥 Responsáveis</label><input id="tecnicos" placeholder="Ex: João, Maria"></div>
  </div>
</div>

<div class="card">
  <div class="cols-2" style="display:grid;gap:12px">
    <div><label>➕ Adicionar sala</label><input id="onePair" placeholder="29-02"></div>
    <div><label>📌 Status</label><select id="oneStatus"><option value="VALIDADA">✅ Validado</option><option value="TRANCADA">🔒 Trancada</option><option value="OCUPADA">🟠 Ocupada</option><option value="PROBLEMA">🔴 Problema</option></select></div>
  </div>
  <div class="cols-2" style="display:grid;gap:12px;margin-top:12px">
    <button id="btnAdd">➕ Adicionar</button>
    <button id="btnClear" class="ghost">🗑️ Limpar tudo</button>
  </div>
</div>

<div class="card">
  <label>📋 Lista rápida</label>
  <textarea id="bulk" rows="3" placeholder="29-02&#10;29-05 ocupada&#10;28-03 problema"></textarea>
  <label style="margin-top:12px">📝 Observações</label>
  <textarea id="observacoes" rows="2"></textarea>
  <div class="kbar">
    <button id="btnApply" class="kbtn">📋 Aplicar</button>
    <button id="btnLoadBg" class="kbtn">🖼️ Fundo</button>
    <button id="btnClearBg" class="kbtn">🗑️ Fundo</button>
    <button id="btnPNG" class="kbtn">📸 Salvar</button>
    <input type="file" id="bgFile" style="display:none">
  </div>
  <div class="legend">
    <div class="pill"><span class="dot verde"></span> Validado</div>
    <div class="pill"><span class="dot cinza"></span> Trancada</div>
    <div class="pill"><span class="dot laranja"></span> Ocupada</div>
    <div class="pill"><span class="dot vermelho"></span> Problema</div>
  </div>
</div>

<div class="canvas-wrap" id="exportCanvas">
  <div class="topbar">
    <span class="vivo-badge">vivo</span>
    <div><strong id="sumPredio">Prédio</strong><br><span id="sumResp" style="font-size:11px"></span></div>
    <span id="sumRight" style="background:rgba(0,0,0,0.3);padding:4px 10px;border-radius:20px">0 salas</span>
  </div>
  
  <!-- Área do mapa com imagem do prédio -->
  <div class="mapa-container" id="mapaContainer">
    <img id="mapaPredio" class="mapa-imagem" src="" alt="Prédio Eco Berrini - Mapa de Andares">
    <div class="overlay-salas" id="overlaySalas"></div>
  </div>
  
  <div class="obs-container"><div id="obsBox">Nenhuma observação</div></div>
  <div class="summary-bottom"><div id="statusBadges"></div><span id="sumDate"></span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(function(){
const $=x=>document.querySelector(x);
let loadingDiv=null;

// Posições dos andares na imagem (percentual do topo)
// Ajuste esses valores conforme a posição exata de cada andar na sua imagem
const posicoesAndares = {
  32: 8.5,   // Cobertura
  31: 14.5,
  30: 20.5,
  29: 26.5,
  28: 32.5,
  27: 38.5,
  26: 44.5,
  25: 50.5,
  24: 56.5,
  23: 62.5,
  22: 68.5,
  21: 74.5,
  20: 80.5,
  19: 86.5,
  18: 92.5
};

// Posição horizontal dos marcadores (percentual da largura)
const posX = 85; // 85% da largura (lado direito)

const state={items:[],bg:null};
const pad2=n=>String(n).padStart(2,'0');

function toast(m,isError=false){
  let t=document.createElement('div');
  t.className='toast';
  t.textContent=m;
  t.style.background=isError?'#c0392b':'black';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function showLoading(){
  if(loadingDiv) return;
  loadingDiv=document.createElement('div');
  loadingDiv.className='loading-modal';
  loadingDiv.innerHTML='<div class="loading-content"><div class="spinner"></div><div>Gerando imagem...</div></div>';
  document.body.appendChild(loadingDiv);
}

function hideLoading(){
  if(loadingDiv){
    loadingDiv.remove();
    loadingDiv=null;
  }
}

// Carregar imagem do prédio
function carregarImagemPredio() {
  // URL da imagem do prédio (substitua pela sua)
  const imgUrl = "https://i.imgur.com/placeholder.jpg"; // <-- COLE A URL DA SUA IMAGEM AQUI
  
  const img = $("#mapaPredio");
  img.onload = () => {
    renderizarMarcadores();
  };
  img.onerror = () => {
    console.warn("Imagem não encontrada, criando fallback");
    criarFallbackImagem();
  };
  img.src = imgUrl;
}

// Fallback caso a imagem não carregue
function criarFallbackImagem() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 600;
  canvas.height = 800;
  
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#2c3e50';
  ctx.font = 'bold 20px system-ui';
  ctx.fillText('ECO BERRINI', canvas.width/2 - 80, 40);
  
  ctx.fillStyle = '#666';
  ctx.font = '14px monospace';
  let y = 80;
  const andares = [32,31,30,29,28,27,26,25,24,23,22,21,20,19,18];
  andares.forEach((andar) => {
    ctx.fillStyle = '#999';
    ctx.fillRect(30, y - 8, 25, 16);
    ctx.fillStyle = '#333';
    ctx.fillText(andar, 38, y + 2);
    ctx.fillStyle = '#ddd';
    ctx.fillRect(70, y - 8, canvas.width - 100, 16);
    y += 42;
  });
  
  ctx.fillStyle = '#888';
  ctx.font = '10px system-ui';
  ctx.fillText('Av. Eng. Luiz Carlos Berrini, 1376', canvas.width/2 - 120, canvas.height - 20);
  
  $("#mapaPredio").src = canvas.toDataURL();
  setTimeout(renderizarMarcadores, 100);
  toast("⚠️ Usando visualização padrão. Adicione a URL da sua imagem do prédio no código.");
}

// Renderizar marcadores das salas sobre a imagem
function renderizarMarcadores() {
  const overlay = $("#overlaySalas");
  overlay.innerHTML = '';
  
  const img = $("#mapaPredio");
  if (!img.complete || img.naturalWidth === 0) {
    setTimeout(renderizarMarcadores, 200);
    return;
  }
  
  state.items.forEach((sala, index) => {
    const posY = posicoesAndares[sala.floor];
    if (posY !== undefined) {
      const marcador = document.createElement('div');
      let statusClass = '';
      if (sala.status === 'PROBLEMA') statusClass = 'problema';
      else if (sala.status === 'TRANCADA') statusClass = 'trancada';
      else if (sala.status === 'OCUPADA') statusClass = 'ocupada';
      
      marcador.className = `sala-marcador ${statusClass}`;
      const icon = sala.status === 'PROBLEMA' ? '🔴' : sala.status === 'TRANCADA' ? '🔒' : sala.status === 'OCUPADA' ? '🟠' : '✅';
      marcador.textContent = `${icon} ${sala.floor}-${sala.room}`;
      
      marcador.style.left = `${posX}%`;
      marcador.style.top = `${posY}%`;
      marcador.style.transform = 'translateX(-50%) translateY(-50%)';
      
      marcador.onclick = (e) => {
        e.stopPropagation();
        if(confirm(`Remover sala ${sala.floor}-${sala.room}?`)) {
          state.items = state.items.filter((_, i) => i !== index);
          renderizarMarcadores();
          renderStats();
          toast(`🗑️ Sala ${sala.floor}-${sala.room} removida`);
        }
      };
      
      overlay.appendChild(marcador);
    }
  });
}

function renderStats(){
  $("#sumPredio").innerHTML=$("#predio").value;
  $("#sumResp").innerHTML=$("#tecnicos").value;
  $("#obsBox").innerHTML=$("#observacoes").value.trim()||"Nenhuma observação";
  
  let dist={VALIDADA:0,TRANCADA:0,OCUPADA:0,PROBLEMA:0};
  state.items.forEach(x=>dist[x.status]++);
  let probs=dist.TRANCADA+dist.OCUPADA+dist.PROBLEMA;
  $("#sumRight").innerHTML=`${state.items.length} salas • ${probs} problemas`;
  $("#statusBadges").innerHTML=`
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <span>✅ ${dist.VALIDADA}</span>
      <span>🔒 ${dist.TRANCADA}</span>
      <span>🟠 ${dist.OCUPADA}</span>
      <span>🔴 ${dist.PROBLEMA}</span>
    </div>
  `;
  $("#sumDate").innerHTML=new Date().toLocaleString('pt-BR');
  
  let oldBg=document.getElementById('bgCustom');
  if(oldBg) oldBg.remove();
  if(state.bg){
    let bgDiv=document.createElement('div');
    bgDiv.id='bgCustom';
    bgDiv.style.cssText='position:absolute;inset:0;background-image:url('+state.bg+');background-size:cover;background-position:center;opacity:0.3;z-index:0;pointer-events:none';
    let wrapper=$("#exportCanvas");
    wrapper.style.position='relative';
    wrapper.insertBefore(bgDiv, wrapper.firstChild);
  }
}

function renderCompleto(){
  renderStats();
  renderizarMarcadores();
}

async function salvarImagem(){
  const btn=$("#btnPNG");
  const textoOriginal=btn.innerHTML;
  
  try{
    showLoading();
    btn.innerHTML="⏳...";
    btn.disabled=true;
    
    await new Promise(r=>setTimeout(r,100));
    
    const elemento=$("#exportCanvas");
    const canvas=await html2canvas(elemento,{
      scale:2.5,
      backgroundColor:"#ffffff",
      logging:false,
      useCORS:true
    });
    
    hideLoading();
    
    const data=new Date();
    const timestamp=`${data.getFullYear()}-${pad2(data.getMonth()+1)}-${pad2(data.getDate())}_${pad2(data.getHours())}-${pad2(data.getMinutes())}`;
    const nomePredio=($("#predio").value||"Predio").replace(/\s+/g,"_");
    const filename=`Ronda_${nomePredio}_${timestamp}.png`;
    const dataUrl=canvas.toDataURL("image/png");
    
    if(navigator.share){
      try{
        const blob=await fetch(dataUrl).then(r=>r.blob());
        const file=new File([blob], filename, {type:'image/png'});
        await navigator.share({
          title:'Ronda - Mapa de Salas',
          text:`Mapa do ${$("#predio").value}`,
          files:[file]
        });
        toast("✅ Imagem compartilhada! Salve na galeria");
        return;
      }catch(e){}
    }
    
    const link=document.createElement('a');
    link.download=filename;
    link.href=dataUrl;
    link.style.display='none';
    document.body.appendChild(link);
    link.click();
    setTimeout(()=>document.body.removeChild(link),1000);
    toast("✅ Imagem gerada! Verifique seus downloads");
    
  }catch(erro){
    console.error("Erro:",erro);
    hideLoading();
    toast("❌ Erro ao gerar imagem. Tente novamente.",true);
  }finally{
    btn.innerHTML=textoOriginal;
    btn.disabled=false;
  }
}

$("#btnAdd").onclick=()=>{
  let m=$("#onePair").value.match(/^(\d{1,2})\s*[-\/]\s*(\d{1,2})/);
  if(!m){toast("❌ Use formato: 29-02",true);return}
  let floor=parseInt(m[1]),room=pad2(parseInt(m[2]));
  if(!posicoesAndares[floor]){
    toast(`⚠️ Andar ${floor} não encontrado. Andares: 32-18`,true);
    return;
  }
  state.items=state.items.filter(x=>!(x.floor===floor&&x.room===room));
  state.items.push({floor,room,status:$("#oneStatus").value});
  $("#onePair").value="";
  renderCompleto();
  toast(`✅ ${floor}-${room} adicionada`);
};

$("#btnApply").onclick=()=>{
  let lines=$("#bulk").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(!lines.length){toast("❌ Cole uma lista primeiro",true);return}
  lines.forEach(l=>{
    let m=l.match(/^(\d{1,2})\s*[-\/]\s*(\d{1,2})(.*)$/i);
    if(m){
      let floor=parseInt(m[1]),room=pad2(parseInt(m[2])),rest=m[3]||"";
      let status="VALIDADA";
      if(/problema|falha|erro/i.test(rest)) status="PROBLEMA";
      else if(/tranc/i.test(rest)) status="TRANCADA";
      else if(/ocup/i.test(rest)) status="OCUPADA";
      state.items=state.items.filter(x=>!(x.floor===floor&&x.room===room));
      state.items.push({floor,room,status});
    }
  });
  $("#bulk").value="";
  renderCompleto();
  toast(`✅ ${lines.length} sala(s) adicionadas`);
};

$("#btnClear").onclick=()=>{
  if(confirm("Limpar todas as salas, lista e observações?")){
    state.items=[];
    $("#bulk").value="";
    $("#observacoes").value="";
    $("#onePair").value="";
    renderCompleto();
    toast("🗑️ Tudo limpo!");
  }
};

$("#btnLoadBg").onclick=()=>$("#bgFile").click();
$("#btnClearBg").onclick=()=>{state.bg=null;renderCompleto();toast("🖼️ Fundo removido")};
$("#bgFile").onchange=e=>{let f=e.target.files?.[0];if(f){let r=new FileReader();r.onload=ev=>{state.bg=ev.target.result;renderCompleto();toast("🖼️ Fundo carregado")};r.readAsDataURL(f)}};
$("#predio").oninput=renderStats;
$("#tecnicos").oninput=renderStats;
$("#observacoes").oninput=renderStats;
$("#btnPNG").onclick=salvarImagem;

// Inicializar
carregarImagemPredio();
renderStats();

toast("👋 Clique nos marcadores para remover | Ajuste as posições dos andares se necessário");
})();
</script>
</body>
</html>
