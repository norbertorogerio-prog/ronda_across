<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover"/>

<title>Relatório de Vistoria</title>

<!-- html2canvas para capturar PNG -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root{
    --bg:#0b3d2e; --card:rgba(255,255,255,.08); --border:rgba(255,255,255,.18);
    --text:#fff; --muted:#cbd5e1; --gold:#ffd966;
    --green:#27ae60; --yellow:#f1c40f; --red:#e74c3c; --purple:#6A1B9A;
  }
  *{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }
  
  body{
    background:var(--bg);
    color:var(--text);
    font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    min-height:100vh;
    padding:12px;
  }
  
  .app{
    max-width:1400px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  
  @media(min-width:980px){
    body{
      padding:16px;
    }
    .app{
      flex-direction:row;
      gap:20px;
      align-items:flex-start;
    }
    .app > :first-child{
      width:360px;
      flex-shrink:0;
    }
    .app > :last-child{
      flex:1;
      min-width:0;
    }
  }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    backdrop-filter:blur(4px);
  }

  h2{
    margin:0 0 12px 0;
    font-weight:800;
    font-size:15px;
    letter-spacing:.4px;
  }
  
  h3{
    margin:0 0 10px 0;
    font-size:13px;
    color:var(--muted);
    font-weight:700;
  }

  label{
    display:block;
    margin:10px 0 4px 0;
    font-size:11px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.4px;
    color:#e2e8f0;
  }
  
  .form-field{
    width:100%;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    color:#111;
    padding:6px 10px;
    font-size:13px;
    line-height:1.3;
    outline:none;
  }
  
  select.form-field{
    -webkit-appearance:none;
    -moz-appearance:none;
    appearance:none;
    background-image:
      linear-gradient(45deg, transparent 50%, #6A1B9A 50%),
      linear-gradient(135deg, #6A1B9A 50%, transparent 50%);
    background-position:calc(100% - 12px) 50%, calc(100% - 6px) 50%;
    background-size:5px 5px,5px 5px;
    background-repeat:no-repeat;
  }
  
  textarea.form-field{
    min-height:55px;
    resize:vertical;
    font-size:12px;
  }

  /* ÍCONES */
  .icon-strip{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    margin-top:6px;
  }
  
  .icon{
    width:44px;
    height:44px;
    min-width:44px;
    border-radius:6px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.08);
    color:var(--text);
    font-size:12px;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all 0.1s ease;
    flex-shrink:0;
  }
  
  @media(max-width:640px){
    .icon{
      width:38px;
      height:38px;
      min-width:38px;
      font-size:11px;
    }
  }
  
  @media(max-width:480px){
    .icon{
      width:34px;
      height:34px;
      min-width:34px;
      font-size:10px;
    }
  }
  
  .icon.is-selected{
    border-color:var(--gold);
    background:rgba(255,217,102,0.25);
    box-shadow:0 0 0 1px rgba(255,217,102,.5);
  }

  /* STATUS STRIP */
  .status-strip{
    display:flex;
    gap:6px;
    margin:10px 0 4px;
    flex-wrap:wrap;
  }
  
  .status{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    padding:6px 10px;
    border-radius:20px;
    color:#111;
    background:#fff;
    border:1px solid var(--border);
    cursor:pointer;
    font-size:11px;
    font-weight:700;
    transition:all 0.1s ease;
    flex:1;
    min-width:70px;
  }
  
  .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    flex-shrink:0;
  }
  .dot.valid{background:var(--green)}
  .dot.lock{background:var(--yellow)}
  .dot.prob{background:var(--red)}
  .dot.other{background:var(--purple)}

  /* BOTÕES */
  .btn{
    width:100%;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#6A1B9A,#4A0072);
    color:#fff;
    font-weight:800;
    padding:8px;
    cursor:pointer;
    text-transform:uppercase;
    font-size:12px;
    transition:all 0.1s ease;
  }
  
  .btn:active{
    transform:translateY(1px);
  }
  
  .row{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  
  .row button{
    flex:1;
  }

  /* BOTÕES DE AÇÃO DO RELATÓRIO */
  .report-actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }
  
  .btn-action{
    border:1px solid var(--border);
    background:#ffffff;
    color:#111;
    font-weight:800;
    font-size:11px;
    padding:4px 10px;
    border-radius:6px;
    cursor:pointer;
    transition:all 0.1s ease;
    white-space:nowrap;
  }
  
  .btn-action:active{
    transform:translateY(1px);
  }
  
  .btn-share{
    background:linear-gradient(135deg,#25D366,#128C7E);
    color:#fff;
    border:none;
  }
  
  .btn-png{
    background:linear-gradient(135deg,#2D9CDB,#1E6F9F);
    color:#fff;
    border:none;
  }

  /* VIEWER */
  .viewer{
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  
  .section{
    background:rgba(255,255,255,.06);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }
  
  .small{
    font-size:10px;
    color:var(--muted);
    margin-top:8px;
  }

  /* GRADE DE ITENS */
  .created-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  
  .room-card{
    display:inline-flex;
    flex-direction:column;
    gap:5px;
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.08);
    min-width:100px;
  }
  
  .badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    font-weight:800;
    color:#111;
    background:#fff;
    border-radius:6px;
    padding:4px 8px;
    width:fit-content;
  }
  
  .pill{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:10px;
    font-weight:600;
    color:#fff;
    border-radius:20px;
    padding:3px 8px;
    width:fit-content;
  }
  
  .pill.valid{background:var(--green)}
  .pill.lock{background:var(--yellow);color:#111}
  .pill.prob{background:var(--red)}
  .pill.other{background:var(--purple)}

  /* RELATÓRIO */
  .report-box{
    border:2px solid var(--gold);
    border-radius:12px;
    background:rgba(0,0,0,.45);
    overflow:hidden;
  }
  
  .report-title{
    background:linear-gradient(135deg,#2c3e50,#1a2632);
    color:var(--gold);
    font-weight:900;
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    border-bottom:1px solid rgba(255,215,0,.3);
  }
  
  .report-title span{
    font-size:13px;
    font-weight:800;
  }
  
  .report-content{
    white-space:pre-wrap;
    font-family:monospace;
    font-size:11px;
    color:#eaf2f8;
    line-height:1.5;
    padding:12px;
    max-height:450px;
    overflow-y:auto;
    background:rgba(0,0,0,0.2);
  }

  .toast{
    position:fixed;
    right:16px;
    bottom:16px;
    background:rgba(0,0,0,0.9);
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    font-size:12px;
    z-index:9999;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .15s ease, transform .15s ease;
    pointer-events:none;
  }
  
  .toast.show{
    opacity:1;
    transform:translateY(0);
  }
  
  .report-content::-webkit-scrollbar{
    width:4px;
  }
  
  .report-content::-webkit-scrollbar-track{
    background:rgba(255,255,255,0.1);
    border-radius:4px;
  }
  
  .report-content::-webkit-scrollbar-thumb{
    background:var(--gold);
    border-radius:4px;
  }
  
  /* Modal de compartilhamento */
  .share-modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.8);
    z-index:10000;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(4px);
  }
  
  .share-modal.show{
    display:flex;
  }
  
  .share-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    max-width:320px;
    width:90%;
    backdrop-filter:blur(8px);
  }
  
  .share-card h4{
    margin-bottom:16px;
    font-size:16px;
    text-align:center;
  }
  
  .share-buttons{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  
  .share-btn{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px;
    border:none;
    border-radius:12px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    transition:all 0.1s ease;
    width:100%;
  }
  
  .share-btn:active{
    transform:scale(0.98);
  }
  
  .share-btn.whatsapp{
    background:#25D366;
    color:#fff;
  }
  
  .share-btn.teams{
    background:#6264A7;
    color:#fff;
  }
  
  .share-btn.email{
    background:#EA4335;
    color:#fff;
  }
  
  .share-btn.download{
    background:#2D9CDB;
    color:#fff;
  }
  
  .close-modal{
    margin-top:12px;
    padding:10px;
    background:rgba(255,255,255,0.2);
    border:1px solid var(--border);
    border-radius:10px;
    color:#fff;
    cursor:pointer;
    width:100%;
  }
</style>
</head>
<body>
<div class="app">
  <!-- ESQUERDA -->
  <div class="card">
    <h2>📋 Entrada de dados</h2>

    <label>👤 Auditor</label>
    <input id="auditor" class="form-field" placeholder="Nome completo"/>

    <label>🏢 Prédio</label>
    <select id="predio" class="form-field">
      <option value="">Selecione o prédio</option>
      <option value="Eco Berrini">Eco Berrini</option>
      <option value="Chucri Zaidan">Chucri Zaidan</option>
    </select>

    <label>📍 Endereço</label>
    <input id="endereco" class="form-field" placeholder="Endereço automático"/>

    <label>🏬 Andar (01-32)</label>
    <div id="floorsStrip" class="icon-strip"></div>

    <label>🚪 Sala (01-50)</label>
    <div id="roomsStrip" class="icon-strip"></div>

    <label>📌 Status</label>
    <div class="status-strip">
      <button class="status" data-status="valid"><span class="dot valid"></span>Validada</button>
      <button class="status" data-status="lock"><span class="dot lock"></span>Trancada</button>
      <button class="status" data-status="prob"><span class="dot prob"></span>Problemas</button>
      <button class="status" data-status="other"><span class="dot other"></span>Outros</button>
    </div>

    <label>📝 Observações</label>
    <textarea id="obs" class="form-field" placeholder="Observações gerais da vistoria..."></textarea>

    <div class="row">
      <button id="btnAdd" class="btn">➕ Adicionar</button>
      <button id="btnClear" class="btn">🗑️ Limpar</button>
    </div>

    <p class="small">💡 Selecione andar/sala → clique no status</p>
  </div>

  <!-- DIREITA -->
  <div class="viewer">
    <div class="section">
      <h3 id="sectionTitle">📦 Salas registradas (0)</h3>
      <div id="createdGrid" class="created-grid">
        <p class="small" style="text-align:center; width:100%">Nenhuma sala registrada</p>
      </div>
    </div>

    <div class="section">
      <div class="report-box">
        <div class="report-title">
          <span>📋 Relatório de Vistoria</span>
          <div class="report-actions">
            <button id="btnCopy" class="btn-action">📋 Copiar</button>
            <button id="btnDownload" class="btn-action">💾 Baixar</button>
            <button id="btnShare" class="btn-action btn-share">📱 Compartilhar</button>
            <button id="btnPNG" class="btn-action btn-png">📸 Salvar PNG</button>
          </div>
        </div>
        <div id="reportCaptureArea">
          <div id="relatorio" class="report-content">
═══════════════════════════════
   RELATÓRIO DE VISTORIA
═══════════════════════════════
Aguardando registros...
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Compartilhamento -->
<div id="shareModal" class="share-modal">
  <div class="share-card">
    <h4>📤 Compartilhar Relatório</h4>
    <div class="share-buttons">
      <button id="shareWhatsApp" class="share-btn whatsapp">💬 WhatsApp</button>
      <button id="shareTeams" class="share-btn teams">💼 Microsoft Teams</button>
      <button id="shareEmail" class="share-btn email">📧 E-mail</button>
      <button id="shareSave" class="share-btn download">📸 Salvar imagem</button>
    </div>
    <button id="closeModal" class="close-modal">Fechar</button>
  </div>
</div>

<script>
  const STORAGE_KEY = "vistoria_fixed_v6";
  let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  let selectedFloor = 1;
  let selectedRoom  = 1;
  let currentImageData = null;

  const pad2 = n => String(n).padStart(2,"0");
  const statusName  = s => s==="valid"?"Validada":s==="lock"?"Trancada":s==="prob"?"Problemas":"Outros";
  const statusClass = s => s==="valid"?"valid":s==="lock"?"lock":s==="prob"?"prob":"other";
  const statusEmoji = s => s==="valid"?"✅":s==="lock"?"🔒":s==="prob"?"❌":"◻️";

  const floorsStrip  = document.getElementById("floorsStrip");
  const roomsStrip   = document.getElementById("roomsStrip");
  const createdGrid  = document.getElementById("createdGrid");
  const relatorioEl  = document.getElementById("relatorio");
  const predioSel    = document.getElementById("predio");
  const enderecoInp  = document.getElementById("endereco");
  const auditorInp   = document.getElementById("auditor");
  const obsInp       = document.getElementById("obs");
  const sectionTitle = document.getElementById("sectionTitle");
  const shareModal   = document.getElementById("shareModal");

  function buildFloorIcons(){
    floorsStrip.innerHTML = "";
    for(let f=1; f<=32; f++){
      const el = document.createElement("div");
      el.className = "icon" + (f === selectedFloor ? " is-selected" : "");
      el.textContent = pad2(f);
      el.title = `Andar ${pad2(f)}`;
      el.addEventListener("click", (e)=>{
        e.stopPropagation();
        selectedFloor = f;
        buildFloorIcons();
        buildRoomIcons();
      });
      floorsStrip.appendChild(el);
    }
  }
  
  function buildRoomIcons(){
    roomsStrip.innerHTML = "";
    for(let r=1; r<=50; r++){
      const el = document.createElement("div");
      el.className = "icon" + (r === selectedRoom ? " is-selected" : "");
      el.textContent = pad2(r);
      el.title = `Sala ${pad2(r)}`;
      el.addEventListener("click", (e)=>{
        e.stopPropagation();
        selectedRoom = r;
        buildRoomIcons();
      });
      roomsStrip.appendChild(el);
    }
  }

  // Status click
  document.querySelectorAll(".status").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const status = btn.dataset.status;
      const f = selectedFloor;
      const r = selectedRoom;
      const idx = entries.findIndex(e => e.f === f && e.r === r);
      
      if(idx >= 0){ 
        entries[idx].status = status; 
      } else { 
        entries.push({f, r, status}); 
      }
      
      persist();
      renderCreated();
      renderReport();
      showToast(`A${pad2(f)}-S${pad2(r)}: ${statusName(status)}`);
    });
  });

  document.getElementById("btnAdd").addEventListener("click", ()=>{
    const f = selectedFloor;
    const r = selectedRoom;
    const idx = entries.findIndex(e => e.f === f && e.r === r);
    
    if(idx < 0){ 
      entries.push({f, r, status:"other"}); 
      showToast(`Sala A${pad2(f)}-S${pad2(r)} adicionada`);
      persist();
      renderCreated();
      renderReport();
    } else {
      showToast(`Sala já existe, use os status`);
    }
  });

  function renderCreated(){
    const sorted = [...entries].sort((a,b)=> a.f - b.f || a.r - b.r);
    sectionTitle.innerHTML = `📦 Salas registradas (${entries.length})`;
    
    if(sorted.length === 0){
      createdGrid.innerHTML = '<p class="small" style="text-align:center; width:100%">Nenhuma sala registrada</p>';
      return;
    }
    
    createdGrid.innerHTML = "";
    sorted.forEach(item => {
      const card = document.createElement("div");
      card.className = "room-card";
      
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = `A${pad2(item.f)} • S${pad2(item.r)}`;
      card.appendChild(badge);
      
      const tag = document.createElement("div");
      tag.className = `pill ${statusClass(item.status)}`;
      tag.textContent = `${statusEmoji(item.status)} ${statusName(item.status)}`;
      card.appendChild(tag);
      
      createdGrid.appendChild(card);
    });
  }

  function renderReport(){
    const predio   = predioSel.value || "Não selecionado";
    const endereco = enderecoInp.value || "Não informado";
    const auditor  = auditorInp.value || "Não informado";
    const obsGeral = (obsInp.value || "").trim();
    const dataStr  = new Date().toLocaleString("pt-BR", { 
      day: '2-digit', 
      month: '2-digit', 
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    const stats = { valid:0, lock:0, prob:0, other:0 };
    entries.forEach(e => stats[e.status]++);
    
    const total = entries.length;
    
    let info = "";
    if(total === 0){
      info = "Nenhuma sala vistoriada até o momento.";
    } else {
      info = `TOTAL: ${total} sala(s)\n`;
      info += `✅ Validada: ${stats.valid}  |  🔒 Trancada: ${stats.lock}\n`;
      info += `❌ Problemas: ${stats.prob}  |  ◻️ Outros: ${stats.other}\n\n`;
      
      const byFloor = {};
      entries.forEach(e => {
        if(!byFloor[e.f]) byFloor[e.f] = [];
        byFloor[e.f].push({r: e.r, status: e.status});
      });
      
      const floors = Object.keys(byFloor).map(Number).sort((a,b)=>a-b);
      info += "DETALHAMENTO:\n";
      floors.forEach(f => {
        const rooms = byFloor[f];
        const validados = rooms.filter(r => r.status === "valid").length;
        const trancados = rooms.filter(r => r.status === "lock").length;
        const problemas = rooms.filter(r => r.status === "prob").length;
        const outros = rooms.filter(r => r.status === "other").length;
        
        info += `  Andar ${pad2(f)}: `;
        const parts = [];
        if(validados > 0) parts.push(`✅${validados}`);
        if(trancados > 0) parts.push(`🔒${trancados}`);
        if(problemas > 0) parts.push(`❌${problemas}`);
        if(outros > 0) parts.push(`◻️${outros}`);
        info += parts.join(" ") + "\n";
      });
    }
    
    const blocoObs = obsGeral ? `\n📝 OBSERVAÇÕES:\n${obsGeral}\n` : "";
    
    const text = 
`═══════════════════════════════
   RELATÓRIO DE VISTORIA
═══════════════════════════════
🏢 ${predio}
📍 ${endereco}
📅 ${dataStr}
👤 Auditor(a): ${auditor}
───────────────────────────────
📊 ESTATÍSTICAS
${info}
${blocoObs}───────────────────────────────
🔧 Gerado em ${new Date().toLocaleDateString()}`;

    relatorioEl.textContent = text;
  }

  function getReportText() {
    return document.getElementById("relatorio")?.textContent || "";
  }
  
  function copyReportToClipboard() {
    const text = getReportText();
    if (!text.trim() || text.includes("Aguardando registros")) { 
      showToast("Nada para copiar"); 
      return; 
    }
    
    navigator.clipboard?.writeText(text).then(
      () => showToast("✓ Relatório copiado!"),
      () => fallbackCopy(text)
    );
  }
  
  function fallbackCopy(text) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; 
      document.body.appendChild(ta);
      ta.select(); 
      document.execCommand("copy");
      ta.remove();
      showToast("✓ Copiado!");
    } catch {
      showToast("Erro ao copiar");
    }
  }
  
  function downloadReportTxt() {
    const text = getReportText();
    if (!text.trim() || text.includes("Aguardando registros")) { 
      showToast("Nada para baixar"); 
      return; 
    }
    
    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const predio = (document.getElementById("predio")?.value || "vistoria").replace(/\s+/g, '_');
    const dt = new Date();
    const stamp = `${dt.getFullYear()}${(dt.getMonth()+1).toString().padStart(2,'0')}${dt.getDate().toString().padStart(2,'0')}`;
    a.href = url;
    a.download = `vistoria_${predio}_${stamp}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast("⬇️ Download iniciado!");
  }

  // Gerar imagem do relatório
  async function generateReportImage() {
    const reportElement = document.getElementById("reportCaptureArea");
    
    if (getReportText().includes("Aguardando registros")) {
      showToast("Nada para compartilhar");
      return null;
    }
    
    showToast("📸 Gerando imagem...");
    
    try {
      const canvas = await html2canvas(reportElement, {
        scale: 2,
        backgroundColor: '#0b3d2e',
        logging: false,
        useCORS: false
      });
      
      return canvas.toDataURL('image/png');
    } catch (error) {
      console.error("Erro ao gerar imagem:", error);
      showToast("❌ Erro ao gerar imagem");
      return null;
    }
  }
  
  // Salvar como PNG
  async function saveAsPNG() {
    const imageData = await generateReportImage();
    if (!imageData) return;
    
    const link = document.createElement('a');
    const predio = predioSel.value || "vistoria";
    const data = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    link.download = `vistoria_${predio}_${data}.png`;
    link.href = imageData;
    link.click();
    
    showToast("✅ Imagem salva!");
  }
  
  // Abrir modal de compartilhamento
  async function openShareModal() {
    const imageData = await generateReportImage();
    if (!imageData) return;
    
    currentImageData = imageData;
    shareModal.classList.add("show");
  }
  
  // Compartilhar no WhatsApp
  function shareToWhatsApp() {
    if (!currentImageData) return;
    
    // Converte base64 para blob
    fetch(currentImageData)
      .then(res => res.blob())
      .then(blob => {
        const file = new File([blob], "relatorio_vistoria.png", { type: "image/png" });
        const text = `📋 *RELATÓRIO DE VISTORIA*\n\n🏢 ${predioSel.value || "Prédio"}\n👤 Auditor: ${auditorInp.value || "Não informado"}\n📅 ${new Date().toLocaleString("pt-BR")}`;
        
        // Tenta usar Web Share API (WhatsApp, Teams, etc no mobile)
        if (navigator.share) {
          navigator.share({
            title: 'Relatório de Vistoria',
            text: text,
            files: [file]
          }).catch(() => {
            // Fallback: link do WhatsApp
            window.open(`https://wa.me/?text=${encodeURIComponent(text + "\n\n*Imagem anexada no arquivo*")}`);
          });
        } else {
          // Desktop: abre WhatsApp Web
          window.open(`https://web.whatsapp.com/send?text=${encodeURIComponent(text)}`);
        }
        
        shareModal.classList.remove("show");
        showToast("📱 Compartilhando...");
      });
  }
  
  // Compartilhar no Teams
  function shareToTeams() {
    if (!currentImageData) return;
    
    const predio = predioSel.value || "Vistoria";
    const auditor = auditorInp.value || "Não informado";
    const total = entries.length;
    const data = new Date().toLocaleString("pt-BR");
    
    const message = `**📋 Relatório de Vistoria - ${predio}**\n\n📅 **Data:** ${data}\n👤 **Auditor:** ${auditor}\n📊 **Total de salas:** ${total}\n\n📸 *Imagem anexada com os detalhes completos*`;
    
    if (navigator.share) {
      fetch(currentImageData)
        .then(res => res.blob())
        .then(blob => {
          const file = new File([blob], "relatorio_vistoria.png", { type: "image/png" });
          navigator.share({
            title: 'Relatório de Vistoria',
            text: message,
            files: [file]
          });
        });
    } else {
      // Fallback: copia mensagem e abre para download
      navigator.clipboard.writeText(message);
      showToast("✅ Mensagem copiada! Cole no Teams e anexe a imagem");
      
      // Baixa a imagem para anexar
      const link = document.createElement('a');
      link.download = `vistoria_${predio}.png`;
      link.href = currentImageData;
      link.click();
    }
    
    shareModal.classList.remove("show");
  }
  
  // Compartilhar por Email
  function shareToEmail() {
    if (!currentImageData) return;
    
    const predio = predioSel.value || "Vistoria";
    const auditor = auditorInp.value || "Não informado";
    const data = new Date().toLocaleString("pt-BR");
    const subject = `Relatório de Vistoria - ${predio}`;
    const body = `Relatório de Vistoria\n\nPrédio: ${predio}\nAuditor: ${auditor}\nData: ${data}\nTotal de salas: ${entries.length}\n\n*Imagem anexada com os detalhes completos*`;
    
    // Abre cliente de email
    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    
    // Baixa a imagem para anexar
    setTimeout(() => {
      const link = document.createElement('a');
      link.download = `vistoria_${predio}.png`;
      link.href = currentImageData;
      link.click();
    }, 500);
    
    shareModal.classList.remove("show");
    showToast("📧 Email aberto! Anexe a imagem baixada");
  }
  
  // Salvar imagem (mesmo do botão)
  function shareSaveImage() {
    if (!currentImageData) return;
    
    const link = document.createElement('a');
    const predio = predioSel.value || "vistoria";
    const data = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    link.download = `vistoria_${predio}_${data}.png`;
    link.href = currentImageData;
    link.click();
    
    shareModal.classList.remove("show");
    showToast("✅ Imagem salva!");
  }

  function showToast(msg) {
    let t = document.querySelector(".toast");
    if (!t) {
      t = document.createElement("div");
      t.className = "toast";
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  document.getElementById("btnCopy").addEventListener("click", copyReportToClipboard);
  document.getElementById("btnDownload").addEventListener("click", downloadReportTxt);
  document.getElementById("btnShare").addEventListener("click", openShareModal);
  document.getElementById("btnPNG").addEventListener("click", saveAsPNG);
  
  // Modal events
  document.getElementById("shareWhatsApp").addEventListener("click", shareToWhatsApp);
  document.getElementById("shareTeams").addEventListener("click", shareToTeams);
  document.getElementById("shareEmail").addEventListener("click", shareToEmail);
  document.getElementById("shareSave").addEventListener("click", shareSaveImage);
  document.getElementById("closeModal").addEventListener("click", () => {
    shareModal.classList.remove("show");
  });
  shareModal.addEventListener("click", (e) => {
    if (e.target === shareModal) shareModal.classList.remove("show");
  });

  function persist(){ 
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); 
  }

  document.getElementById("btnClear").addEventListener("click", ()=>{
    if(!confirm("⚠️ Limpar TODOS os registros?")) return;
    entries = [];
    auditorInp.value = "";
    predioSel.value = "";
    enderecoInp.value = "";
    obsInp.value = "";
    persist();
    renderCreated();
    renderReport();
    showToast("✓ Todos os dados removidos");
  });

  predioSel.addEventListener("change", ()=>{
    const v = predioSel.value;
    if(v === "Eco Berrini"){
      enderecoInp.value = "Av. Eng. Luís Carlos Berrini, 1376 - SP";
    } else if(v === "Chucri Zaidan"){
      enderecoInp.value = "Av. Dr. Chucri Zaidan, 2460 - SP";
    } else {
      enderecoInp.value = "";
    }
    renderReport();
  });

  auditorInp.addEventListener("input", renderReport);
  enderecoInp.addEventListener("input", renderReport);
  obsInp.addEventListener("input", renderReport);

  // Inicialização
  (function init(){
    selectedFloor = 1;
    selectedRoom  = 1;
    buildFloorIcons();
    buildRoomIcons();
    renderCreated();
    renderReport();
  })();
</script>
</body>
</html>
