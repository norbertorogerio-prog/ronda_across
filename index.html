<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vistoria Corporativa • PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --primary:#6600CC;
  --bg:#0F0F1A;
  --card:#1A1A2E;
  --text:#fff;
  --muted:#999;
  --green:#00C853;
  --red:#FF3B3B;
  --yellow:#FFD600;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter, sans-serif;
}

.app{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:flex;
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  flex:1;
}

h2{
  margin-bottom:10px;
}

input, select, textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

.row{
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-primary{background:var(--primary);}
.btn-danger{background:var(--red);}
.btn-secondary{background:#333;}

.status{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.status button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.progress{
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.progress-bar{
  height:10px;
  background:var(--primary);
  width:0%;
}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.room{
  padding:10px;
  border-radius:10px;
  background:#222;
  cursor:pointer;
}

.filter{
  margin-top:10px;
}

</style>
</head>

<body>

<div class="app">

<!-- ESQUERDA -->
<div class="card">

<h2>📋 Nova Vistoria</h2>

<input id="auditor" placeholder="Auditor"/>
<select id="predio">
<option>Eco Berrini</option>
<option>Chucri Zaidan</option>
</select>

<input id="andar" placeholder="Andar (ex: 12)"/>
<input id="sala" placeholder="Sala (ex: 34)"/>

<div class="status">
<button onclick="setStatus('valid')">✅ OK</button>
<button onclick="setStatus('prob')">❌ Problema</button>
<button onclick="setStatus('lock')">🔒 Trancada</button>
</div>

<textarea id="obs" placeholder="Observações"></textarea>

<div class="row">
<button class="btn btn-primary" onclick="add()">Salvar</button>
<button class="btn btn-danger" onclick="clearAll()">Limpar</button>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<p id="progressText"></p>

</div>

<!-- DIREITA -->
<div class="card">

<h2>📦 Salas</h2>

<select id="filter" class="filter" onchange="render()">
<option value="all">Todas</option>
<option value="prob">Problemas</option>
<option value="valid">OK</option>
</select>

<div id="grid" class="grid"></div>

<hr>

<h2>📊 Relatório</h2>

<div id="report"></div>

<button class="btn btn-secondary" onclick="exportPNG()">📸 Exportar</button>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("vistoria_pro")||"[]");
let currentStatus = "valid";

function setStatus(s){
  currentStatus = s;
}

function add(){
  const andar = document.getElementById("andar").value;
  const sala = document.getElementById("sala").value;

  if(!andar || !sala) return alert("Preencha");

  data.push({andar,sala,status:currentStatus});
  save();
}

function save(){
  localStorage.setItem("vistoria_pro", JSON.stringify(data));
  render();
}

function clearAll(){
  if(confirm("Limpar tudo?")){
    data=[];
    save();
  }
}

function render(){

  const grid = document.getElementById("grid");
  const filter = document.getElementById("filter").value;

  grid.innerHTML="";

  let filtered = data;

  if(filter !== "all"){
    filtered = data.filter(d=>d.status===filter);
  }

  filtered.forEach(d=>{
    const div = document.createElement("div");
    div.className="room";
    div.innerText = `${d.andar}-${d.sala} (${d.status})`;
    grid.appendChild(div);
  });

  // relatório
  const total = data.length;
  const prob = data.filter(d=>d.status==="prob").length;

  document.getElementById("report").innerHTML =
  `Total: ${total} <br> Problemas: ${prob}`;

  // progresso
  const percent = total ? ((total-prob)/total)*100 : 0;
  document.getElementById("progressBar").style.width = percent+"%";
  document.getElementById("progressText").innerText =
  percent.toFixed(0)+"% OK";

}

async function exportPNG(){
  const canvas = await html2canvas(document.body);
  const link = document.createElement("a");
  link.download = "vistoria.png";
  link.href = canvas.toDataURL();
  link.click();
}

render();

</script>

</body>
</html>
