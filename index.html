<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Prédio SVG • Exportação Estável</title>
<style>
 :root{
  --vivo:#6A1B9A; --vivo-dark:#4A0072;
  --valid:#2ECC71; --occ:#FF9800; --lock:#9E9E9E; --prob:#E53935;

  --bg:#F6F3F9; --card:#FFFFFF; --line:#E6E1EF; --ink:#2B2B2B;

  --svg-w: 480px; --svg-h: 960px;
  --outside-left: 56px;

  --win-w: 24px; --win-h: 12px;
  --gap-x: 12px; --gap-y: 10px;
  --badge-w: var(--win-w); --badge-h: var(--win-h);
 }

 *{ box-sizing:border-box }
 body{
  margin:0; background:var(--bg); color:var(--ink);
  font:500 15px/1.35 system-ui,"Segoe UI";
 }

 .app{
  max-width:1280px; margin:0 auto; padding:16px;
  display:grid; gap:16px;
 }
 @media (min-width:1160px){
  .app{ grid-template-columns:380px 1fr; }
 }

 .card{
  background:var(--card); border:1px solid var(--line);
  border-radius:14px; box-shadow:0 8px 20px rgba(38,12,77,.06);
  padding:14px;
 }

 label{ font-size:12px; color:#666; margin:6px 0 4px; display:block; }
 input[type="text"], textarea, select, button{
  width:100%; border:1px solid var(--line);
  border-radius:10px; padding:10px 12px;
  background:#fff; color:#333; font:500 14px/1.1 inherit;
 }
 textarea{ resize:vertical; min-height:66px; max-height:180px }

 button{
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  color:#fff; font-weight:800; cursor:pointer; border:none;
 }
 button.ghost{
  background:#fff; color:var(--vivo); border:1px solid var(--vivo);
 }

 .kbar{ display:grid; gap:8px; margin-top:8px }

 /* Área de exportação */
 #exportArea{
  --extra: 24px;
  background:#fff; border-radius:16px; border:1px solid var(--line);
  padding:12px; padding-left: var(--outside-left);
  width: calc(480px + var(--outside-left) + var(--extra));
  margin:0 auto;
 }

 #buildingBox{
  position:relative;
  width:var(--svg-w);
  height:var(--svg-h);
 }

 #overlay{ position:absolute; inset:0; pointer-events:none }

 .floor-label{
  position:absolute;
  transform:translateY(-50%);
  color:#2f274b; font-weight:900; font-size:12px;
 }

 .badge{
  position:absolute; width:var(--badge-w); height:var(--badge-h);
  border-radius:4px; color:#fff; font-weight:900; font-size:10px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:
    0 1px 0 0 #fff inset,
    0 0 0 2px rgba(230,225,239,.9) inset,
    0 2px 6px rgba(0,0,0,.14);
  cursor:pointer; pointer-events:auto;
 }
 .valid{ background:var(--valid) }
 .occ{   background:var(--occ) }
 .lock{  background:var(--lock) }
 .prob{  background:var(--prob) }

 /* Observações (só no rodapé da imagem; não aparece como painel) */
 #footerNote{
  position:absolute; left:12px; right:12px; bottom:10px;
  font-size:13px; font-weight:700;
  color:#4b3b7a;
  white-space:pre-wrap;
  text-shadow:0 1px 0 rgba(255,255,255,.4);
  pointer-events:none;
 }

 body.exporting .controls{ display:none!important }
</style>
</head>

<body>
<div class="app">

  <!-- CONTROLES -->
  <div class="card controls">
    <div style="display:grid;gap:14px">

      <!-- ANDAR -->
      <div>
        <label>Andar</label>
        <select id="selFloor"></select>
      </div>

      <!-- SALA -->
      <div>
        <label>Sala</label>
        <select id="selRoom"></select>
      </div>

      <!-- STATUS -->
      <div>
        <label>Status</label>
        <select id="selStatus">
          <option value="valid">Validada (verde)</option>
          <option value="occ">Ocupada (laranja)</option>
          <option value="lock">Trancada (cinza)</option>
          <option value="prob">Problema (vermelho)</option>
          <option value="none">Remover</option>
        </select>
      </div>

      <!-- APLICAR (LOGO APÓS STATUS) -->
      <button id="btnApply">Aplicar</button>

      <!-- Entrada rápida -->
      <div>
        <label>Entrada rápida <small style="color:#9188b8">(ex.: 32-06-Validado)</small></label>
        <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
          <input id="quickInput" type="text" placeholder="32-06-Validado, 31-10-Ocupada"/>
          <button id="btnQuick">OK</button>
        </div>
      </div>

      <!-- Observações -->
      <div>
        <label>Observações (aparecem no rodapé da imagem)</label>
        <textarea id="obsText" placeholder="Ex.: Manutenção agendada no 32º andar."></textarea>
      </div>

      <!-- DEMAIS BOTÕES -->
      <div class="kbar">
        <button class="ghost" id="btnClear">Limpar tudo</button>
        <button class="ghost" id="btnSave">💾 Salvar JSON</button>
        <button class="ghost" id="btnLoad">📂 Carregar JSON</button>
        <button id="btnPNG">📸 Exportar PNG</button>
      </div>

    </div>
  </div>

  <!-- PRÉDIO E OVERLAY -->
  <div id="exportArea" class="card">
    <div id="buildingBox">

      <!-- SVG -->
      <svg id="facade" width="100%" height="100%" viewBox="0 0 480 960"
           xmlns="http://www.w3.org/2000/svg">

        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#EAF2FF"/>
            <stop offset="1" stop-color="#F7F7FF"/>
          </linearGradient>

          <linearGradient id="wall" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#C8CFDA"/>
            <stop offset=".5" stop-color="#D6DCE6"/>
            <stop offset="1" stop-color="#C8CFDA"/>
          </linearGradient>

          <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#9AA2B2"/>
            <stop offset="1" stop-color="#7D8696"/>
          </linearGradient>

          <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#DDE8F7"/>
            <stop offset=".6" stop-color="#CFE0F3"/>
            <stop offset="1" stop-color="#C6DAF0"/>
          </linearGradient>

          <linearGradient id="sideShade" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#000000" stop-opacity="0.08"/>
            <stop offset="1" stop-color="#000000" stop-opacity="0"/>
          </linearGradient>
        </defs>

        <!-- Céu -->
        <rect x="0" y="0" width="480" height="960" fill="url(#sky)"/>

        <!-- Corpo -->
        <g id="body" transform="translate(80,80)">
          <rect x="0" y="0" width="18" height="780" fill="url(#sideShade)"/>
          <rect x="0" y="0" width="320" height="780" rx="10"
                fill="url(#wall)" stroke="#B9C1CE" stroke-width="2"/>

          <!-- Janelas -->
          <g id="windows" transform="translate(22,40)"
             fill="url(#glass)" stroke="#BFC9D8"
             stroke-width="1" opacity=".9"></g>

          <!-- Topo/logo -->
          <rect x="105" y="-34" width="110" height="26" rx="13"
                fill="url(#roofGrad)" stroke="#6d7483"/>
          <text x="160" y="-16" text-anchor="middle"
                font-size="12" font-weight="900" fill="#fff">vivo</text>

          <!-- Hall -->
          <g transform="translate(80,730)">
            <rect width="160" height="50" rx="6"
                  fill="#EEF1F7" stroke="#B8C0CF" stroke-width="3"/>
            <rect x="70" width="20" height="50" fill="#DADFE9"/>
            <circle cx="58" cy="25" r="3" fill="#9E9E9E"/>
            <circle cx="122"cy="25"r="3" fill="#9E9E9E"/>
          </g>

          <!-- Árvores -->
          <g transform="translate(-8,760)">
            <rect x="30" y="20" width="16" height="26" rx="3" fill="#8D6E63"/>
            <circle cx="38" cy="16" r="16"
                    fill="#66BB6A" stroke="#558B2F"/>
          </g>
          <g transform="translate(300,760)">
            <rect x="30" y="20" width="16" height="26" rx="3" fill="#8D6E63"/>
            <circle cx="38" cy="16" r="16"
                    fill="#66BB6A" stroke="#558B2F"/>
          </g>

        </g>

        <!-- Calçada -->
        <rect x="0" y="860" width="480" height="36" fill="#E9E3F2"/>
        <rect x="0" y="896" width="480" height="20" fill="#D6CDE7"/>

      </svg>

      <div id="overlay"></div>
      <div id="footerNote"></div>

    </div>
  </div>

</div>

<script>
/* =================== CONFIG PRINCIPAL =================== */
const CFG = {
  floorsMin:1, floorsMax:32, roomsPerFloor:50,
  building:{ x:80, y:80, w:320, h:780 },
  grid:{ ox:22, oy:40, cols:8, rows:32, w:24, h:12, gapX:12, gapY:10, rx:3 } // rx adicionado
};

const $ = s => document.querySelector(s);
const pad2 = n => String(n).padStart(2,"0");
function css(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

const STORAGE_KEY = "predio_salas_state_vB_final";
let rooms = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let obsTxt = localStorage.getItem(STORAGE_KEY+"_obs") || "";

/* ================== POPULA ANDAR/SALA =================== */
function fillSelectors(){
  const fSel=$("#selFloor"); fSel.innerHTML="";
  for(let f=CFG.floorsMax; f>=CFG.floorsMin; f--){
    fSel.appendChild(new Option(`Andar ${pad2(f)}`, String(f)));
  }
  const rSel=$("#selRoom"); rSel.innerHTML="";
  for(let i=1;i<=CFG.roomsPerFloor;i++){
    rSel.appendChild(new Option(pad2(i), String(i)));
  }
  $("#selStatus").value = "valid";
}

/* ==================== GEOMETRIA ========================= */
function _scales(){ const box=$("#buildingBox"); return { sx:box.clientWidth/480, sy:box.clientHeight/960 }; }
function buildingLeftPx(){ return CFG.building.x * _scales().sx; }
function cellCenterPx(row,col){
  const {sx,sy}=_scales();
  const {x,y}=CFG.building;
  const G=CFG.grid;
  return { cx:(x+G.ox+col*(G.w+G.gapX)+G.w/2)*sx, cy:(y+G.oy+row*(G.h+G.gapY)+G.h/2)*sy };
}
const floorToRow=f=> CFG.floorsMax-f;
const roomToCol=r=> (r-1)%CFG.grid.cols;

/* =================== JANELAS SVG ======================== */
(function drawWindows(){
  const g=$("#windows"); const G=CFG.grid;
  for(let r=0;r<G.rows;r++){
    for(let c=0;c<G.cols;c++){
      let R=document.createElementNS("http://www.w3.org/2000/svg","rect");
      R.setAttribute("x",c*(G.w+G.gapX));
      R.setAttribute("y",r*(G.h+G.gapY));
      R.setAttribute("width",G.w);
      R.setAttribute("height",G.h);
      R.setAttribute("rx",G.rx);
      g.appendChild(R);
    }
  }
})();

/* =================== OVERLAY (HTML) ===================== */
function ensureFloorLabel(f){
  const overlay=$("#overlay");
  const row=floorToRow(f);
  const {cy}=cellCenterPx(row,0);
  const left=buildingLeftPx() - parseFloat(css('--outside-left'));

  let label=overlay.querySelector(`[data-floor="${f}"]`);
  if(!label){
    label=document.createElement("div");
    label.className="floor-label";
    label.dataset.floor=f;
    overlay.appendChild(label);
  }
  label.textContent=`Andar ${pad2(f)}`;
  label.style.top = cy+"px";
  label.style.left= left+"px";
}
function removeFloorIfEmpty(f){
  const overlay=$("#overlay");
  const any=overlay.querySelector(`.badge[data-key^="${pad2(f)}-"]`);
  if(!any){
    const L=overlay.querySelector(`[data-floor="${f}"]`);
    if(L) L.remove();
  }
}
function pickFreeColumn(floor,preferred){
  const overlay=$("#overlay");
  const used=new Set(
    [...overlay.querySelectorAll(`.badge[data-key^="${pad2(floor)}-"]`)]
      .map(b=>Number(b.dataset.col))
  );
  if(!used.has(preferred)) return preferred;
  for(let d=1;d<CFG.grid.cols;d++){
    let c1=preferred+d, c2=preferred-d;
    if(c1<CFG.grid.cols && !used.has(c1)) return c1;
    if(c2>=0           && !used.has(c2)) return c2;
  }
  return preferred;
}
function upsertBadge(floor,room,status){
  const key=`${pad2(floor)}-${pad2(room)}`;
  const overlay=$("#overlay");

  if(status==="none"){
    delete rooms[key];
    let old=overlay.querySelector(`.badge[data-key="${key}"]`);
    if(old) old.remove();
    removeFloorIfEmpty(floor);
    saveState();
    return;
  }

  rooms[key]=status;
  const row=floorToRow(floor);
  let col=pickFreeColumn(floor, roomToCol(room));
  const {cx,cy}=cellCenterPx(row,col);
  const bw=parseFloat(css('--badge-w'));
  const bh=parseFloat(css('--badge-h'));

  let b=overlay.querySelector(`.badge[data-key="${key}"]`);
  if(!b){
    b=document.createElement("div");
    b.className=`badge ${status}`;
    b.dataset.key=key;
    b.dataset.col=col;
    b.textContent=pad2(room);
    overlay.appendChild(b);
    b.onclick=e=>{
      e.stopPropagation();
      const seq=["valid","occ","lock","prob","none"];
      const cur=rooms[key]||"valid";
      const next=seq[(seq.indexOf(cur)+1)%seq.length];
      upsertBadge(floor,room,next);
    };
  }else{
    b.className=`badge ${status}`;
    b.dataset.col=col;
    b.textContent=pad2(room);
  }
  b.style.left=(cx-bw/2)+"px";
  b.style.top =(cy-bh/2)+"px";

  ensureFloorLabel(floor);
  saveState();
}

/* ==================== OBSERVAÇÕES ======================= */
function setObsText(v){
  obsTxt=v||"";
  $("#footerNote").textContent=obsTxt;
  localStorage.setItem(STORAGE_KEY+"_obs",obsTxt);
}

/* ==================== ENTRADA RÁPIDA ==================== */
function normalize(s){ return String(s||"").normalize("NFD").replace(/\p{Diacritic}/gu,"").toLowerCase().trim(); }
function mapStatus(s){
  s=normalize(s);
  if(["valid","validado","validada","ok","v","verde"].includes(s)) return "valid";
  if(["occ","ocupada","ocupado","o","laranja"].includes(s))        return "occ";
  if(["lock","trancada","trancado","cinza","l"].includes(s))       return "lock";
  if(["prob","problema","vermelho","p","erro","falha"].includes(s))return "prob";
  if(["none","remover","apagar","n"].includes(s))                  return "none";
  return null;
}
function parseQuick(tok){
  const p=tok.split(/[-–; ]+/).filter(Boolean);
  if(p.length<3) return null;
  const floor=Number(p[0]);
  const room =Number(p[1]);
  const st   =mapStatus(p.slice(2).join(" "));
  if(!floor||!room||!st) return null;
  return {floor,room,status:st};
}
function applyQuick(){
  const raw=$("#quickInput").value;
  if(!raw.trim()) return;
  raw.split(/[,\n]+/).forEach(t=>{
    const r=parseQuick(t);
    if(r) upsertBadge(r.floor,r.room,r.status);
  });
}

/* ====================== RELAYOUT ======================== */
function relayoutAll(){
  const overlay=$("#overlay");
  const left=buildingLeftPx()-parseFloat(css('--outside-left'));
  overlay.querySelectorAll(".floor-label").forEach(l=>{
    const f=Number(l.dataset.floor);
    const row=floorToRow(f);
    l.style.top = cellCenterPx(row,0).cy+"px";
    l.style.left= left+"px";
  });
  overlay.querySelectorAll(".badge").forEach(b=>{
    const [ff]=b.dataset.key.split("-");
    const floor=Number(ff), col=Number(b.dataset.col);
    const {cx,cy}=cellCenterPx(floorToRow(floor),col);
    const bw=parseFloat(css('--badge-w'));
    const bh=parseFloat(css('--badge-h'));
    b.style.left=(cx-bw/2)+"px";
    b.style.top =(cy-bh/2)+"px";
  });
}

/* =================== EXPORTAÇÃO PNG ===================== */
function rounded(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function serializeSvg(svg){
  let c=svg.cloneNode(true);
  c.setAttribute("xmlns","http://www.w3.org/2000/svg");
  const defs=c.querySelector("defs")||c.insertBefore(document.createElementNS("http://www.w3.org/2000/svg","defs"),c.firstChild);
  const st=document.createElementNS("http://www.w3.org/2000/svg","style");
  st.textContent="text{font-family:system-ui,'Segoe UI',Arial}";
  defs.appendChild(st);
  return new XMLSerializer().serializeToString(c);
}
async function exportPNG(){
  const EA=$("#exportArea"), BB=$("#buildingBox"), svg=$("#facade");
  document.body.classList.add("exporting");
  try{
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

    const sEA=getComputedStyle(EA);
    const padL=parseFloat(sEA.paddingLeft)||0;
    const padT=parseFloat(sEA.paddingTop)||0;

    const rect=EA.getBoundingClientRect();
    const w=Math.round(rect.width);
    const h=Math.round(rect.height);

    const canvas=document.createElement("canvas");
    canvas.width=w*2; canvas.height=h*2;
    const ctx=canvas.getContext("2d");
    ctx.scale(2,2);

    // cartão
    ctx.fillStyle="#ffffff";
    rounded(ctx,0.5,0.5,w-1,h-1,16); ctx.fill();
    ctx.strokeStyle=css('--line'); ctx.stroke();

    // SVG
    const xml=serializeSvg(svg);
    const blob=new Blob([xml],{type:"image/svg+xml"});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=url; });
    const bb=BB.getBoundingClientRect();
    ctx.drawImage(img,padL,padT,bb.width,bb.height);
    URL.revokeObjectURL(url);

    // labels
    ctx.fillStyle="#2f274b"; ctx.font="900 12px 'Segoe UI'";
    ctx.textBaseline="middle";
    document.querySelectorAll(".floor-label").forEach(l=>{
      const x=padL+parseFloat(l.style.left||0);
      const y=padT+parseFloat(l.style.top ||0);
      ctx.fillText(l.textContent,x,y);
    });

    // badges
    document.querySelectorAll(".badge").forEach(b=>{
      const bw=parseFloat(getComputedStyle(b).width);
      const bh=parseFloat(getComputedStyle(b).height);
      const x =padL+parseFloat(b.style.left||0);
      const y =padT+parseFloat(b.style.top ||0);
      ctx.fillStyle=b.classList.contains("valid")?css('--valid'):
                    b.classList.contains("occ")?  css('--occ'):
                    b.classList.contains("lock")? css('--lock'): css('--prob');
      rounded(ctx,x,y,bw,bh,4); ctx.fill();
      ctx.fillStyle="#fff"; ctx.font="900 10px 'Segoe UI'";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(b.textContent,x+bw/2,y+bh/2);
    });

    // Observações no rodapé
    if(obsTxt.trim()){
      ctx.fillStyle="#4b3b7a"; ctx.font="700 14px 'Segoe UI'";
      ctx.textAlign="left"; ctx.textBaseline="alphabetic";
      const maxW=w-(padL*2);
      const words=obsTxt.split(/\s+/);
      let line="", yy=h-16;
      for(const wd of words){
        const test=line? line+" "+wd : wd;
        if(ctx.measureText(test).width>maxW){ ctx.fillText(line,padL,yy); yy+=16; line=wd; }
        else line=test;
      }
      if(line) ctx.fillText(line,padL,yy);
    }

    const a=document.createElement("a");
    a.download="Predio_"+new Date().toISOString().slice(0,19).replace(/:/g,'-')+".png";
    a.href=canvas.toDataURL("image/png");
    a.click();

  }catch(e){
    console.error(e);
    alert("Erro na exportação: "+e);
  }finally{
    document.body.classList.remove("exporting");
  }
}

/* =================== BOTÕES / INIT ====================== */
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(rooms)); }

$("#btnApply").onclick = ()=> upsertBadge(
  Number($("#selFloor").value),
  Number($("#selRoom").value),
  $("#selStatus").value
);
$("#btnQuick").onclick = ()=> applyQuick();
$("#quickInput").onkeydown = e=>{ if(e.key==="Enter"){ e.preventDefault(); applyQuick(); } };

$("#btnClear").onclick = ()=>{
  if(!confirm("Remover tudo?")) return;
  rooms={}; localStorage.removeItem(STORAGE_KEY);
  $("#overlay").innerHTML="";
  relayoutAll();
};
$("#btnSave").onclick = ()=>{
  const blob=new Blob([JSON.stringify(rooms,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="predio_salas.json"; a.click();
  URL.revokeObjectURL(url);
};
$("#btnLoad").onclick = ()=>{
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json";
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        rooms=JSON.parse(e.target.result||"{}");
        saveState();
        $("#overlay").innerHTML="";
        for(const [k,st] of Object.entries(rooms)){
          const floor=Number(k.slice(0,2));
          const room =Number(k.slice(3));
          upsertBadge(floor,room,st);
        }
      }catch{ alert("JSON inválido"); }
    };
    r.readAsText(f);
  };
  inp.click();
};
$("#btnPNG").onclick = ()=> exportPNG();

window.addEventListener("resize", relayoutAll);

document.addEventListener("DOMContentLoaded", ()=>{
  fillSelectors();                // << popula Andar/Sala (correção principal)
  setObsText(obsTxt);             // aplica observações salvas
  // restaura badges salvos
  for(const [k,st] of Object.entries(rooms)){
    const floor=Number(k.slice(0,2));
    const room =Number(k.slice(3));
    upsertBadge(floor,room,st);
  }
});
</script>

</body>
</html>
