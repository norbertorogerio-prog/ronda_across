<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ronda Visual Prédio</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#F6F3F9;
  padding:12px;
}

.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:8px;
}

/* GRID OPERAÇÃO */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(45px,1fr));
  gap:6px;
}

.slot{
  height:30px;
  border-radius:6px;
  background:#bbb;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
  font-size:12px;
}

.valid{background:#2ECC71}
.lock{background:#9E9E9E}
.occ{background:#FF9800}
.prob{background:#E53935}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:flex-end;
}

.modal-box{
  background:white;
  width:100%;
  padding:16px;
  border-radius:16px 16px 0 0;
}

.modal button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.validBtn{background:#2ECC71;color:white}
.lockBtn{background:#9E9E9E;color:white}
.occBtn{background:#FF9800;color:white}
.probBtn{background:#E53935;color:white}

/* ===== EXPORT VISUAL PRÉDIO ===== */

.export-wrapper{
  background:#e9edf3;
  padding:20px;
  border-radius:20px;
  display:inline-block;
}

.building{
  background:linear-gradient(#dfe6ee,#cfd8e3);
  padding:10px 6px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.top-sign{
  text-align:center;
  font-weight:bold;
  background:#6A1B9A;
  color:white;
  padding:6px;
  border-radius:6px;
  margin-bottom:6px;
  font-size:12px;
}

.floor{
  display:flex;
  align-items:center;
  margin:2px 0;
}

.floor-label{
  width:28px;
  font-size:10px;
  font-weight:bold;
  color:#555;
}

.windows{
  display:flex;
  flex-wrap:wrap;
  gap:2px;
}

.window{
  width:14px;
  height:14px;
  border-radius:2px;
  background:#bbb;
}

/* base prédio */
.base{
  height:25px;
  background:#b0bec5;
  margin-top:4px;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="card">
  <input id="predio" value="ECO BERRINI">
  <input id="resp" placeholder="Responsável">
</div>

<div class="card" id="app"></div>

<div class="card">
  <button onclick="exportar()">📸 Gerar imagem</button>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <button class="validBtn" onclick="setStatus('VALIDADA')">✅ Validado</button>
    <button class="lockBtn" onclick="setStatus('TRANCADA')">🔒 Trancado</button>
    <button class="occBtn" onclick="setStatus('OCUPADA')">🟠 Ocupada</button>
    <button class="probBtn" onclick="setStatus('PROBLEMA')">🔴 Problema</button>
  </div>
</div>

<script>
const config = {
  32:{start:1,end:10},
  31:{start:1,end:10},
  30:{start:1,end:10},
  29:{start:1,end:10},
  28:{start:1,end:34},
  27:{start:1,end:25},
  26:{start:1,end:18},
  18:{start:19,end:34} // 👈 seu caso real
};

let data = {};
let current = null;

Object.keys(config).forEach(f=>{
  for(let i=config[f].start;i<=config[f].end;i++){
    data[f+"-"+i]=null;
  }
});

function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s]||"";
}

function render(){
  const app = document.getElementById("app");
  app.innerHTML="";

  Object.keys(config).sort((a,b)=>b-a).forEach(f=>{
    let title=document.createElement("div");
    title.innerHTML="<b>Andar "+f+"</b>";

    let grid=document.createElement("div");
    grid.className="grid";

    for(let i=config[f].start;i<=config[f].end;i++){
      let key=f+"-"+i;

      let el=document.createElement("div");
      el.className="slot "+cls(data[key]);
      el.innerText=String(i).padStart(2,"0");

      el.onclick=()=>{
        current = key;
        document.getElementById("modal").style.display="flex";
      };

      grid.appendChild(el);
    }

    app.appendChild(title);
    app.appendChild(grid);
  });
}

function setStatus(status){
  if(current){
    data[current]=status;
  }
  document.getElementById("modal").style.display="none";
  render();
}

/* EXPORT VISUAL TOP */
async function exportar(){

  let wrapper=document.createElement("div");
  wrapper.className="export-wrapper";

  let building=document.createElement("div");
  building.className="building";

  let sign=document.createElement("div");
  sign.className="top-sign";
  sign.innerText=document.getElementById("predio").value;

  building.appendChild(sign);

  Object.keys(config).sort((a,b)=>b-a).forEach(f=>{
    let floor=document.createElement("div");
    floor.className="floor";

    let label=document.createElement("div");
    label.className="floor-label";
    label.innerText=f;

    let windows=document.createElement("div");
    windows.className="windows";

    for(let i=config[f].start;i<=config[f].end;i++){
      let w=document.createElement("div");
      w.className="window "+cls(data[f+"-"+i]);
      windows.appendChild(w);
    }

    floor.appendChild(label);
    floor.appendChild(windows);
    building.appendChild(floor);
  });

  let base=document.createElement("div");
  base.className="base";
  building.appendChild(base);

  wrapper.appendChild(building);
  document.body.appendChild(wrapper);

  const canvas = await html2canvas(wrapper,{scale:3});
  document.body.removeChild(wrapper);

  const link=document.createElement("a");
  link.href=canvas.toDataURL();
  link.download="predio_visual.png";
  link.click();
}

render();
</script>

</body>
</html>
