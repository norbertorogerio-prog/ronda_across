<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Ronda • Prédio</title>

<style>
:root{
  --vivo:#6A1B9A; --vivo-dark:#4A0072;
  --valid:#2ECC71; --lock:#9E9E9E; --occ:#FF9800; --prob:#E53935;
  --bg:#F6F3F9; --card:#FFFFFF; --line:#E9E2EE; --ink:#2B2B2B;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}

.app{
  max-width:900px;
  margin:auto;
  padding:12px;
}

/* HEADER */
.header{
  font-weight:900;
  font-size:18px;
  margin-bottom:10px;
}

/* CARD */
.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

/* INPUTS */
input,select,textarea,button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  color:white;
  font-weight:700;
  border:none;
}

/* CANVAS */
.canvas{
  position:relative;
  width:100%;
  border-radius:14px;
  overflow:hidden;
  background:white;
  border:1px solid #eee;
}

/* TOPO */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  color:white;
  font-weight:700;
}

/* ÁREA */
.area{
  position:relative;
  height:700px;
}

/* LINHAS */
.row{
  position:absolute;
  left:60px;
  right:10px;
  display:flex;
  gap:8px;
}

.label{
  position:absolute;
  left:10px;
  font-size:12px;
  font-weight:800;
}

/* SALAS */
.slot{
  min-width:44px;
  height:28px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:900;
  font-size:13px;
  border:2px solid white;
}

.valid{background:var(--valid)}
.lock{background:var(--lock)}
.occ{background:var(--occ)}
.prob{background:var(--prob)}

/* FOOTER */
.footer{
  padding:8px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">Ronda • Prédio</div>

  <div class="card">
    <input id="predio" placeholder="Nome do prédio">
    <textarea id="obs" placeholder="Observações"></textarea>
    <button onclick="add()">Adicionar sala (ex: 29-02)</button>
  </div>

  <div class="canvas" id="canvas">
    <div class="topbar">
      <span id="nome">Prédio</span>
      <span id="total">0 salas</span>
    </div>

    <div class="area" id="area"></div>

    <div class="footer">
      <button onclick="exportPNG()">Exportar PNG</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
let items = [
  {floor:29,room:"02",status:"VALIDADA"},
  {floor:28,room:"03",status:"PROBLEMA"},
  {floor:27,room:"05",status:"OCUPADA"}
];

const order = ["VALIDADA","OCUPADA","TRANCADA","PROBLEMA"];

function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s];
}

function render(){
  const area = document.getElementById("area");
  area.innerHTML = "";

  const floors = {};
  items.forEach(i => (floors[i.floor] ||= []).push(i));

  const keys = Object.keys(floors).sort((a,b)=>b-a);

  keys.forEach((f,i)=>{
    const y = 60 + i*50;

    const label = document.createElement("div");
    label.className="label";
    label.style.top=y+"px";
    label.textContent=f;

    const row = document.createElement("div");
    row.className="row";
    row.style.top=y+"px";

    floors[f].forEach(r=>{
      const el=document.createElement("div");
      el.className="slot "+cls(r.status);
      el.textContent=r.room;

      el.onclick = () => {
        const next = order[(order.indexOf(r.status)+1)%4];
        r.status = next;
        render();
      };

      row.appendChild(el);
    });

    area.appendChild(label);
    area.appendChild(row);
  });

  document.getElementById("nome").textContent =
    document.getElementById("predio").value || "Prédio";

  document.getElementById("total").textContent =
    items.length + " salas";
}

function add(){
  const val = prompt("Sala (ex: 29-02)");
  if(!val) return;

  const m = val.match(/(\d+)[-\/](\d+)/);
  if(!m) return alert("Formato inválido");

  items.push({
    floor:parseInt(m[1]),
    room:m[2].padStart(2,"0"),
    status:"VALIDADA"
  });

  render();
}

async function exportPNG(){
  const canvas = await html2canvas(document.getElementById("canvas"),{scale:2});
  const a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="ronda.png";
  a.click();
}

document.getElementById("predio").oninput = render;

render();
</script>

</body>
</html>
