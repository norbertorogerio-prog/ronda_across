<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Painel Executivo de Ronda</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root{
  --vivo:#6A1B9A;
  --vivo-dark:#4A0072;
  --valid:#2ECC71;
  --lock:#9E9E9E;
  --occ:#FF9800;
  --prob:#E53935;
}

body{
  margin:0;
  font-family:system-ui;
  background:#f5f5f7;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:16px;
  padding:16px;
}

/* CARD PRÉDIO */
.building{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  background:white;
  aspect-ratio:4/5;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* HEADER */
.header{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:8px;
  font-weight:900;
  color:white;
  text-align:center;
  background:linear-gradient(135deg,var(--vivo),var(--vivo-dark));
  z-index:2;
}

/* BG IMAGEM */
.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:.25; /* 👈 controle visual */
}

/* OVERLAY */
.overlay{
  position:absolute;
  top:50px;
  bottom:40px;
  left:10px;
  right:10px;
}

/* LINHA */
.row{
  position:absolute;
  left:50px;
  right:0;
  display:flex;
  gap:6px;
}

/* LABEL */
.label{
  position:absolute;
  left:0;
  font-size:11px;
  font-weight:800;
}

/* SALAS */
.slot{
  min-width:36px;
  height:26px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:12px;
  font-weight:900;
  border:2px solid white;
}

.valid{background:var(--valid)}
.lock{background:var(--lock)}
.occ{background:var(--occ)}
.prob{background:var(--prob)}

/* FOOTER */
.footer{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:6px;
  font-size:11px;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* BOTÃO EXPORT */
.export{
  border:none;
  padding:4px 8px;
  font-size:11px;
  border-radius:6px;
  background:var(--vivo);
  color:white;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<script>
const order = ["VALIDADA","OCUPADA","TRANCADA","PROBLEMA"];

const buildings = [
  {
    name:"Berrini",
    bg:"https://images.unsplash.com/photo-1604328698692-f76ea9498e76",
    items:[
      {floor:29,room:"02",status:"VALIDADA"},
      {floor:28,room:"03",status:"PROBLEMA"},
      {floor:27,room:"05",status:"OCUPADA"}
    ]
  },
  {
    name:"Paulista",
    bg:"https://images.unsplash.com/photo-1556761175-b413da4baf72",
    items:[
      {floor:10,room:"01",status:"TRANCADA"},
      {floor:9,room:"02",status:"VALIDADA"}
    ]
  }
];

function cls(s){
  return {
    VALIDADA:"valid",
    TRANCADA:"lock",
    OCUPADA:"occ",
    PROBLEMA:"prob"
  }[s];
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  buildings.forEach((b,idx)=>{
    const card = document.createElement("div");
    card.className = "building";
    card.id = "b"+idx;

    card.innerHTML = `
      <div class="header">${b.name}</div>
      <div class="bg" style="background-image:url(${b.bg})"></div>
      <div class="overlay"></div>
      <div class="footer">
        <span>${b.items.length} salas</span>
        <button class="export" onclick="exportPNG(${idx})">PNG</button>
      </div>
    `;

    const overlay = card.querySelector(".overlay");

    const floors = {};
    b.items.forEach(i => (floors[i.floor] ||= []).push(i));
    const keys = Object.keys(floors).sort((a,b)=>b-a);

    keys.forEach((f,i)=>{
      const y = i*40;

      const label = document.createElement("div");
      label.className = "label";
      label.style.top = y+"px";
      label.textContent = f;

      const row = document.createElement("div");
      row.className = "row";
      row.style.top = y+"px";

      floors[f].forEach(r=>{
        const el = document.createElement("div");
        el.className = "slot "+cls(r.status);
        el.textContent = r.room;

        el.onclick = () => {
          const next = order[(order.indexOf(r.status)+1)%4];
          r.status = next;
          render();
        };

        row.appendChild(el);
      });

      overlay.appendChild(label);
      overlay.appendChild(row);
    });

    grid.appendChild(card);
  });
}

/* EXPORT PNG INDIVIDUAL */
async function exportPNG(i){
  const node = document.getElementById("b"+i);
  const canvas = await html2canvas(node,{scale:2});
  const url = canvas.toDataURL();

  const a = document.createElement("a");
  a.href = url;
  a.download = "predio_"+i+".png";
  a.click();
}

render();
</script>

</body>
</html>
