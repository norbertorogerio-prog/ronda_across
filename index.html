<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vivo Infra • Ultra HD v11</title>

<style>
:root{
 --vivo:#6A1B9A; --vivo-dark:#4A0072;
 --valid:#1B5E20; --occ:#E65100; --lock:#424242; --prob:#B71C1C;
 --bg:#F0F2F5; --card:#FFFFFF; --line:#D1D9E6;
}

*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--bg); font-family:system-ui; }

.app{ max-width:1200px; margin:auto; padding:10px; display:grid; grid-template-columns:340px 1fr; gap:15px; }

.card{ background:#fff; border-radius:16px; padding:15px; box-shadow:0 8px 24px rgba(0,0,0,0.1); }

.viewer-card{ display:flex; justify-content:center; background:#E2E8F0; border-radius:20px; padding:20px; }

.overlay-badges{ position:absolute; top:110px; left:0; width:100%; height:860px; }

.badge{
 position:absolute;
 width:24px;
 height:12px;
 font-size:9px;
 color:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 font-weight:900;
 border-radius:2px;
}

</style>
</head>

<body>

<div class="app">

<div class="card">

<input id="inputResp" placeholder="Responsável">

<select id="selFloor"></select>
<select id="selRoom"></select>

<select id="selStatus">
<option value="valid">OK</option>
<option value="occ">Ocupada</option>
<option value="lock">Trancada</option>
<option value="prob">Problema</option>
</select>

<button id="btnApply">Aplicar</button>
<button id="btnPNG">📸 Exportar PNG (4K)</button>

</div>

<div class="viewer-card">
<div style="position:relative; width:320px; height:900px">

<svg width="320" height="900">
<rect x="0" y="80" width="320" height="700" fill="#fff"/>
</svg>

<div id="overlay" class="overlay-badges"></div>

</div>
</div>

</div>

<script>

const $ = s => document.querySelector(s);
let rooms = {};

function getHex(s){
 return s==="valid"?"#1B5E20":
 s==="occ"?"#E65100":
 s==="lock"?"#424242":"#B71C1C";
}

function init(){
 for(let f=32;f>=1;f--){
   $("#selFloor").append(new Option("Andar "+f,f));
 }
 for(let r=1;r<=50;r++){
   $("#selRoom").append(new Option("Sala "+r,r));
 }
 render();
}

function render(){
 const overlay=$("#overlay");
 overlay.innerHTML="";

 Object.keys(rooms).forEach(key=>{
   const [f,r]=key.split("-");
   const row=32-f;
   const col=(r-1)%8;

   const d=document.createElement("div");
   d.className="badge";
   d.style.background=getHex(rooms[key]);
   d.style.top=(row*22)+"px";
   d.style.left=(20+col*35)+"px";
   d.innerText=r.padStart(2,"0");

   overlay.appendChild(d);
 });
}

$("#btnApply").onclick=()=>{
 let f=$("#selFloor").value;
 let r=$("#selRoom").value;
 let s=$("#selStatus").value;
 rooms[f+"-"+r]=s;
 render();
};



// ===== EXPORT CORRIGIDO =====

$("#btnPNG").onclick = async () => {

 const btn=$("#btnPNG");
 btn.textContent="GERANDO...";

 const canvas=document.createElement("canvas");
 const ctx=canvas.getContext("2d");

 canvas.width=3840;
 canvas.height=2160;

 ctx.fillStyle="#fff";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.scale(2,2);

 for(let f=32;f>=1;f--){
  let y = 100 + (32-f)*22;

  ctx.fillStyle="#000";
  ctx.font="12px Arial";
  ctx.fillText("Andar "+f,20,y);

  for(let r=1;r<=32;r++){
    let col=(r-1)%8;
    let x=120+col*35;

    ctx.fillStyle=rooms[f+"-"+r]?getHex(rooms[f+"-"+r]):"#ddd";
    ctx.fillRect(x,y-10,24,12);
  }
 }

 canvas.toBlob((blob)=>{

   const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

   const url = URL.createObjectURL(blob);

   if(isIOS){
     window.open(url,'_blank'); // abre imagem direto
   }else{
     const a=document.createElement("a");
     a.href=url;
     a.download="Checklist_Infra_4K.png";
     a.click();
   }

 }, "image/png");

 btn.textContent="📸 Exportar PNG (4K)";
};

init();

</script>

</body>
</html>
